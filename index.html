<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranch Savvy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --soil: #2C1A0E;
      --leather: #8B4513;
      --rust: #C1440E;
      --hay: #D4A847;
      --sage: #7C8C6E;
      --cream: #F5EDD6;
      --parchment: #EDE0C4;
      --ash: #B8A99A;
      --charcoal: #3D3530;
      --sky: #7BA7BC;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-size: max(11px, 1em); }

    body {
      background-color: var(--soil);
      color: var(--cream);
      font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(193,68,14,0.08) 0%, transparent 50%);
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 220px;
      background: var(--charcoal);
      border-right: 2px solid var(--leather);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease;
    }
    
    .sidebar.collapsed {
      width: 60px;
    }
    
    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 12px 0;
    }
    
    .sidebar.collapsed .logo {
      text-align: center;
      padding: 20px 8px;
    }

    .logo {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(139,69,19,0.4);
    }

    .logo h1 {
      font-family: 'Syncopate', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--hay);
      letter-spacing: 2px;
      line-height: 1.3;
      text-transform: uppercase;
    }

    .logo span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ash);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .nav-section {
      padding: 16px 0;
      border-bottom: 1px solid rgba(139,69,19,0.2);
    }

    .nav-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ash);
      padding: 0 20px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
      font-weight: 600;
      color: var(--ash);
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: rgba(139,69,19,0.2);
      color: var(--cream);
    }

    .nav-item.active {
      background: rgba(193,68,14,0.15);
      color: var(--hay);
      border-left-color: var(--rust);
    }

    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid rgba(139,69,19,0.4);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ash);
    }

    /* MAIN CONTENT */
    .main {
      margin-left: 220px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: rgba(44,26,14,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(139,69,19,0.3);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .page-title {
      font-family: 'Syncopate', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--cream);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .topbar-actions { display: flex; gap: 12px; align-items: center; }

    .btn {
      padding: 8px 18px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      font-family: 'Source Sans 3', sans-serif;
    }

    .btn-primary {
      background: var(--rust);
      color: white;
    }
    .btn-primary:hover { background: #a83a0c; }

    .btn-secondary {
      background: transparent;
      color: var(--hay);
      border: 1px solid var(--hay);
    }
    .btn-secondary:hover { background: rgba(212,168,71,0.1); }

    .btn-ghost {
      background: transparent;
      color: var(--ash);
      border: 1px solid rgba(184,169,154,0.3);
    }
    .btn-ghost:hover { color: var(--cream); border-color: var(--ash); }

    .btn-danger {
      background: transparent;
      color: #e05555;
      border: 1px solid #e05555;
    }
    .btn-danger:hover { background: rgba(224,85,85,0.1); }

    /* CONTENT AREA */
    .content { padding: 28px 32px; flex: 1; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--charcoal);
      border: 1px solid rgba(139,69,19,0.3);
      border-radius: 6px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--rust);
    }

    .stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ash);
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--sage);
      margin-top: 4px;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: var(--charcoal);
      border: 1px solid rgba(139,69,19,0.4);
      border-radius: 4px;
      padding: 9px 14px 9px 36px;
      color: var(--cream);
      font-size: 14px;
      font-family: 'Source Sans 3', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box input:focus { border-color: var(--hay); }
    .search-box input::placeholder { color: var(--ash); }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ash);
      font-size: 14px;
    }

    .filter-select {
      background: var(--charcoal);
      border: 1px solid rgba(139,69,19,0.4);
      border-radius: 4px;
      padding: 9px 14px;
      color: var(--cream);
      font-size: 13px;
      font-family: 'Source Sans 3', sans-serif;
      outline: none;
      cursor: pointer;
      min-width: 140px;
    }

    .filter-select:focus { border-color: var(--hay); }

    /* TABLE */
    .table-wrap {
      background: var(--charcoal);
      border: 1px solid rgba(139,69,19,0.3);
      border-radius: 6px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(44,26,14,0.6);
      border-bottom: 2px solid rgba(139,69,19,0.4);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ash);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(139,69,19,0.15);
      transition: background 0.1s;
      cursor: pointer;
    }

    tbody tr:hover { background: rgba(139,69,19,0.12); }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 12px 16px;
      font-size: 14px;
      color: var(--cream);
    }

    .td-mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--hay);
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.5px;
    }

    .badge-cow { background: rgba(124,140,110,0.25); color: var(--sage); border: 1px solid rgba(124,140,110,0.4); }
    .badge-heifer { background: rgba(123,167,188,0.2); color: var(--sky); border: 1px solid rgba(123,167,188,0.4); }
    .badge-bull { background: rgba(193,68,14,0.2); color: #e8836a; border: 1px solid rgba(193,68,14,0.4); }
    .badge-steer { background: rgba(212,168,71,0.15); color: var(--hay); border: 1px solid rgba(212,168,71,0.3); }
    .badge-calf { background: rgba(184,169,154,0.15); color: var(--ash); border: 1px solid rgba(184,169,154,0.3); }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-active { background: #5cb85c; }
    .status-sold { background: var(--hay); }
    .status-dead { background: #e05555; }
    .status-archived { background: var(--ash); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ash);
    }

    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--cream);
      margin-bottom: 8px;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,10,5,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      background: var(--charcoal);
      border: 1px solid rgba(139,69,19,0.5);
      border-radius: 8px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(139,69,19,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--charcoal);
      z-index: 10;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--cream);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--ash);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--cream); }

    .modal-body { padding: 24px; }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid rgba(139,69,19,0.3);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      position: sticky;
      bottom: 0;
      background: var(--charcoal);
    }

    /* FORM */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    .form-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ash);
    }

    .form-input, .form-select, .form-textarea {
      background: rgba(44,26,14,0.5);
      border: 1px solid rgba(139,69,19,0.4);
      border-radius: 4px;
      padding: 9px 12px;
      color: var(--cream);
      font-size: 14px;
      font-family: 'Source Sans 3', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--hay);
    }

    .form-input::placeholder { color: var(--ash); }
    .form-select option { background: var(--charcoal); }
    .form-textarea { resize: vertical; min-height: 80px; }

    .form-section-title {
      grid-column: 1 / -1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--rust);
      padding-top: 8px;
      border-top: 1px solid rgba(139,69,19,0.3);
      margin-top: 4px;
    }

    /* DETAIL VIEW */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .detail-card {
      background: rgba(44,26,14,0.4);
      border: 1px solid rgba(139,69,19,0.25);
      border-radius: 6px;
      padding: 18px;
    }

    .detail-card h3 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 14px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid rgba(139,69,19,0.1);
      font-size: 13px;
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-key {
      color: var(--ash);
      font-size: 12px;
    }

    .detail-val {
      color: var(--cream);
      font-weight: 600;
      text-align: right;
    }

    /* CHAT / CONVERSATIONAL INTERFACE */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 140px);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.5;
    }

    .chat-bubble.user {
      align-self: flex-end;
      background: rgba(193,68,14,0.25);
      border: 1px solid rgba(193,68,14,0.4);
      color: var(--cream);
    }

    .chat-bubble.assistant {
      align-self: flex-start;
      background: var(--charcoal);
      border: 1px solid rgba(139,69,19,0.3);
      color: var(--cream);
    }

    .chat-bubble.system {
      align-self: center;
      background: rgba(124,140,110,0.15);
      border: 1px solid rgba(124,140,110,0.3);
      color: var(--sage);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      max-width: 90%;
    }

    .chat-time {
      font-size: 11px;
      color: var(--ash);
      margin-top: 4px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid rgba(139,69,19,0.3);
      background: var(--charcoal);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      background: rgba(44,26,14,0.5);
      border: 1px solid rgba(139,69,19,0.4);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--cream);
      font-size: 14px;
      font-family: 'Source Sans 3', sans-serif;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
    }

    .chat-input:focus { border-color: var(--hay); }
    .chat-input::placeholder { color: var(--ash); }

    .chat-send-btn {
      background: var(--rust);
      border: none;
      border-radius: 4px;
      padding: 10px 18px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.15s;
      height: 42px;
    }

    .chat-send-btn:hover { background: #a83a0c; }

    /* LOGS TABLE */
    .log-status-completed { color: #5cb85c; }
    .log-status-failed { color: #e05555; }
    .log-status-rolled_back { color: var(--ash); }
    .log-status-cancelled { color: var(--hay); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--charcoal);
      border: 1px solid var(--sage);
      border-radius: 6px;
      padding: 14px 20px;
      color: var(--cream);
      font-size: 14px;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: slideIn 0.2s ease;
    }

    .toast.error { border-color: #e05555; }
    .toast.success { border-color: var(--sage); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid rgba(139,69,19,0.2);
    }

    .pagination-info {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ash);
    }

    .pagination-btns { display: flex; gap: 6px; }

    .page-btn {
      background: transparent;
      border: 1px solid rgba(139,69,19,0.3);
      border-radius: 3px;
      padding: 5px 10px;
      color: var(--ash);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .page-btn:hover { border-color: var(--hay); color: var(--hay); }
    .page-btn.active { background: var(--rust); border-color: var(--rust); color: white; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,69,19,0.4); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(139,69,19,0.6); }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--ash);
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(139,69,19,0.3);
      border-top-color: var(--rust);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .logo h1, .logo span, .nav-item span, .nav-label { display: none; }
      .nav-item { justify-content: center; padding: 12px; }
      .main { margin-left: 60px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .content { padding: 16px; }
    }
  </style>
</head>

<div id="root"></div>

// YEAR LETTER MAP

// TOAST
function Toast({ message, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3500);
    return () => clearTimeout(t);
  }, []);
  return <div className={`toast ${type}`}>{message}</div>;
}

// ===== ANIMALS PAGE =====
function AnimalsPage({ toast }) {
  const [animals, setAnimals] = useState([]);
  const [allAnimals, setAllAnimals] = useState([]); // For client-side filtering
  const [animalOwners, setAnimalOwners] = useState({}); // animal_id -> owner name
  const [herds, setHerds] = useState([]);
  const [partnerships, setPartnerships] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [herdFilter, setHerdFilter] = useState([]);
  const [sexFilter, setSexFilter] = useState([]);
  const [statusFilter, setStatusFilter] = useState(['active']);
  const [breedingStatusFilter, setBreedingStatusFilter] = useState([]);
  const [ownerFilter, setOwnerFilter] = useState([]);
  const [purchasedFilter, setPurchasedFilter] = useState('');
  const [breedFilter, setBreedFilter] = useState('');
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [selectedAnimal, setSelectedAnimal] = useState(null);
  const [selectedAnimals, setSelectedAnimals] = useState(new Set());
  const [showBulkEdit, setShowBulkEdit] = useState(false);
  const [visibleColumns, setVisibleColumns] = useState({
    vid: true, eid: true, calfId: true, sex: true, herd: true, owner: true, dob: true, breedingStatus: true, status: true
  });
  const [page, setPage] = useState(0);

  // Listen for topbar Add Animal button
  useEffect(() => {
    const handler = () => setShowAdd(true);
    window.__addAnimal = handler;
    return () => { window.__addAnimal = null; };
  }, []);
  const PAGE_SIZE = 50;

  // Fetch all animals for client-side filtering
  const fetchAnimals = useCallback(async () => {
    setLoading(true);
    const { data, error } = await supabase
      .from('animals')
      .select('*, herds(name), animal_classes(name)')
      .order('vid', { ascending: true })
      .limit(10000);
    
    if (error) {
      toast('Error loading animals: ' + error.message, 'error');
      setLoading(false);
      return;
    }
    
    setAllAnimals(data || []);
    
    // Fetch ownership for all animals
    const animalIds = data?.map(a => a.id) || [];
    if (animalIds.length > 0) {
      const { data: ownershipData } = await supabase
        .from('animal_ownership_history')
        .select('animal_id, partnership_id, partnerships(name)')
        .in('animal_id', animalIds)
        .order('effective_date', { ascending: false })
        .limit(10000);
      
      // Build map of animal_id -> most recent owner name
      const ownerMap = {};
      ownershipData?.forEach(o => {
        if (!ownerMap[o.animal_id] && o.partnerships?.name) {
          ownerMap[o.animal_id] = o.partnerships.name;
        }
      });
      setAnimalOwners(ownerMap);
    }
    
    setLoading(false);
  }, []);

  const fetchHerds = async () => {
    const { data } = await supabase.from('herds').select('*').order('name');
    setHerds(data || []);
  };
  
  const fetchPartnerships = async () => {
    const { data } = await supabase.from('partnerships').select('*').order('name');
    setPartnerships(data || []);
  };

  useEffect(() => { fetchHerds(); fetchPartnerships(); }, []);
  useEffect(() => { fetchAnimals(); }, [fetchAnimals]);

  // Client-side filtering
  const filteredAnimals = useMemo(() => {
    let filtered = [...allAnimals];
    
    // Search filter
    if (search) {
      const s = search.toLowerCase();
      filtered = filtered.filter(a => 
        a.vid?.toLowerCase().includes(s) ||
        a.eid?.toLowerCase().includes(s) ||
        a.calf_id_code?.toLowerCase().includes(s)
      );
    }
    
    // Herd filter (multi-select)
    if (herdFilter.length > 0) {
      filtered = filtered.filter(a => herdFilter.includes(a.herd_id));
    }
    
    // Sex filter (multi-select)
    if (sexFilter.length > 0) {
      filtered = filtered.filter(a => sexFilter.includes(a.sex));
    }
    
    // Status filter (multi-select)
    if (statusFilter.length > 0) {
      filtered = filtered.filter(a => statusFilter.includes(a.status));
    }
    
    // Breeding status filter (multi-select)
    if (breedingStatusFilter.length > 0) {
      filtered = filtered.filter(a => breedingStatusFilter.includes(a.breeding_status));
    }
    
    // Owner filter (multi-select)
    if (ownerFilter.length > 0) {
      filtered = filtered.filter(a => {
        const ownerName = animalOwners[a.id];
        const partnership = partnerships.find(p => p.name === ownerName);
        return ownerName && ownerFilter.includes(partnership?.id);
      });
    }
    
    // Purchased filter
    if (purchasedFilter === 'yes') filtered = filtered.filter(a => a.purchased);
    if (purchasedFilter === 'no') filtered = filtered.filter(a => !a.purchased);
    
    // Breed filter
    if (breedFilter) {
      filtered = filtered.filter(a => a.breed?.toLowerCase().includes(breedFilter.toLowerCase()));
    }
    
    return filtered;
  }, [allAnimals, search, herdFilter, sexFilter, statusFilter, breedingStatusFilter, ownerFilter, purchasedFilter, breedFilter, animalOwners, partnerships]);

  // Paginated animals
  const paginatedAnimals = useMemo(() => {
    return filteredAnimals.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  }, [filteredAnimals, page]);

  // Stats based on FILTERED animals
  const stats = useMemo(() => {
    const activeFiltered = filteredAnimals.filter(a => a.status === 'active');
    return {
      total: activeFiltered.length,
      cows: activeFiltered.filter(a => ['cow','heifer'].includes(a.sex)).length,
      bulls: activeFiltered.filter(a => a.sex === 'bull').length,
      stockers: activeFiltered.filter(a => a.sex === 'steer').length,
    };
  }, [filteredAnimals]);

  // Toggle functions for multi-select filters
  const toggleFilter = (arr, setArr, val) => {
    setArr(prev => prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]);
    setPage(0);
  };
  
  const clearAllFilters = () => {
    setSearch('');
    setHerdFilter([]);
    setSexFilter([]);
    setStatusFilter(['active']);
    setBreedingStatusFilter([]);
    setOwnerFilter([]);
    setPurchasedFilter('');
    setBreedFilter('');
    setPage(0);
  };

  // Export filtered animals to CSV
  const exportToCSV = () => {
    // Build CSV headers based on visible columns
    const headers = [];
    if (visibleColumns.vid) headers.push('VID');
    if (visibleColumns.eid) headers.push('EID');
    if (visibleColumns.calfId) headers.push('Calf ID');
    if (visibleColumns.sex) headers.push('Sex');
    if (visibleColumns.herd) headers.push('Herd');
    if (visibleColumns.owner) headers.push('Owner');
    if (visibleColumns.dob) headers.push('Date of Birth');
    if (visibleColumns.breedingStatus) headers.push('Breeding Status');
    if (visibleColumns.status) headers.push('Status');
    
    // Build CSV rows
    const rows = filteredAnimals.map(a => {
      const row = [];
      if (visibleColumns.vid) row.push(a.vid || '');
      if (visibleColumns.eid) row.push(a.eid || '');
      if (visibleColumns.calfId) row.push(a.calf_id_code || '');
      if (visibleColumns.sex) row.push(sexLabel(a.sex));
      if (visibleColumns.herd) row.push(a.herds?.name || '');
      if (visibleColumns.owner) row.push(animalOwners[a.id] || '');
      if (visibleColumns.dob) row.push(formatDate(a.date_of_birth) || '');
      if (visibleColumns.breedingStatus) row.push(a.breeding_status?.replace('_', ' ') || '');
      if (visibleColumns.status) row.push(a.status);
      return row;
    });
    
    // Convert to CSV
    const csvContent = [
      headers.join(','),
      ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
    ].join('\n');
    
    // Download
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ranch_savvy_inventory_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    
    toast(`Exported ${filteredAnimals.length} animals to CSV`, 'success');
  };

  return (
    <div>
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Total Active</div>
          <div className="stat-value">{stats.total}</div>
          <div className="stat-sub">{filteredAnimals.length !== allAnimals.length ? 'filtered' : 'head on inventory'}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Cows & Heifers</div>
          <div className="stat-value">{stats.cows}</div>
          <div className="stat-sub">breeding females</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Bulls</div>
          <div className="stat-value">{stats.bulls}</div>
          <div className="stat-sub">breeding males</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Stockers</div>
          <div className="stat-value">{stats.stockers}</div>
          <div className="stat-sub">steers on grass</div>
        </div>
      </div>

      {/* ENHANCED FILTER BAR */}
      <div style={{marginBottom:'16px'}}>
        <div className="filter-bar">
          <div className="search-box">
            <span className="search-icon">🔍</span>
            <input
              type="text"
              placeholder="Search by VID, EID, or Calf ID..."
              value={search}
              onChange={e => { setSearch(e.target.value); setPage(0); }}
            />
          </div>
          <button 
            className="btn btn-ghost" 
            onClick={() => setShowAdvanced(!showAdvanced)}
            style={{whiteSpace:'nowrap'}}
          >
            {showAdvanced ? '− Filters' : '+ Filters'}
          </button>
          <button className="btn btn-ghost" onClick={clearAllFilters} style={{whiteSpace:'nowrap'}}>Clear All</button>
          <button className="btn btn-secondary" onClick={exportToCSV} style={{whiteSpace:'nowrap'}}>
            ⤓ Export CSV ({filteredAnimals.length})
          </button>
        </div>
        
        {/* ADVANCED FILTERS */}
        {showAdvanced && (
          <div style={{marginTop:'12px', padding:'16px', background:'var(--charcoal)', borderRadius:'6px', border:'1px solid rgba(139,69,19,0.3)'}}>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:'12px'}}>
              {/* Herd multi-select */}
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>HERD</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  {herds.map(h => (
                    <label key={h.id} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input 
                        type="checkbox" 
                        checked={herdFilter.includes(h.id)}
                        onChange={() => toggleFilter(herdFilter, setHerdFilter, h.id)}
                      />
                      {h.name}
                    </label>
                  ))}
                </div>
              </div>
              
              {/* Sex multi-select */}
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>SEX/CLASS</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  {['cow', 'heifer', 'bull', 'steer', 'calf_male', 'calf_female'].map(s => (
                    <label key={s} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input 
                        type="checkbox" 
                        checked={sexFilter.includes(s)}
                        onChange={() => toggleFilter(sexFilter, setSexFilter, s)}
                      />
                      {sexLabel(s)}
                    </label>
                  ))}
                </div>
              </div>
              
              {/* Breeding status multi-select */}
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>BREEDING STATUS</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  {['open', 'bred_spring', 'bred_fall', 'dry', 'nursing', 'unknown'].map(bs => (
                    <label key={bs} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input 
                        type="checkbox" 
                        checked={breedingStatusFilter.includes(bs)}
                        onChange={() => toggleFilter(breedingStatusFilter, setBreedingStatusFilter, bs)}
                      />
                      {bs.replace('_', ' ')}
                    </label>
                  ))}
                </div>
              </div>
              
              {/* Owner multi-select */}
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>OWNER</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  {partnerships.map(p => (
                    <label key={p.id} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input 
                        type="checkbox" 
                        checked={ownerFilter.includes(p.id)}
                        onChange={() => toggleFilter(ownerFilter, setOwnerFilter, p.id)}
                      />
                      {p.name}
                    </label>
                  ))}
                </div>
              </div>
              
              {/* Status multi-select */}
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>STATUS</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  {['active', 'sold', 'dead', 'archived'].map(st => (
                    <label key={st} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input 
                        type="checkbox" 
                        checked={statusFilter.includes(st)}
                        onChange={() => toggleFilter(statusFilter, setStatusFilter, st)}
                      />
                      {st}
                    </label>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}
        
        {/* BULK ACTIONS BAR */}
        {selectedAnimals.size > 0 && (
          <div style={{marginTop:'12px', padding:'12px 16px', background:'rgba(193,68,14,0.15)', borderRadius:'6px', border:'1px solid var(--rust)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span style={{color:'var(--hay)', fontSize:'13px', fontFamily:'IBM Plex Mono, monospace'}}>
              {selectedAnimals.size} animals selected
            </span>
            <div style={{display:'flex', gap:'8px'}}>
              <button className="btn btn-secondary" onClick={() => setSelectedAnimals(new Set())}>Clear Selection</button>
              <button className="btn btn-primary" onClick={() => setShowBulkEdit(true)}>Bulk Edit</button>
            </div>
          </div>
        )}
        
        {/* COLUMN VISIBILITY */}
        <details style={{marginTop:'12px'}}>
          <summary style={{cursor:'pointer', fontSize:'12px', color:'var(--ash)', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>
            ⚙ COLUMN VISIBILITY
          </summary>
          <div style={{marginTop:'8px', padding:'12px', background:'var(--charcoal)', borderRadius:'4px', display:'flex', flexWrap:'wrap', gap:'12px'}}>
            {Object.entries({vid:'VID', eid:'EID', calfId:'Calf ID', sex:'Sex', herd:'Herd', owner:'Owner', dob:'DOB', breedingStatus:'Breeding', status:'Status'}).map(([key, label]) => (
              <label key={key} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                <input 
                  type="checkbox" 
                  checked={visibleColumns[key]}
                  onChange={() => setVisibleColumns(v => ({...v, [key]: !v[key]}))}
                />
                {label}
              </label>
            ))}
          </div>
        </details>
      </div>

      <div className="table-wrap">
        {loading ? (
          <div className="loading"><div className="spinner"></div> Loading animals...</div>
        ) : paginatedAnimals.length === 0 ? (
          <div className="empty-state">
            <h3>No animals found</h3>
            <p>Try adjusting your filters or add your first animal.</p>
          </div>
        ) : (
          <>
            <table>
              <thead>
                <tr>
                  <th style={{width:'40px'}}>
                    <input 
                      type="checkbox" 
                      checked={paginatedAnimals.every(a => selectedAnimals.has(a.id))}
                      onChange={e => {
                        if (e.target.checked) {
                          setSelectedAnimals(new Set([...selectedAnimals, ...paginatedAnimals.map(a => a.id)]));
                        } else {
                          const newSet = new Set(selectedAnimals);
                          paginatedAnimals.forEach(a => newSet.delete(a.id));
                          setSelectedAnimals(newSet);
                        }
                      }}
                    />
                  </th>
                  {visibleColumns.vid && <th>VID</th>}
                  {visibleColumns.eid && <th>EID</th>}
                  {visibleColumns.calfId && <th>Calf ID</th>}
                  {visibleColumns.sex && <th>Sex / Class</th>}
                  {visibleColumns.herd && <th>Herd</th>}
                  {visibleColumns.owner && <th>Owner</th>}
                  {visibleColumns.dob && <th>Date of Birth</th>}
                  {visibleColumns.breedingStatus && <th>Breed Status</th>}
                  {visibleColumns.status && <th>Status</th>}
                </tr>
              </thead>
              <tbody>
                {paginatedAnimals.map(a => (
                  <tr key={a.id} onClick={e => {
                    if (e.target.type !== 'checkbox') setSelectedAnimal(a);
                  }}>
                    <td onClick={e => e.stopPropagation()}>
                      <input 
                        type="checkbox" 
                        checked={selectedAnimals.has(a.id)}
                        onChange={() => {
                          const newSet = new Set(selectedAnimals);
                          if (newSet.has(a.id)) newSet.delete(a.id);
                          else newSet.add(a.id);
                          setSelectedAnimals(newSet);
                        }}
                      />
                    </td>
                    {visibleColumns.vid && <td className="td-mono">{a.vid || '—'}</td>}
                    {visibleColumns.eid && <td className="td-mono" style={{fontSize:'11px', color:'var(--ash)'}}>{a.eid || '—'}</td>}
                    {visibleColumns.calfId && <td className="td-mono" style={{color:'var(--sky)'}}>{a.calf_id_code || '—'}</td>}
                    {visibleColumns.sex && <td><span className={`badge badge-${a.sex?.includes('calf') ? 'calf' : a.sex}`}>{sexLabel(a.sex)}</span></td>}
                    {visibleColumns.herd && <td>{a.herds?.name || '—'}</td>}
                    {visibleColumns.owner && <td style={{fontSize:'13px', color:'var(--sage)'}}>{animalOwners[a.id] || '—'}</td>}
                    {visibleColumns.dob && <td style={{color:'var(--ash)', fontSize:'13px'}}>{formatDate(a.date_of_birth)}</td>}
                    {visibleColumns.breedingStatus && (
                      <td>
                        {a.breeding_status ? (
                          <span style={{fontSize:'12px', color: a.breeding_status === 'open' ? '#e05555' : 'var(--sage)'}}>
                            {a.breeding_status.replace('_', ' ')}
                          </span>
                        ) : '—'}
                      </td>
                    )}
                    {visibleColumns.status && (
                      <td>
                        <span className={`status-dot status-${a.status}`}></span>
                        {a.status}
                      </td>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="pagination">
              <span className="pagination-info">
                Page {page + 1} · Showing {paginatedAnimals.length} of {filteredAnimals.length} animals
              </span>
              <div className="pagination-btns">
                <button className="page-btn" onClick={() => setPage(p => p - 1)} disabled={page === 0}>← Prev</button>
                <button className="page-btn active">{page + 1}</button>
                <button className="page-btn" onClick={() => setPage(p => p + 1)} disabled={(page + 1) * PAGE_SIZE >= filteredAnimals.length}>Next →</button>
              </div>
            </div>
          </>
        )}
      </div>

      {showAdd && <AddAnimalModal herds={herds} partnerships={partnerships} onClose={() => setShowAdd(false)} onSaved={() => { setShowAdd(false); fetchAnimals(); toast('Animal added successfully!', 'success'); }} toast={toast} />}
      {selectedAnimal && <AnimalDetailModal animal={selectedAnimal} herds={herds} partnerships={partnerships} animalOwners={animalOwners} onClose={() => setSelectedAnimal(null)} onSaved={() => { setSelectedAnimal(null); fetchAnimals(); toast('Animal updated!', 'success'); }} toast={toast} />}
      {showBulkEdit && <BulkEditModal selectedIds={Array.from(selectedAnimals)} herds={herds} onClose={() => setShowBulkEdit(false)} onSaved={() => { setShowBulkEdit(false); setSelectedAnimals(new Set()); fetchAnimals(); toast('Bulk edit complete!', 'success'); }} toast={toast} />}
    </div>
  );
}

// ===== BULK EDIT MODAL =====
function BulkEditModal({ selectedIds, herds, onClose, onSaved, toast }) {
  const [action, setAction] = useState('herd'); // herd | breeding_status
  const [herdId, setHerdId] = useState('');
  const [breedingStatus, setBreedingStatus] = useState('');
  const [saving, setSaving] = useState(false);

  const handleSave = async () => {
    if (!selectedIds || selectedIds.length === 0) {
      toast('No animals selected', 'error');
      return;
    }

    if (action === 'herd' && !herdId) {
      toast('Please select a herd', 'error');
      return;
    }

    if (action === 'breeding_status' && !breedingStatus) {
      toast('Please select a breeding status', 'error');
      return;
    }

    setSaving(true);

    const updates = action === 'herd' 
      ? { herd_id: herdId }
      : { breeding_status: breedingStatus };

    const { error } = await supabase
      .from('animals')
      .update(updates)
      .in('id', selectedIds);

    setSaving(false);
    
    if (error) {
      toast('Error updating animals: ' + error.message, 'error');
    } else {
      // Log the bulk action
      await supabase.from('conversation_log').insert({
        user_message: `Bulk edit: ${selectedIds.length} animals ${action === 'herd' ? 'moved to herd' : 'breeding status changed'}`,
        bot_response: JSON.stringify({ action, selectedIds, updates }),
        action_taken: 'bulk_edit',
        affected_records: selectedIds.length,
      });
      
      onSaved();
    }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2 style={{fontFamily:'Playfair Display, serif', fontSize:'24px', color:'var(--cream)', marginBottom:'8px'}}>Bulk Edit</h2>
        <p style={{color:'var(--ash)', fontSize:'13px', marginBottom:'20px'}}>
          Update {selectedIds.length} selected animals
        </p>

        <div className="form-group">
          <label>Action</label>
          <select value={action} onChange={e => setAction(e.target.value)}>
            <option value="herd">Move to Herd</option>
            <option value="breeding_status">Change Breeding Status</option>
          </select>
        </div>

        {action === 'herd' && (
          <div className="form-group">
            <label>New Herd</label>
            <select value={herdId} onChange={e => setHerdId(e.target.value)}>
              <option value="">Select a herd...</option>
              {herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
            </select>
          </div>
        )}

        {action === 'breeding_status' && (
          <div className="form-group">
            <label>New Breeding Status</label>
            <select value={breedingStatus} onChange={e => setBreedingStatus(e.target.value)}>
              <option value="">Select status...</option>
              <option value="open">Open</option>
              <option value="bred_spring">Bred Spring</option>
              <option value="bred_fall">Bred Fall</option>
              <option value="dry">Dry</option>
              <option value="nursing">Nursing</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>
        )}

        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
            {saving ? 'Updating...' : `Update ${selectedIds.length} Animals`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ===== ADD ANIMAL MODAL =====
function AddAnimalModal({ herds, onClose, onSaved, toast }) {
  const [form, setForm] = useState({
    vid: '', eid: '', sex: 'cow', herd_id: '', date_of_birth: '',
    breed: '', purchased: false, purchase_date: '', purchase_location: '',
    purchase_price_per_head: '', breeding_status: '', notes: '',
    calf_id_code: '', registration_number: '',
  });
  const [saving, setSaving] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Auto-generate calf ID when DOB + sex set
  useEffect(() => {
    if (form.date_of_birth && (form.sex === 'calf_male' || form.sex === 'calf_female') && form.vid) {
      const yr = new Date(form.date_of_birth).getFullYear();
      const letter = getYearLetter(yr);
      set('calf_id_code', `${letter}/${form.vid}`);
    }
  }, [form.date_of_birth, form.sex, form.vid]);

  const handleSave = async () => {
    if (!form.sex) { toast('Sex is required', 'error'); return; }
    setSaving(true);

    const payload = {
      vid: form.vid || null,
      eid: form.eid || null,
      sex: form.sex,
      herd_id: form.herd_id || null,
      date_of_birth: form.date_of_birth || null,
      breed: form.breed || null,
      purchased: form.purchased,
      purchase_date: form.purchased ? (form.purchase_date || null) : null,
      purchase_location: form.purchased ? (form.purchase_location || null) : null,
      purchase_price_per_head: form.purchased ? (parseFloat(form.purchase_price_per_head) || null) : null,
      breeding_status: form.breeding_status || null,
      notes: form.notes || null,
      calf_id_code: form.calf_id_code || null,
      registration_number: form.registration_number || null,
      status: 'active',
    };

    const { error } = await supabase.from('animals').insert(payload);
    setSaving(false);
    if (error) toast('Error saving: ' + error.message, 'error');
    else onSaved();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2 className="modal-title">Add New Animal</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">

            <div className="form-group">
              <label className="form-label">Visual ID (VID)</label>
              <input className="form-input" placeholder="e.g. 607" value={form.vid} onChange={e => set('vid', e.target.value)} />
            </div>

            <div className="form-group">
              <label className="form-label">Electronic ID (EID)</label>
              <input className="form-input" placeholder="e.g. 982000123456789" value={form.eid} onChange={e => set('eid', e.target.value)} />
            </div>

            <div className="form-group">
              <label className="form-label">Sex / Class *</label>
              <select className="form-select" value={form.sex} onChange={e => set('sex', e.target.value)}>
                <option value="cow">Cow</option>
                <option value="heifer">Heifer</option>
                <option value="bull">Bull</option>
                <option value="steer">Steer</option>
                <option value="calf_male">Bull Calf</option>
                <option value="calf_female">Heifer Calf</option>
              </select>
            </div>

            <div className="form-group">
              <label className="form-label">Herd</label>
              <select className="form-select" value={form.herd_id} onChange={e => set('herd_id', e.target.value)}>
                <option value="">-- Select Herd --</option>
                {herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
              </select>
            </div>

            <div className="form-group">
              <label className="form-label">Date of Birth</label>
              <input type="date" className="form-input" value={form.date_of_birth} onChange={e => set('date_of_birth', e.target.value)} />
            </div>

            <div className="form-group">
              <label className="form-label">Breed</label>
              <input className="form-input" placeholder="e.g. Angus, Sim-Angus" value={form.breed} onChange={e => set('breed', e.target.value)} />
            </div>

            {(form.sex === 'calf_male' || form.sex === 'calf_female') && (
              <div className="form-group">
                <label className="form-label">Calf ID Code (Auto)</label>
                <input className="form-input" value={form.calf_id_code} onChange={e => set('calf_id_code', e.target.value)} placeholder="e.g. L/607" />
              </div>
            )}

            {(form.sex === 'bull') && (
              <div className="form-group">
                <label className="form-label">Registration Number</label>
                <input className="form-input" value={form.registration_number} onChange={e => set('registration_number', e.target.value)} />
              </div>
            )}

            {['cow','heifer'].includes(form.sex) && (
              <div className="form-group">
                <label className="form-label">Breeding Status</label>
                <select className="form-select" value={form.breeding_status} onChange={e => set('breeding_status', e.target.value)}>
                  <option value="">-- Select --</option>
                  <option value="open">Open</option>
                  <option value="bred_spring">Bred - Spring</option>
                  <option value="bred_fall">Bred - Fall</option>
                  <option value="dry">Dry</option>
                  <option value="nursing">Nursing</option>
                  <option value="unknown">Unknown</option>
                </select>
              </div>
            )}

            <div className="form-section-title">PURCHASE INFO</div>

            <div className="form-group full" style={{flexDirection:'row', alignItems:'center', gap:'10px'}}>
              <input type="checkbox" id="purchased" checked={form.purchased} onChange={e => set('purchased', e.target.checked)} style={{width:'16px', height:'16px', accentColor:'var(--rust)'}} />
              <label htmlFor="purchased" className="form-label" style={{margin:0, cursor:'pointer'}}>This animal was purchased</label>
            </div>

            {form.purchased && <>
              <div className="form-group">
                <label className="form-label">Purchase Date</label>
                <input type="date" className="form-input" value={form.purchase_date} onChange={e => set('purchase_date', e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">Purchase Location</label>
                <input className="form-input" placeholder="e.g. Herreid Livestock" value={form.purchase_location} onChange={e => set('purchase_location', e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">Price per Head ($)</label>
                <input type="number" className="form-input" placeholder="0.00" value={form.purchase_price_per_head} onChange={e => set('purchase_price_per_head', e.target.value)} />
              </div>
            </>}

            <div className="form-section-title">NOTES</div>
            <div className="form-group full">
              <label className="form-label">Notes</label>
              <textarea className="form-textarea" placeholder="Any additional notes..." value={form.notes} onChange={e => set('notes', e.target.value)} />
            </div>

          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
            {saving ? 'Saving...' : 'Save Animal'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ===== ANIMAL DETAIL MODAL =====
function AnimalDetailModal({ animal, herds, partnerships, animalOwners, onClose, onSaved, toast }) {
  const [tab, setTab] = useState('details');
  const [calvingRecords, setCalvingRecords] = useState([]);
  const [breedingEvents, setBreedingEvents] = useState([]);
  const [treatments, setTreatments] = useState([]);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ ...animal, herd_id: animal.herd_id || '' });

  useEffect(() => {
    if (tab === 'calving') fetchCalving();
    if (tab === 'breeding') fetchBreeding();
    if (tab === 'health') fetchTreatments();
  }, [tab]);

  const fetchCalving = async () => {
    const { data } = await supabase.from('calving_records').select('*').eq('dam_id', animal.id).order('calving_date', { ascending: false });
    setCalvingRecords(data || []);
  };

  const fetchBreeding = async () => {
    const { data } = await supabase.from('breeding_events').select('*, breeding_event_sires(*, animals(vid))').eq('herd_id', animal.herd_id).order('start_date', { ascending: false });
    setBreedingEvents(data || []);
  };

  const fetchTreatments = async () => {
    const { data } = await supabase.from('treatments').select('*').eq('animal_id', animal.id).order('treatment_date', { ascending: false });
    setTreatments(data || []);
  };

  const handleSave = async () => {
    const payload = {
      vid: form.vid, eid: form.eid, sex: form.sex,
      herd_id: form.herd_id || null,
      date_of_birth: form.date_of_birth || null,
      breed: form.breed || null,
      breeding_status: form.breeding_status || null,
      is_cull: form.is_cull,
      cull_reason: form.cull_reason || null,
      notes: form.notes || null,
      updated_at: new Date().toISOString(),
    };
    const { error } = await supabase.from('animals').update(payload).eq('id', animal.id);

];

const SEX_VALUES = ['cow','heifer','bull','steer','calf_male','calf_female'];
const BREEDING_VALUES = ['open','bred_spring','bred_fall','dry','nursing','unknown'];

function parseCSVDate(val) {
  if (!val) return null;
  const cleaned = val.trim();
  // Try YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(cleaned)) return cleaned;
  // Try MM/DD/YYYY
  const parts = cleaned.split('/');
  if (parts.length === 3) {
    const [m, d, y] = parts;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return null;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return { headers: [], rows: [] };
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const rows = lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  }).filter(r => Object.values(r).some(v => v));
  return { headers, rows };
}

// Validate owner name (will create partnership if doesn't exist)
function validateOwner(ownerName, partnerships) {
  if (!ownerName || !ownerName.trim()) return { partnership: null, willCreate: false };
  
  const trimmedName = ownerName.trim();
  
  // Check if partnership exists
  const existing = partnerships.find(p => 
    p.name.toLowerCase() === trimmedName.toLowerCase()
  );
  
  if (existing) {
    return { partnership: existing, willCreate: false };
  }
  
  // Will need to create
  return { partnership: { name: trimmedName }, willCreate: true };
}

  // Download template

    const headers = IMPORT_COLUMNS.map(c => c.key).join(',');
    const example = '607,982000123456789,cow,Old Cows,Smith Ranch,01/15/2018,Angus,bred_spring,false,,,, ';
    const blob = new Blob([headers + '\n' + example], { type: 'text/csv' });

  const handleFile = (file) => {
