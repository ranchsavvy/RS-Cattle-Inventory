  logs: (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>),
  calving_gap: (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="16" r="2"/></svg>),
  landlords: (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>),
  pastures: (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><polyline points="2,17 12,22 22,17"/><polyline points="2,12 12,17 22,12"/></svg>),
  pasture_import: (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>),
  record_move: (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m6.36 6.36l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m6.36-6.36l4.24-4.24"/></svg>),
  move_history: (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>),
};

// ===== ANIMALS PAGE =====
function AnimalsPage({ toast, pendingHerdFilter, clearPendingFilter }) {
  const [animals, setAnimals] = useState([]);
  const [allAnimals, setAllAnimals] = useState([]);
  const [animalOwners, setAnimalOwners] = useState({});
  const [herds, setHerds] = useState([]);
  const [partnerships, setPartnerships] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [herdFilter, setHerdFilter] = useState([]);
  const [sexFilter, setSexFilter] = useState([]);
  const [statusFilter, setStatusFilter] = useState(['active']);
  const [breedingStatusFilter, setBreedingStatusFilter] = useState([]);
  const [ownerFilter, setOwnerFilter] = useState([]);
  const [purchasedFilter, setPurchasedFilter] = useState('');
  const [breedFilter, setBreedFilter] = useState('');
  const [dobStartDate, setDobStartDate] = useState('');
  const [dobEndDate, setDobEndDate] = useState('');
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [selectedAnimal, setSelectedAnimal] = useState(null);
  const [selectedAnimals, setSelectedAnimals] = useState(new Set());
  const [showBulkEdit, setShowBulkEdit] = useState(false);
  const [visibleColumns, setVisibleColumns] = useState({
    vid:true, eid:true, calfId:true, sex:true, herd:true, owner:true,
    dob:true, tagColor:true, breedingStatus:true, status:true
  });
  const [page, setPage] = useState(0);
  const [sortColumn, setSortColumn] = useState('vid');
  const [sortDirection, setSortDirection] = useState('asc');

  useEffect(() => {
    const handler = () => setShowAdd(true);
    window.__addAnimal = handler;
    return () => { window.__addAnimal = null; };
  }, []);

  useEffect(() => {
    if (pendingHerdFilter) {
      setHerdFilter([pendingHerdFilter]);
      setShowAdvanced(true);
      clearPendingFilter();
      toast('Viewing animals in selected herd', 'success');
    }
  }, [pendingHerdFilter]);

  const PAGE_SIZE = 50;

  const fetchAnimals = useCallback(async () => {
    setLoading(true);
    const { data, error } = await supabase.from('animals').select('*, herds(name), animal_classes(name)').order('vid', { ascending: true });
    if (error) { toast('Error loading animals: ' + error.message, 'error'); setLoading(false); return; }
    setAllAnimals(data || []);
    const { data: ownershipData, error: ownershipError } = await supabase
      .from('animal_ownership_history').select('animal_id, partnership_id, partnerships(name)').order('effective_date', { ascending: false });
    if (!ownershipError) {
      const animalIdSet = new Set(data?.map(a => a.id) || []);
      const ownerMap = {};
      ownershipData?.forEach(o => {
        if (animalIdSet.has(o.animal_id) && !ownerMap[o.animal_id] && o.partnerships?.name)
          ownerMap[o.animal_id] = o.partnerships.name;
      });
      setAnimalOwners(ownerMap);
    }
    setLoading(false);
  }, []);

  const fetchHerds = async () => { const { data } = await supabase.from('herds').select('*').order('name'); setHerds(data || []); };
  const fetchPartnerships = async () => { const { data } = await supabase.from('partnerships').select('*').order('name'); setPartnerships(data || []); };

  useEffect(() => { fetchHerds(); fetchPartnerships(); }, []);
  useEffect(() => { fetchAnimals(); }, [fetchAnimals]);

  const filteredAnimals = useMemo(() => {
    let filtered = [...allAnimals];
    if (search) { const s = search.toLowerCase(); filtered = filtered.filter(a => a.vid?.toLowerCase().includes(s) || a.eid?.toLowerCase().includes(s) || a.calf_id_code?.toLowerCase().includes(s)); }
    if (herdFilter.length > 0) filtered = filtered.filter(a => (herdFilter.includes('NO_HERD') && !a.herd_id) || herdFilter.includes(a.herd_id));
    if (sexFilter.length > 0) filtered = filtered.filter(a => sexFilter.includes(a.sex));
    if (statusFilter.length > 0) filtered = filtered.filter(a => statusFilter.includes(a.status));
    if (breedingStatusFilter.length > 0) filtered = filtered.filter(a => breedingStatusFilter.includes(a.breeding_status));
    if (ownerFilter.length > 0) filtered = filtered.filter(a => {
      const ownerName = animalOwners[a.id];
      if (ownerFilter.includes('NO_OWNER') && !ownerName) return true;
      const partnership = partnerships.find(p => p.name === ownerName);
      return ownerName && ownerFilter.includes(partnership?.id);
    });
    if (purchasedFilter === 'yes') filtered = filtered.filter(a => a.purchased);
    if (purchasedFilter === 'no') filtered = filtered.filter(a => !a.purchased);
    if (breedFilter) filtered = filtered.filter(a => a.breed?.toLowerCase().includes(breedFilter.toLowerCase()));
    if (dobStartDate || dobEndDate) filtered = filtered.filter(a => {
      if (!a.date_of_birth) return false;
      const dob = a.date_of_birth.split('T')[0];
      if (dobStartDate && dobEndDate) return dob >= dobStartDate && dob <= dobEndDate;
      if (dobStartDate) return dob >= dobStartDate;
      return dob <= dobEndDate;
    });
    filtered.sort((a, b) => {
      let aVal, bVal;
      switch(sortColumn) {
        case 'vid': aVal = a.vid||''; bVal = b.vid||''; if (!isNaN(aVal) && !isNaN(bVal)) return sortDirection==='asc' ? Number(aVal)-Number(bVal) : Number(bVal)-Number(aVal); break;
        case 'eid': aVal=a.eid||''; bVal=b.eid||''; break;
        case 'calfId': aVal=a.calf_id_code||''; bVal=b.calf_id_code||''; break;
        case 'sex': aVal=a.sex||''; bVal=b.sex||''; break;
        case 'herd': aVal=a.herds?.name||''; bVal=b.herds?.name||''; break;
        case 'owner': aVal=animalOwners[a.id]||''; bVal=animalOwners[b.id]||''; break;
        case 'dob': aVal=a.date_of_birth||''; bVal=b.date_of_birth||''; break;
        case 'tagColor': aVal=a.tag_color||''; bVal=b.tag_color||''; break;
        case 'breedingStatus': aVal=a.breeding_status||''; bVal=b.breeding_status||''; break;
        case 'status': aVal=a.status||''; bVal=b.status||''; break;
        default: aVal=''; bVal='';
      }
      if (typeof aVal==='string' && typeof bVal==='string') return sortDirection==='asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
      return 0;
    });
    return filtered;
  }, [allAnimals, search, herdFilter, sexFilter, statusFilter, breedingStatusFilter, ownerFilter, purchasedFilter, breedFilter, dobStartDate, dobEndDate, animalOwners, partnerships, sortColumn, sortDirection]);

  const paginatedAnimals = useMemo(() => filteredAnimals.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE), [filteredAnimals, page]);

  const stats = useMemo(() => {
    const activeFiltered = filteredAnimals.filter(a => a.status === 'active');
    return { total: activeFiltered.length, cows: activeFiltered.filter(a => ['cow','heifer'].includes(a.sex)).length, bulls: activeFiltered.filter(a => a.sex==='bull').length, stockers: activeFiltered.filter(a => a.sex==='steer').length };
  }, [filteredAnimals]);

  const toggleFilter = (arr, setArr, val) => { setArr(prev => prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]); setPage(0); };
  const handleSort = (column) => { if (sortColumn === column) setSortDirection(d => d==='asc'?'desc':'asc'); else { setSortColumn(column); setSortDirection('asc'); } setPage(0); };
  const clearAllFilters = () => { setSearch(''); setHerdFilter([]); setSexFilter([]); setStatusFilter(['active']); setBreedingStatusFilter([]); setOwnerFilter([]); setPurchasedFilter(''); setBreedFilter(''); setDobStartDate(''); setDobEndDate(''); setPage(0); };

  const exportToCSV = () => {
    const headers = []; const rows = [];
    if (visibleColumns.vid) headers.push('VID');
    if (visibleColumns.eid) headers.push('EID');
    if (visibleColumns.calfId) headers.push('Calf ID');
    if (visibleColumns.sex) headers.push('Sex');
    if (visibleColumns.herd) headers.push('Herd');
    if (visibleColumns.owner) headers.push('Owner');
    if (visibleColumns.dob) headers.push('Date of Birth');
    if (visibleColumns.tagColor) headers.push('Tag Color');
    if (visibleColumns.breedingStatus) headers.push('Breeding Status');
    if (visibleColumns.status) headers.push('Status');
    filteredAnimals.forEach(a => {
      const row = [];
      if (visibleColumns.vid) row.push(a.vid||'');
      if (visibleColumns.eid) row.push(a.eid||'');
      if (visibleColumns.calfId) row.push(a.calf_id_code||'');
      if (visibleColumns.sex) row.push(sexLabel(a.sex));
      if (visibleColumns.herd) row.push(a.herds?.name||'');
      if (visibleColumns.owner) row.push(animalOwners[a.id]||'');
      if (visibleColumns.dob) row.push(formatDate(a.date_of_birth)||'');
      if (visibleColumns.tagColor) row.push(a.tag_color||'');
      if (visibleColumns.breedingStatus) row.push(a.breeding_status?.replace('_',' ')||'');
      if (visibleColumns.status) row.push(a.status);
      rows.push(row);
    });
    const csvContent = [headers.join(','), ...rows.map(r => r.map(c => `"${c}"`).join(','))].join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `ranch_savvy_inventory_${new Date().toISOString().split('T')[0]}.csv`; a.click();
    URL.revokeObjectURL(url);
    toast(`Exported ${filteredAnimals.length} animals to CSV`, 'success');
  };

  const SortTh = ({ col, label }) => (
    <th onClick={() => handleSort(col)} style={{cursor:'pointer', userSelect:'none'}}>
      {label} {sortColumn === col && (sortDirection === 'asc' ? '↑' : '↓')}
    </th>
  );

  return (
    <div>
      <div className="stats-row">
        <div className="stat-card"><div className="stat-label">Total Active</div><div className="stat-value">{stats.total}</div><div className="stat-sub">{filteredAnimals.length !== allAnimals.length ? 'filtered' : 'head on inventory'}</div></div>
        <div className="stat-card"><div className="stat-label">Cows & Heifers</div><div className="stat-value">{stats.cows}</div><div className="stat-sub">breeding females</div></div>
        <div className="stat-card"><div className="stat-label">Bulls</div><div className="stat-value">{stats.bulls}</div><div className="stat-sub">breeding males</div></div>
        <div className="stat-card"><div className="stat-label">Stockers</div><div className="stat-value">{stats.stockers}</div><div className="stat-sub">steers on grass</div></div>
      </div>

      <div style={{marginBottom:'16px'}}>
        <div className="filter-bar">
          <div className="search-box">
            <span className="search-icon">🔍</span>
            <input type="text" placeholder="Search by VID, EID, or Calf ID..." value={search} onChange={e => { setSearch(e.target.value); setPage(0); }} />
          </div>
          <button className="btn btn-ghost" onClick={() => setShowAdvanced(!showAdvanced)} style={{whiteSpace:'nowrap'}}>{showAdvanced ? '− Filters' : '+ Filters'}</button>
          <button className="btn btn-ghost" onClick={clearAllFilters} style={{whiteSpace:'nowrap'}}>Clear All</button>
          <button className="btn btn-secondary" onClick={exportToCSV} style={{whiteSpace:'nowrap'}}>⤓ Export CSV ({filteredAnimals.length})</button>
        </div>

        {showAdvanced && (
          <div style={{marginTop:'12px', padding:'16px', background:'var(--charcoal)', borderRadius:'6px', border:'1px solid rgba(139,69,19,0.3)'}}>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:'12px'}}>
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>HERD</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  <label style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                    <input type="checkbox" checked={herdFilter.includes('NO_HERD')} onChange={() => toggleFilter(herdFilter, setHerdFilter, 'NO_HERD')} />
                    <span style={{color:'var(--ash)', fontStyle:'italic'}}>No Herd Assigned</span>
                  </label>
                  {herds.map(h => (
                    <label key={h.id} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input type="checkbox" checked={herdFilter.includes(h.id)} onChange={() => toggleFilter(herdFilter, setHerdFilter, h.id)} />
                      {h.name}
                    </label>
                  ))}
                </div>
              </div>
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>SEX/CLASS</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  {['cow','heifer','bull','steer','calf_male','calf_female'].map(s => (
                    <label key={s} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input type="checkbox" checked={sexFilter.includes(s)} onChange={() => toggleFilter(sexFilter, setSexFilter, s)} />
                      {sexLabel(s)}
                    </label>
                  ))}
                </div>
              </div>
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>BREEDING STATUS</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  {['open','bred_spring','bred_fall','dry','nursing','unknown'].map(bs => (
                    <label key={bs} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input type="checkbox" checked={breedingStatusFilter.includes(bs)} onChange={() => toggleFilter(breedingStatusFilter, setBreedingStatusFilter, bs)} />
                      {bs.replace('_', ' ')}
                    </label>
                  ))}
                </div>
              </div>
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>OWNER</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  <label style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                    <input type="checkbox" checked={ownerFilter.includes('NO_OWNER')} onChange={() => toggleFilter(ownerFilter, setOwnerFilter, 'NO_OWNER')} />
                    <span style={{color:'var(--ash)', fontStyle:'italic'}}>No Owner Assigned</span>
                  </label>
                  {partnerships.map(p => (
                    <label key={p.id} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input type="checkbox" checked={ownerFilter.includes(p.id)} onChange={() => toggleFilter(ownerFilter, setOwnerFilter, p.id)} />
                      {p.name}
                    </label>
                  ))}
                </div>
              </div>
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>STATUS</label>
                <div style={{display:'flex', flexDirection:'column', gap:'4px'}}>
                  {['active','sold','dead','archived'].map(st => (
                    <label key={st} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                      <input type="checkbox" checked={statusFilter.includes(st)} onChange={() => toggleFilter(statusFilter, setStatusFilter, st)} />
                      {st}
                    </label>
                  ))}
                </div>
              </div>
              <div>
                <label style={{display:'block', fontSize:'11px', color:'var(--ash)', marginBottom:'6px', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>DATE OF BIRTH</label>
                <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                  <div>
                    <label style={{display:'block', fontSize:'10px', color:'var(--ash)', marginBottom:'4px'}}>From</label>
                    <input type="date" className="form-input" value={dobStartDate} onChange={e => { setDobStartDate(e.target.value); setPage(0); }} style={{width:'100%', padding:'6px 8px', fontSize:'12px'}} />
                  </div>
                  <div>
                    <label style={{display:'block', fontSize:'10px', color:'var(--ash)', marginBottom:'4px'}}>To</label>
                    <input type="date" className="form-input" value={dobEndDate} onChange={e => { setDobEndDate(e.target.value); setPage(0); }} style={{width:'100%', padding:'6px 8px', fontSize:'12px'}} />
                  </div>
                  {(dobStartDate || dobEndDate) && <button className="btn btn-ghost" onClick={() => { setDobStartDate(''); setDobEndDate(''); }} style={{padding:'4px 8px', fontSize:'11px'}}>Clear Dates</button>}
                </div>
              </div>
            </div>
          </div>
        )}

        {selectedAnimals.size > 0 && (
          <div style={{marginTop:'12px', padding:'12px 16px', background:'rgba(193,68,14,0.15)', borderRadius:'6px', border:'1px solid var(--rust)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span style={{color:'var(--hay)', fontSize:'13px', fontFamily:'IBM Plex Mono, monospace'}}>{selectedAnimals.size} animals selected</span>
            <div style={{display:'flex', gap:'8px'}}>
              <button className="btn btn-secondary" onClick={() => setSelectedAnimals(new Set())}>Clear Selection</button>
              <button className="btn btn-primary" onClick={() => setShowBulkEdit(true)}>Bulk Edit</button>
            </div>
          </div>
        )}

        <details style={{marginTop:'12px'}}>
          <summary style={{cursor:'pointer', fontSize:'12px', color:'var(--ash)', fontFamily:'IBM Plex Mono, monospace', letterSpacing:'1px'}}>⚙ COLUMN VISIBILITY</summary>
          <div style={{marginTop:'8px', padding:'12px', background:'var(--charcoal)', borderRadius:'4px', display:'flex', flexWrap:'wrap', gap:'12px'}}>
            {Object.entries({vid:'VID', eid:'EID', calfId:'Calf ID', sex:'Sex', herd:'Herd', owner:'Owner', dob:'DOB', tagColor:'Tag Color', breedingStatus:'Breeding', status:'Status'}).map(([key, label]) => (
              <label key={key} style={{display:'flex', alignItems:'center', gap:'6px', cursor:'pointer', fontSize:'13px', color:'var(--cream)'}}>
                <input type="checkbox" checked={visibleColumns[key]} onChange={() => setVisibleColumns(v => ({...v, [key]: !v[key]}))} />
                {label}
              </label>
            ))}
          </div>
        </details>
      </div>

      <div className="table-wrap">
        {loading ? <div className="loading"><div className="spinner"></div> Loading animals...</div>
        : paginatedAnimals.length === 0 ? <div className="empty-state"><h3>No animals found</h3><p>Try adjusting your filters or add your first animal.</p></div>
        : <>
          <table>
            <thead>
              <tr>
                <th style={{width:'40px'}}>
                  <input type="checkbox" checked={paginatedAnimals.every(a => selectedAnimals.has(a.id))} onChange={e => {
                    if (e.target.checked) setSelectedAnimals(new Set([...selectedAnimals, ...paginatedAnimals.map(a => a.id)]));
                    else { const ns = new Set(selectedAnimals); paginatedAnimals.forEach(a => ns.delete(a.id)); setSelectedAnimals(ns); }
                  }} />
                </th>
                {visibleColumns.vid && <SortTh col="vid" label="VID" />}
                {visibleColumns.eid && <SortTh col="eid" label="EID" />}
                {visibleColumns.calfId && <SortTh col="calfId" label="Calf ID" />}
                {visibleColumns.sex && <SortTh col="sex" label="Sex / Class" />}
                {visibleColumns.herd && <SortTh col="herd" label="Herd" />}
                {visibleColumns.owner && <SortTh col="owner" label="Owner" />}
                {visibleColumns.dob && <SortTh col="dob" label="Date of Birth" />}
                {visibleColumns.tagColor && <SortTh col="tagColor" label="Tag Color" />}
                {visibleColumns.breedingStatus && <SortTh col="breedingStatus" label="Breed Status" />}
                {visibleColumns.status && <SortTh col="status" label="Status" />}
              </tr>
            </thead>
            <tbody>
              {paginatedAnimals.map(a => (
                <tr key={a.id} onClick={e => { if (e.target.type !== 'checkbox') setSelectedAnimal(a); }}>
                  <td onClick={e => e.stopPropagation()}>
                    <input type="checkbox" checked={selectedAnimals.has(a.id)} onChange={() => { const ns = new Set(selectedAnimals); ns.has(a.id) ? ns.delete(a.id) : ns.add(a.id); setSelectedAnimals(ns); }} />
                  </td>
                  {visibleColumns.vid && <td className="td-mono">{a.vid || '—'}</td>}
                  {visibleColumns.eid && <td className="td-mono" style={{fontSize:'11px', color:'var(--ash)'}}>{a.eid || '—'}</td>}
                  {visibleColumns.calfId && <td className="td-mono" style={{color:'var(--sky)'}}>{a.calf_id_code || '—'}</td>}
                  {visibleColumns.sex && <td><span className={`badge badge-${a.sex?.includes('calf') ? 'calf' : a.sex}`}>{sexLabel(a.sex)}</span></td>}
                  {visibleColumns.herd && <td>{a.herds?.name || '—'}</td>}
                  {visibleColumns.owner && <td style={{fontSize:'13px', color:'var(--sage)'}}>{animalOwners[a.id] || '—'}</td>}
                  {visibleColumns.dob && <td style={{color:'var(--ash)', fontSize:'13px'}}>{formatDate(a.date_of_birth)}</td>}
                  {visibleColumns.tagColor && <td>{a.tag_color ? <span style={{display:'inline-flex', alignItems:'center', gap:'6px', fontSize:'12px', color:'var(--cream)', textTransform:'capitalize'}}><span style={{width:'12px', height:'12px', borderRadius:'50%', background: a.tag_color, border: a.tag_color==='white'?'1px solid var(--ash)':'none'}}></span>{a.tag_color}</span> : '—'}</td>}
                  {visibleColumns.breedingStatus && <td>{a.breeding_status ? <span style={{fontSize:'12px', color: a.breeding_status==='open' ? '#e05555' : 'var(--sage)'}}>{a.breeding_status.replace('_', ' ')}</span> : '—'}</td>}
                  {visibleColumns.status && <td><span className={`status-dot status-${a.status}`}></span>{a.status}</td>}
                </tr>
              ))}
            </tbody>
          </table>
          <div className="pagination">
            <span className="pagination-info">Page {page + 1} · Showing {paginatedAnimals.length} of {filteredAnimals.length} animals</span>
            <div className="pagination-btns">
              <button className="page-btn" onClick={() => setPage(p => p - 1)} disabled={page === 0}>← Prev</button>
              <button className="page-btn active">{page + 1}</button>
              <button className="page-btn" onClick={() => setPage(p => p + 1)} disabled={(page + 1) * PAGE_SIZE >= filteredAnimals.length}>Next →</button>
            </div>
          </div>
        </>}
      </div>

      {showAdd && <AddAnimalModal herds={herds} partnerships={partnerships} onClose={() => setShowAdd(false)} onSaved={() => { setShowAdd(false); fetchAnimals(); toast('Animal added successfully!', 'success'); }} toast={toast} />}
      {selectedAnimal && <AnimalDetailModal animal={selectedAnimal} herds={herds} partnerships={partnerships} animalOwners={animalOwners} onClose={() => setSelectedAnimal(null)} onSaved={() => { setSelectedAnimal(null); fetchAnimals(); toast('Animal updated!', 'success'); }} toast={toast} />}
      {showBulkEdit && <BulkEditModal selectedIds={Array.from(selectedAnimals)} herds={herds} partnerships={partnerships} onClose={() => setShowBulkEdit(false)} onSaved={() => { setShowBulkEdit(false); setSelectedAnimals(new Set()); fetchAnimals(); toast('Bulk edit complete!', 'success'); }} toast={toast} />}
    </div>
  );
}

// ===== BULK EDIT MODAL =====
function BulkEditModal({ selectedIds, herds, partnerships, onClose, onSaved, toast }) {
  const [action, setAction] = useState('herd');
  const [herdId, setHerdId] = useState('');
  const [breedingStatus, setBreedingStatus] = useState('');
  const [ownerId, setOwnerId] = useState('');
  const [status, setStatus] = useState('');
  const [sex, setSex] = useState('');
  const [notes, setNotes] = useState('');
  const [notesMode, setNotesMode] = useState('append');
  const [vaccineProduct, setVaccineProduct] = useState('');
  const [vaccineLot, setVaccineLot] = useState('');
  const [vaccineDosage, setVaccineDosage] = useState('');
  const [vaccineDate, setVaccineDate] = useState(new Date().toISOString().split('T')[0]);
  const [saving, setSaving] = useState(false);

  const handleSave = async () => {
    if (!selectedIds || selectedIds.length === 0) { toast('No animals selected', 'error'); return; }
    if (action === 'herd' && !herdId) { toast('Please select a herd', 'error'); return; }
    if (action === 'breeding_status' && !breedingStatus) { toast('Please select a breeding status', 'error'); return; }
    if (action === 'owner' && !ownerId) { toast('Please select an owner', 'error'); return; }
    if (action === 'status' && !status) { toast('Please select a status', 'error'); return; }
    if (action === 'sex' && !sex) { toast('Please select a sex/class', 'error'); return; }
    if (action === 'notes' && !notes.trim()) { toast('Please enter notes to add', 'error'); return; }
    if (action === 'vaccination' && !vaccineProduct.trim()) { toast('Please enter product name', 'error'); return; }
    setSaving(true);
    try {
      if (action === 'herd') {
        const { error } = await supabase.from('animals').update({ herd_id: herdId }).in('id', selectedIds);
        if (error) throw error;
      } else if (action === 'breeding_status') {
        const { error } = await supabase.from('animals').update({ breeding_status: breedingStatus }).in('id', selectedIds);
        if (error) throw error;
      } else if (action === 'owner') {
        const today = new Date().toISOString().split('T')[0];
        const ownershipRecords = selectedIds.map(animalId => ({ animal_id: animalId, partnership_id: ownerId, effective_date: today }));
        const { error } = await supabase.from('animal_ownership_history').insert(ownershipRecords);
        if (error) throw error;
      } else if (action === 'status') {
        const today = new Date().toISOString().split('T')[0];
        const { error } = await supabase.from('animals').update({ status, status_date: today, is_active: status === 'active', updated_at: new Date().toISOString() }).in('id', selectedIds);
        if (error) throw error;
      } else if (action === 'sex') {
        const { error } = await supabase.from('animals').update({ sex }).in('id', selectedIds);
        if (error) throw error;
      } else if (action === 'notes') {
        const { data: animals } = await supabase.from('animals').select('id, notes').in('id', selectedIds);
        for (const animal of animals) {
          let newNotes = '';
          if (notesMode === 'append') newNotes = animal.notes ? `${animal.notes}\n\n${notes}` : notes;
          else if (notesMode === 'prepend') newNotes = animal.notes ? `${notes}\n\n${animal.notes}` : notes;
          else newNotes = notes;
          const { error } = await supabase.from('animals').update({ notes: newNotes, updated_at: new Date().toISOString() }).eq('id', animal.id);
          if (error) throw error;
        }
      } else if (action === 'vaccination') {
        const treatmentRecords = selectedIds.map(animalId => ({ animal_id: animalId, treatment_date: vaccineDate, treatment_type: 'vaccination', product_name: vaccineProduct, lot_number: vaccineLot || null, dosage: vaccineDosage || null, reason: 'Bulk vaccination', administered_by: 'Bulk edit' }));
        const { error } = await supabase.from('treatments').insert(treatmentRecords);
        if (error) throw error;
      }
      onSaved();
    } catch (error) { toast('Error: ' + error.message, 'error'); }
    setSaving(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header"><h2 className="modal-title">Bulk Edit</h2><button className="modal-close" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <p style={{color:'var(--ash)', fontSize:'13px', marginBottom:'20px'}}>Update {selectedIds.length} selected animals</p>
          <div className="form-group">
            <label className="form-label">Action</label>
            <select className="form-select" value={action} onChange={e => setAction(e.target.value)}>
              <option value="herd">Move to Herd</option>
              <option value="breeding_status">Change Breeding Status</option>
              <option value="owner">Assign Owner</option>
              <option value="status">Change Status</option>
              <option value="sex">Change Sex/Class</option>
              <option value="notes">Add Notes</option>
              <option value="vaccination">Add Vaccination</option>
            </select>
          </div>
          {action === 'herd' && <div className="form-group"><label className="form-label">New Herd</label><select className="form-select" value={herdId} onChange={e => setHerdId(e.target.value)}><option value="">Select a herd...</option>{herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}</select></div>}
          {action === 'breeding_status' && <div className="form-group"><label className="form-label">New Breeding Status</label><select className="form-select" value={breedingStatus} onChange={e => setBreedingStatus(e.target.value)}><option value="">Select status...</option><option value="open">Open</option><option value="bred_spring">Bred Spring</option><option value="bred_fall">Bred Fall</option><option value="dry">Dry</option><option value="nursing">Nursing</option><option value="unknown">Unknown</option></select></div>}
          {action === 'owner' && <div className="form-group"><label className="form-label">Assign to Owner</label><select className="form-select" value={ownerId} onChange={e => setOwnerId(e.target.value)}><option value="">Select owner...</option>{partnerships.filter(p => p.is_active !== false).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>}
          {action === 'status' && <div className="form-group"><label className="form-label">New Status</label><select className="form-select" value={status} onChange={e => setStatus(e.target.value)}><option value="">Select status...</option><option value="active">Active</option><option value="sold">Sold</option><option value="dead">Dead</option><option value="archived">Archived</option></select></div>}
          {action === 'sex' && <div className="form-group"><label className="form-label">New Sex/Class</label><select className="form-select" value={sex} onChange={e => setSex(e.target.value)}><option value="">Select sex/class...</option><option value="cow">Cow</option><option value="heifer">Heifer</option><option value="bull">Bull</option><option value="steer">Steer</option><option value="calf_male">Bull Calf</option><option value="calf_female">Heifer Calf</option></select></div>}
          {action === 'notes' && <>
            <div className="form-group"><label className="form-label">Notes Mode</label><select className="form-select" value={notesMode} onChange={e => setNotesMode(e.target.value)}><option value="append">Append to existing notes</option><option value="prepend">Prepend to existing notes</option><option value="replace">Replace all notes</option></select></div>
            <div className="form-group"><label className="form-label">Notes to Add</label><textarea className="form-textarea" value={notes} onChange={e => setNotes(e.target.value)} placeholder="Enter notes here..." rows={4} /></div>
          </>}
          {action === 'vaccination' && <>
            <div className="form-group"><label className="form-label">Product Name *</label><input className="form-input" value={vaccineProduct} onChange={e => setVaccineProduct(e.target.value)} placeholder="e.g. Vision 7, Bovi-Shield" /></div>
            <div className="form-grid">
              <div className="form-group"><label className="form-label">Lot Number</label><input className="form-input" value={vaccineLot} onChange={e => setVaccineLot(e.target.value)} placeholder="Optional" /></div>
              <div className="form-group"><label className="form-label">Dosage</label><input className="form-input" value={vaccineDosage} onChange={e => setVaccineDosage(e.target.value)} placeholder="e.g. 2ml" /></div>
            </div>
            <div className="form-group"><label className="form-label">Vaccination Date</label><input type="date" className="form-input" value={vaccineDate} onChange={e => setVaccineDate(e.target.value)} /></div>
          </>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving ? 'Updating...' : `Update ${selectedIds.length} Animals`}</button>
        </div>
      </div>
    </div>
  );
}

// ===== ADD ANIMAL MODAL =====
function AddAnimalModal({ herds, onClose, onSaved, toast }) {
  const [form, setForm] = useState({
    vid:'', eid:'', sex:'cow', herd_id:'', date_of_birth:'', breed:'',
    purchased:false, purchase_date:'', purchase_location:'',
    purchase_price_per_head:'', breeding_status:'', notes:'',
    calf_id_code:'', registration_number:'', tag_color:'',
  });
  const [saving, setSaving] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  useEffect(() => {
    if (form.date_of_birth && (form.sex === 'calf_male' || form.sex === 'calf_female') && form.vid) {
      const yr = new Date(form.date_of_birth).getFullYear();
      const letter = getYearLetter(yr);
      set('calf_id_code', `${letter}/${form.vid}`);
    }
  }, [form.date_of_birth, form.sex, form.vid]);

  const handleSave = async () => {
    if (!form.sex) { toast('Sex is required', 'error'); return; }
    setSaving(true);
    const payload = {
      vid: form.vid || null, eid: form.eid || null, sex: form.sex,
      herd_id: form.herd_id || null, date_of_birth: form.date_of_birth || null,
      breed: form.breed || null, tag_color: form.tag_color || null,
      purchased: form.purchased,
      purchase_date: form.purchased ? (form.purchase_date || null) : null,
      purchase_location: form.purchased ? (form.purchase_location || null) : null,
      purchase_price_per_head: form.purchased ? (parseFloat(form.purchase_price_per_head) || null) : null,
      breeding_status: form.breeding_status || null, notes: form.notes || null,
      calf_id_code: form.calf_id_code || null, registration_number: form.registration_number || null, status: 'active',
    };
    const { error } = await supabase.from('animals').insert(payload);
    setSaving(false);
    if (error) toast('Error saving: ' + error.message, 'error');
    else onSaved();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header"><h2 className="modal-title">Add New Animal</h2><button className="modal-close" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group"><label className="form-label">Visual ID (VID)</label><input className="form-input" placeholder="e.g. 607" value={form.vid} onChange={e => set('vid', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Electronic ID (EID)</label><input className="form-input" placeholder="e.g. 982000123456789" value={form.eid} onChange={e => set('eid', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Sex / Class *</label><select className="form-select" value={form.sex} onChange={e => set('sex', e.target.value)}><option value="cow">Cow</option><option value="heifer">Heifer</option><option value="bull">Bull</option><option value="steer">Steer</option><option value="calf_male">Bull Calf</option><option value="calf_female">Heifer Calf</option></select></div>
            <div className="form-group"><label className="form-label">Herd</label><select className="form-select" value={form.herd_id} onChange={e => set('herd_id', e.target.value)}><option value="">-- Select Herd --</option>{herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}</select></div>
            <div className="form-group"><label className="form-label">Date of Birth</label><input type="date" className="form-input" value={form.date_of_birth} onChange={e => set('date_of_birth', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Breed</label><input className="form-input" placeholder="e.g. Angus, Sim-Angus" value={form.breed} onChange={e => set('breed', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Tag Color</label><select className="form-select" value={form.tag_color} onChange={e => set('tag_color', e.target.value)}><option value="">-- Select --</option><option value="yellow">Yellow</option><option value="red">Red</option><option value="blue">Blue</option><option value="green">Green</option><option value="orange">Orange</option><option value="white">White</option><option value="black">Black</option><option value="pink">Pink</option><option value="purple">Purple</option></select></div>
            {(form.sex === 'calf_male' || form.sex === 'calf_female') && <div className="form-group"><label className="form-label">Calf ID Code (Auto)</label><input className="form-input" value={form.calf_id_code} onChange={e => set('calf_id_code', e.target.value)} placeholder="e.g. L/607" /></div>}
            {form.sex === 'bull' && <div className="form-group"><label className="form-label">Registration Number</label><input className="form-input" value={form.registration_number} onChange={e => set('registration_number', e.target.value)} /></div>}
            {['cow','heifer'].includes(form.sex) && <div className="form-group"><label className="form-label">Breeding Status</label><select className="form-select" value={form.breeding_status} onChange={e => set('breeding_status', e.target.value)}><option value="">-- Select --</option><option value="open">Open</option><option value="bred_spring">Bred - Spring</option><option value="bred_fall">Bred - Fall</option><option value="dry">Dry</option><option value="nursing">Nursing</option><option value="unknown">Unknown</option></select></div>}
            <div className="form-section-title">PURCHASE INFO</div>
            <div className="form-group full" style={{flexDirection:'row', alignItems:'center', gap:'10px'}}>
              <input type="checkbox" id="purchased" checked={form.purchased} onChange={e => set('purchased', e.target.checked)} style={{width:'16px', height:'16px', accentColor:'var(--rust)'}} />
              <label htmlFor="purchased" className="form-label" style={{margin:0, cursor:'pointer'}}>This animal was purchased</label>
            </div>
            {form.purchased && <>
              <div className="form-group"><label className="form-label">Purchase Date</label><input type="date" className="form-input" value={form.purchase_date} onChange={e => set('purchase_date', e.target.value)} /></div>
              <div className="form-group"><label className="form-label">Purchase Location</label><input className="form-input" placeholder="e.g. Herreid Livestock" value={form.purchase_location} onChange={e => set('purchase_location', e.target.value)} /></div>
              <div className="form-group"><label className="form-label">Price per Head ($)</label><input type="number" className="form-input" placeholder="0.00" value={form.purchase_price_per_head} onChange={e => set('purchase_price_per_head', e.target.value)} /></div>
            </>}
            <div className="form-section-title">NOTES</div>
            <div className="form-group full"><label className="form-label">Notes</label><textarea className="form-textarea" placeholder="Any additional notes..." value={form.notes} onChange={e => set('notes', e.target.value)} /></div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving ? 'Saving...' : 'Save Animal'}</button>
        </div>
      </div>
    </div>
  );
}

// ===== ANIMAL DETAIL MODAL =====
function AnimalDetailModal({ animal, herds, partnerships, animalOwners, onClose, onSaved, toast }) {
  const [tab, setTab] = useState('details');
  const [calvingRecords, setCalvingRecords] = useState([]);
  const [breedingEvents, setBreedingEvents] = useState([]);
  const [treatments, setTreatments] = useState([]);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ ...animal, herd_id: animal.herd_id || '' });
  const [showAddCalving, setShowAddCalving] = useState(false);
  const [showAddTreatment, setShowAddTreatment] = useState(false);
  const [addingNote, setAddingNote] = useState(false);
  const [noteText, setNoteText] = useState('');

  // ── CALVING EDIT/DELETE STATE ──────────────────────────────
  const [editingCalvingId, setEditingCalvingId] = useState(null);
  const [editCalvingForm, setEditCalvingForm] = useState({
    calving_date: '', calf_sex: 'heifer', calf_status: 'alive', udder_score: '', notes: ''
  });
  const [deletingCalvingId, setDeletingCalvingId] = useState(null);
  // ──────────────────────────────────────────────────────────

  const [calvingForm, setCalvingForm] = useState({
    calving_date: new Date().toISOString().split('T')[0],
    calf_sex: 'heifer', calf_status: 'alive', udder_score: '', notes: '',
  });
  const [treatmentForm, setTreatmentForm] = useState({
    treatment_date: new Date().toISOString().split('T')[0],
    treatment_type: 'vaccination', product_name: '', lot_number: '',
    dosage: '', reason: '', administered_by: '', withdrawal_date: '',
  });

  useEffect(() => {
    if (tab === 'calving') fetchCalving();
    if (tab === 'breeding') fetchBreeding();
    if (tab === 'health') fetchTreatments();
  }, [tab]);

  const fetchCalving = async () => {
    const { data } = await supabase.from('calving_records').select('*').eq('dam_id', animal.id).order('calving_date', { ascending: false });
    setCalvingRecords(data || []);
  };
  const fetchBreeding = async () => {
    const { data } = await supabase.from('breeding_events').select('*, breeding_event_sires(*, animals(vid))').eq('herd_id', animal.herd_id).order('start_date', { ascending: false });
    setBreedingEvents(data || []);
  };
  const fetchTreatments = async () => {
    const { data } = await supabase.from('treatments').select('*').eq('animal_id', animal.id).order('treatment_date', { ascending: false });
    setTreatments(data || []);
  };

  const handleSave = async () => {
    const payload = {
      vid: form.vid, eid: form.eid, sex: form.sex, herd_id: form.herd_id || null,
      date_of_birth: form.date_of_birth || null, breed: form.breed || null,
      tag_color: form.tag_color || null, breeding_status: form.breeding_status || null,
      is_cull: form.is_cull, cull_reason: form.cull_reason || null,
      notes: form.notes || null, updated_at: new Date().toISOString(),
    };
    const { error } = await supabase.from('animals').update(payload).eq('id', animal.id);
    if (error) toast('Error updating: ' + error.message, 'error');
    else { setEditing(false); onSaved(); }
  };

  const handleAddCalving = async () => {
    if (!calvingForm.calf_sex) { toast('Calf sex is required', 'error'); return; }
    const record = { dam_id: animal.id, calving_date: calvingForm.calving_date, calf_sex: calvingForm.calf_sex, calf_status: calvingForm.calf_status, udder_score: calvingForm.udder_score || null, notes: calvingForm.notes || null };
    const { error } = await supabase.from('calving_records').insert(record);
    if (error) { toast('Error saving calving record: ' + error.message, 'error'); }
    else {
      toast('Calving record saved!', 'success');
      setShowAddCalving(false);
      setCalvingForm({ calving_date: new Date().toISOString().split('T')[0], calf_sex: 'heifer', calf_status: 'alive', udder_score: '', notes: '' });
      fetchCalving();
    }
  };

  // ── EDIT CALVING HANDLERS ──────────────────────────────────
  const startEditCalving = (record) => {
    setEditingCalvingId(record.id);
    setEditCalvingForm({
      calving_date: record.calving_date,
      calf_sex: record.calf_sex || 'heifer',
      calf_status: record.calf_status || 'alive',
      udder_score: record.udder_score || '',
      notes: record.notes || '',
    });
  };

  const saveCalvingEdit = async () => {
    const { error } = await supabase.from('calving_records').update({
      calving_date: editCalvingForm.calving_date,
      calf_sex: editCalvingForm.calf_sex,
      calf_status: editCalvingForm.calf_status,
      udder_score: editCalvingForm.udder_score || null,
      notes: editCalvingForm.notes || null,
    }).eq('id', editingCalvingId);
    if (error) { toast('Error updating record: ' + error.message, 'error'); }
    else { toast('Calving record updated!', 'success'); setEditingCalvingId(null); fetchCalving(); }
  };

  const cancelCalvingEdit = () => { setEditingCalvingId(null); };

  const confirmDeleteCalving = (id) => { setDeletingCalvingId(id); };

  const executeDeleteCalving = async () => {
    const { error } = await supabase.from('calving_records').delete().eq('id', deletingCalvingId);
    if (error) { toast('Error deleting record: ' + error.message, 'error'); }
    else { toast('Calving record deleted.', 'success'); setDeletingCalvingId(null); fetchCalving(); }
  };
  // ──────────────────────────────────────────────────────────

  const handleAddTreatment = async () => {
    if (!treatmentForm.product_name) { toast('Product name is required', 'error'); return; }
    const record = { animal_id: animal.id, treatment_date: treatmentForm.treatment_date, treatment_type: treatmentForm.treatment_type, product_name: treatmentForm.product_name, lot_number: treatmentForm.lot_number || null, dosage: treatmentForm.dosage || null, reason: treatmentForm.reason || null, administered_by: treatmentForm.administered_by || null, withdrawal_date: treatmentForm.withdrawal_date || null };
    const { error } = await supabase.from('treatments').insert(record);
    if (error) { toast('Error saving treatment: ' + error.message, 'error'); }
    else {
      toast('Treatment record saved!', 'success');
      setShowAddTreatment(false);
      setTreatmentForm({ treatment_date: new Date().toISOString().split('T')[0], treatment_type: 'vaccination', product_name: '', lot_number: '', dosage: '', reason: '', administered_by: '', withdrawal_date: '' });
      fetchTreatments();
    }
  };

  const handleAddNote = async () => {
    if (!noteText.trim()) { toast('Please enter a note', 'error'); return; }
    const timestamp = new Date().toLocaleDateString();
    const newNotes = form.notes ? `${form.notes}\n\n[${timestamp}] ${noteText}` : `[${timestamp}] ${noteText}`;
    const { error } = await supabase.from('animals').update({ notes: newNotes, updated_at: new Date().toISOString() }).eq('id', animal.id);
    if (error) { toast('Error saving note: ' + error.message, 'error'); }
    else { toast('Note added!', 'success'); setNoteText(''); setAddingNote(false); setForm(f => ({ ...f, notes: newNotes })); onSaved(); }
  };

  const tabStyle = (t) => ({
    padding: '8px 16px', cursor: 'pointer', fontSize: '12px', fontFamily: 'IBM Plex Mono, monospace',
    letterSpacing: '1px', textTransform: 'uppercase',
    borderBottom: tab === t ? '2px solid var(--rust)' : '2px solid transparent',
    color: tab === t ? 'var(--cream)' : 'var(--ash)',
    background: 'none', border: 'none', transition: 'all 0.15s',
  });

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:'800px'}}>
        <div className="modal-header">
          <div>
            <h2 className="modal-title">
              {animal.vid ? `Tag #${animal.vid}` : 'Animal Record'}
              {animal.calf_id_code && <span style={{color:'var(--sky)', fontSize:'14px', marginLeft:'10px'}}>{animal.calf_id_code}</span>}
            </h2>
            <span className={`badge badge-${animal.sex?.includes('calf') ? 'calf' : animal.sex}`} style={{marginTop:'4px', display:'inline-block'}}>{sexLabel(animal.sex)}</span>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <div style={{display:'flex', gap:'4px', padding:'0 24px', borderBottom:'1px solid rgba(139,69,19,0.3)'}}>
          {['details','calving','breeding','health'].map(t => (
            <button key={t} style={tabStyle(t)} onClick={() => setTab(t)}>{t}</button>
          ))}
        </div>

        <div className="modal-body">
          {tab === 'details' && (editing ? (
            <div className="form-grid">
              <div className="form-group"><label className="form-label">VID</label><input className="form-input" value={form.vid || ''} onChange={e => setForm(f => ({...f, vid: e.target.value}))} /></div>
              <div className="form-group"><label className="form-label">EID</label><input className="form-input" value={form.eid || ''} onChange={e => setForm(f => ({...f, eid: e.target.value}))} /></div>
              <div className="form-group"><label className="form-label">Sex</label><select className="form-select" value={form.sex} onChange={e => setForm(f => ({...f, sex: e.target.value}))}><option value="cow">Cow</option><option value="heifer">Heifer</option><option value="bull">Bull</option><option value="steer">Steer</option><option value="calf_male">Bull Calf</option><option value="calf_female">Heifer Calf</option></select></div>
              <div className="form-group"><label className="form-label">Herd</label><select className="form-select" value={form.herd_id} onChange={e => setForm(f => ({...f, herd_id: e.target.value}))}><option value="">-- None --</option>{herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}</select></div>
              <div className="form-group"><label className="form-label">Breeding Status</label><select className="form-select" value={form.breeding_status || ''} onChange={e => setForm(f => ({...f, breeding_status: e.target.value}))}><option value="">-- None --</option><option value="open">Open</option><option value="bred_spring">Bred - Spring</option><option value="bred_fall">Bred - Fall</option><option value="dry">Dry</option><option value="nursing">Nursing</option><option value="unknown">Unknown</option></select></div>
              <div className="form-group"><label className="form-label">Breed</label><input className="form-input" value={form.breed || ''} onChange={e => setForm(f => ({...f, breed: e.target.value}))} /></div>
              <div className="form-group"><label className="form-label">Tag Color</label><select className="form-select" value={form.tag_color || ''} onChange={e => setForm(f => ({...f, tag_color: e.target.value}))}><option value="">-- None --</option><option value="yellow">Yellow</option><option value="red">Red</option><option value="blue">Blue</option><option value="green">Green</option><option value="orange">Orange</option><option value="white">White</option><option value="black">Black</option><option value="pink">Pink</option><option value="purple">Purple</option></select></div>
              <div className="form-group full" style={{flexDirection:'row', gap:'10px', alignItems:'center'}}>
                <input type="checkbox" id="is_cull" checked={form.is_cull || false} onChange={e => setForm(f => ({...f, is_cull: e.target.checked}))} style={{width:'16px', height:'16px', accentColor:'var(--rust)'}} />
                <label htmlFor="is_cull" className="form-label" style={{margin:0}}>Mark as Cull</label>
              </div>
              {form.is_cull && <div className="form-group full"><label className="form-label">Cull Reason</label><input className="form-input" value={form.cull_reason || ''} onChange={e => setForm(f => ({...f, cull_reason: e.target.value}))} placeholder="Reason for culling..." /></div>}
              <div className="form-group full"><label className="form-label">Notes</label><textarea className="form-textarea" value={form.notes || ''} onChange={e => setForm(f => ({...f, notes: e.target.value}))} /></div>
            </div>
          ) : (
            <div className="detail-grid">
              <div className="detail-card">
                <h3>Identification</h3>
                <div className="detail-row"><span className="detail-key">Visual ID</span><span className="detail-val td-mono">{animal.vid || '—'}</span></div>
                <div className="detail-row"><span className="detail-key">EID</span><span className="detail-val" style={{fontFamily:'IBM Plex Mono', fontSize:'11px'}}>{animal.eid || '—'}</span></div>
                <div className="detail-row"><span className="detail-key">Calf Code</span><span className="detail-val" style={{color:'var(--sky)'}}>{animal.calf_id_code || '—'}</span></div>
                <div className="detail-row"><span className="detail-key">Sex</span><span className="detail-val">{sexLabel(animal.sex)}</span></div>
                <div className="detail-row"><span className="detail-key">Breed</span><span className="detail-val">{animal.breed || '—'}</span></div>
                {animal.tag_color && <div className="detail-row"><span className="detail-key">Tag Color</span><span className="detail-val" style={{display:'flex', alignItems:'center', gap:'8px', textTransform:'capitalize'}}><span style={{width:'14px', height:'14px', borderRadius:'50%', background: animal.tag_color, border: animal.tag_color==='white'?'1px solid var(--ash)':'none'}}></span>{animal.tag_color}</span></div>}
                <div className="detail-row"><span className="detail-key">Date of Birth</span><span className="detail-val">{formatDate(animal.date_of_birth)}</span></div>
                {animal.registration_number && <div className="detail-row"><span className="detail-key">Reg. #</span><span className="detail-val">{animal.registration_number}</span></div>}
              </div>
              <div className="detail-card">
                <h3>Current Status</h3>
                <div className="detail-row"><span className="detail-key">Status</span><span className="detail-val"><span className={`status-dot status-${animal.status}`}></span>{animal.status}</span></div>
                <div className="detail-row"><span className="detail-key">Herd</span><span className="detail-val">{animal.herds?.name || '—'}</span></div>
                <div className="detail-row"><span className="detail-key">Owner</span><span className="detail-val" style={{color:'var(--sage)'}}>{animalOwners?.[animal.id] || '—'}</span></div>
                <div className="detail-row"><span className="detail-key">Breeding Status</span><span className="detail-val">{animal.breeding_status?.replace('_',' ') || '—'}</span></div>
                <div className="detail-row"><span className="detail-key">Is Cull</span><span className="detail-val" style={{color: animal.is_cull ? '#e05555' : 'var(--sage)'}}>{animal.is_cull ? 'YES' : 'No'}</span></div>
                {animal.is_cull && <div className="detail-row"><span className="detail-key">Cull Reason</span><span className="detail-val">{animal.cull_reason || '—'}</span></div>}
              </div>
              {animal.purchased && (
                <div className="detail-card">
                  <h3>Purchase Info</h3>
                  <div className="detail-row"><span className="detail-key">Purchase Date</span><span className="detail-val">{formatDate(animal.purchase_date)}</span></div>
                  <div className="detail-row"><span className="detail-key">Location</span><span className="detail-val">{animal.purchase_location || '—'}</span></div>
                  <div className="detail-row"><span className="detail-key">Price/Head</span><span className="detail-val">{animal.purchase_price_per_head ? `$${Number(animal.purchase_price_per_head).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}` : '—'}</span></div>
                </div>
              )}
              <div className="detail-card" style={{gridColumn: '1/-1'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}>
                  <h3 style={{margin:0}}>Notes</h3>
                  {!addingNote && <button className="btn btn-secondary" style={{padding:'6px 12px', fontSize:'12px'}} onClick={() => setAddingNote(true)}>+ Add Note</button>}
                </div>
                {addingNote && (
                  <div style={{marginBottom:'12px'}}>
                    <textarea className="form-textarea" value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Enter note..." rows={3} style={{marginBottom:'8px'}} />
                    <div style={{display:'flex', gap:'8px'}}>
                      <button className="btn btn-ghost" onClick={() => { setAddingNote(false); setNoteText(''); }}>Cancel</button>
                      <button className="btn btn-primary" onClick={handleAddNote}>Save Note</button>
                    </div>
                  </div>
                )}
                {form.notes ? <p style={{color:'var(--ash)', fontSize:'14px', lineHeight:'1.6', whiteSpace:'pre-wrap'}}>{form.notes}</p> : <p style={{color:'var(--ash)', fontSize:'13px', fontStyle:'italic'}}>No notes yet</p>}
              </div>
            </div>
          ))}

          {tab === 'calving' && (
            <div>
              <div style={{marginBottom:'16px', display:'flex', justifyContent:'flex-end'}}>
                {!showAddCalving && <button className="btn btn-primary" onClick={() => setShowAddCalving(true)}>+ Add Calving Record</button>}
              </div>

              {showAddCalving && (
                <div className="detail-card" style={{marginBottom:'16px'}}>
                  <h3>New Calving Record</h3>
                  <div className="form-grid" style={{marginTop:'12px'}}>
                    <div className="form-group"><label className="form-label">Calving Date *</label><input type="date" className="form-input" value={calvingForm.calving_date} onChange={e => setCalvingForm(f => ({...f, calving_date: e.target.value}))} /></div>
                    <div className="form-group"><label className="form-label">Calf Sex *</label><select className="form-select" value={calvingForm.calf_sex} onChange={e => setCalvingForm(f => ({...f, calf_sex: e.target.value}))}><option value="heifer">Heifer</option><option value="bull">Bull</option><option value="unknown">Unknown</option></select></div>
                    <div className="form-group"><label className="form-label">Calf Status *</label><select className="form-select" value={calvingForm.calf_status} onChange={e => setCalvingForm(f => ({...f, calf_status: e.target.value}))}><option value="alive">Alive</option><option value="dead">Dead</option><option value="stillborn">Stillborn</option></select></div>
                    <div className="form-group"><label className="form-label">Udder Score</label><select className="form-select" value={calvingForm.udder_score} onChange={e => setCalvingForm(f => ({...f, udder_score: e.target.value}))}><option value="">-- Select --</option><option value="A">A - Excellent</option><option value="B">B - Good</option><option value="C">C - Average</option><option value="D">D - Below Average</option><option value="E">E - Poor</option><option value="F">F - Very Poor</option></select></div>
                    <div className="form-group full"><label className="form-label">Notes</label><textarea className="form-textarea" value={calvingForm.notes} onChange={e => setCalvingForm(f => ({...f, notes: e.target.value}))} placeholder="Any additional notes..." rows={2} /></div>
                  </div>
                  <div style={{display:'flex', gap:'8px', marginTop:'12px', justifyContent:'flex-end'}}>
                    <button className="btn btn-ghost" onClick={() => setShowAddCalving(false)}>Cancel</button>
                    <button className="btn btn-primary" onClick={handleAddCalving}>Save Record</button>
                  </div>
                </div>
              )}

              {calvingRecords.length === 0 && !showAddCalving ? (
                <div className="empty-state"><h3>No calving records</h3><p>Click "Add Calving Record" to create the first record.</p></div>
              ) : calvingRecords.map((c, i) => (
                <div key={c.id} className="detail-card" style={{marginBottom:'12px'}}>
                  {editingCalvingId === c.id ? (
                    // ── INLINE EDIT FORM ─────────────────────────────────
                    <div>
                      <h3 style={{marginBottom:'14px'}}>Edit Calving Record</h3>
                      <div className="form-grid">
                        <div className="form-group">
                          <label className="form-label">Calving Date</label>
                          <input type="date" className="form-input" value={editCalvingForm.calving_date} onChange={e => setEditCalvingForm(f => ({...f, calving_date: e.target.value}))} />
                        </div>
                        <div className="form-group">
                          <label className="form-label">Calf Sex</label>
                          <select className="form-select" value={editCalvingForm.calf_sex} onChange={e => setEditCalvingForm(f => ({...f, calf_sex: e.target.value}))}>
                            <option value="heifer">Heifer</option><option value="bull">Bull</option><option value="unknown">Unknown</option>
                          </select>
                        </div>
                        <div className="form-group">
                          <label className="form-label">Calf Status</label>
                          <select className="form-select" value={editCalvingForm.calf_status} onChange={e => setEditCalvingForm(f => ({...f, calf_status: e.target.value}))}>
                            <option value="alive">Alive</option><option value="dead">Dead</option><option value="stillborn">Stillborn</option>
                          </select>
                        </div>
                        <div className="form-group">
                          <label className="form-label">Udder Score</label>
                          <select className="form-select" value={editCalvingForm.udder_score} onChange={e => setEditCalvingForm(f => ({...f, udder_score: e.target.value}))}>
                            <option value="">-- Select --</option>
                            <option value="A">A - Excellent</option><option value="B">B - Good</option><option value="C">C - Average</option>
                            <option value="D">D - Below Average</option><option value="E">E - Poor</option><option value="F">F - Very Poor</option>
                          </select>
                        </div>
                        <div className="form-group full">
                          <label className="form-label">Notes</label>
                          <textarea className="form-textarea" value={editCalvingForm.notes} onChange={e => setEditCalvingForm(f => ({...f, notes: e.target.value}))} rows={2} />
                        </div>
                      </div>
                      <div style={{display:'flex', gap:'8px', marginTop:'12px', justifyContent:'flex-end'}}>
                        <button className="btn btn-ghost" onClick={cancelCalvingEdit}>Cancel</button>
                        <button className="btn btn-primary" onClick={saveCalvingEdit}>Save Changes</button>
                      </div>
                    </div>
                  ) : (
                    // ── READ VIEW ────────────────────────────────────────
                    <>
                      <div className="calving-record-header">
                        <h3 style={{margin:0}}>Calving Event #{calvingRecords.length - i}</h3>
                        <div className="calving-record-actions">
                          <span style={{color:'var(--hay)', fontFamily:'IBM Plex Mono', fontSize:'12px', marginRight:'8px'}}>{formatDate(c.calving_date)}</span>
                          <button className="btn-icon btn-edit" onClick={() => startEditCalving(c)} title="Edit this record">✎ Edit</button>
                          <button className="btn-icon btn-del" onClick={() => confirmDeleteCalving(c.id)} title="Delete this record">✕ Delete</button>
                        </div>
                      </div>
                      <div className="detail-row"><span className="detail-key">Calf Sex</span><span className="detail-val">{c.calf_sex}</span></div>
                      <div className="detail-row"><span className="detail-key">Udder Score</span><span className="detail-val">{c.udder_score || '—'}</span></div>
                      <div className="detail-row"><span className="detail-key">Calf Status</span><span className="detail-val" style={{color: c.calf_status === 'alive' ? 'var(--sage)' : '#e05555'}}>{c.calf_status}</span></div>
                      {c.notes && <div style={{marginTop:'8px', color:'var(--ash)', fontSize:'13px'}}>{c.notes}</div>}
                      {i < calvingRecords.length - 1 && (
                        <div style={{marginTop:'8px', padding:'6px', background:'rgba(44,26,14,0.4)', borderRadius:'4px', fontFamily:'IBM Plex Mono', fontSize:'11px', color:'var(--hay)'}}>
                          Interval from previous: {Math.round((new Date(c.calving_date) - new Date(calvingRecords[i+1].calving_date)) / 86400000)} days
                        </div>
                      )}
                    </>
                  )}
                </div>
              ))}
            </div>
          )}

          {tab === 'breeding' && (
            <div>
              {breedingEvents.length === 0 ? <div className="empty-state"><h3>No breeding records</h3><p>Breeding events for this herd will appear here.</p></div>
              : breedingEvents.map(b => (
                <div key={b.id} className="detail-card" style={{marginBottom:'12px'}}>
                  <div style={{display:'flex', justifyContent:'space-between', marginBottom:'8px'}}>
                    <h3 style={{margin:0}}>Breeding Event</h3>
                    <span style={{color:'var(--hay)', fontFamily:'IBM Plex Mono', fontSize:'12px'}}>{formatDate(b.start_date)} — {formatDate(b.end_date)}</span>
                  </div>
                  <div className="detail-row"><span className="detail-key">Type</span><span className="detail-val">{b.breeding_type}</span></div>
                  <div className="detail-row"><span className="detail-key">Possible Sires</span><span className="detail-val">{b.breeding_event_sires?.map(s => s.animals?.vid).join(', ') || '—'}</span></div>
                  {b.notes && <div style={{marginTop:'8px', color:'var(--ash)', fontSize:'13px'}}>{b.notes}</div>}
                </div>
              ))}
            </div>
          )}

          {tab === 'health' && (
            <div>
              <div style={{marginBottom:'16px', display:'flex', justifyContent:'flex-end'}}>
                {!showAddTreatment && <button className="btn btn-primary" onClick={() => setShowAddTreatment(true)}>+ Add Treatment</button>}
              </div>
              {showAddTreatment && (
                <div className="detail-card" style={{marginBottom:'16px'}}>
                  <h3>New Treatment Record</h3>
                  <div className="form-grid" style={{marginTop:'12px'}}>
                    <div className="form-group"><label className="form-label">Treatment Date *</label><input type="date" className="form-input" value={treatmentForm.treatment_date} onChange={e => setTreatmentForm(f => ({...f, treatment_date: e.target.value}))} /></div>
                    <div className="form-group"><label className="form-label">Treatment Type *</label><select className="form-select" value={treatmentForm.treatment_type} onChange={e => setTreatmentForm(f => ({...f, treatment_type: e.target.value}))}><option value="vaccination">Vaccination</option><option value="antibiotic">Antibiotic</option><option value="dewormer">Dewormer</option><option value="vitamin">Vitamin</option><option value="other">Other</option></select></div>
                    <div className="form-group"><label className="form-label">Product Name *</label><input className="form-input" value={treatmentForm.product_name} onChange={e => setTreatmentForm(f => ({...f, product_name: e.target.value}))} placeholder="e.g. Vision 7, Bovi-Shield" /></div>
                    <div className="form-group"><label className="form-label">Lot Number</label><input className="form-input" value={treatmentForm.lot_number} onChange={e => setTreatmentForm(f => ({...f, lot_number: e.target.value}))} placeholder="Optional" /></div>
                    <div className="form-group"><label className="form-label">Dosage</label><input className="form-input" value={treatmentForm.dosage} onChange={e => setTreatmentForm(f => ({...f, dosage: e.target.value}))} placeholder="e.g. 2ml, 5cc" /></div>
                    <div className="form-group"><label className="form-label">Administered By</label><input className="form-input" value={treatmentForm.administered_by} onChange={e => setTreatmentForm(f => ({...f, administered_by: e.target.value}))} /></div>
                    <div className="form-group"><label className="form-label">Reason</label><input className="form-input" value={treatmentForm.reason} onChange={e => setTreatmentForm(f => ({...f, reason: e.target.value}))} /></div>
                    <div className="form-group"><label className="form-label">Withdrawal Date</label><input type="date" className="form-input" value={treatmentForm.withdrawal_date} onChange={e => setTreatmentForm(f => ({...f, withdrawal_date: e.target.value}))} /></div>
                  </div>
                  <div style={{display:'flex', gap:'8px', marginTop:'12px', justifyContent:'flex-end'}}>
                    <button className="btn btn-ghost" onClick={() => setShowAddTreatment(false)}>Cancel</button>
                    <button className="btn btn-primary" onClick={handleAddTreatment}>Save Treatment</button>
                  </div>
                </div>
              )}
              {treatments.length === 0 && !showAddTreatment ? <div className="empty-state"><h3>No treatment records</h3><p>Click "Add Treatment" to create the first record.</p></div>
              : treatments.map(t => (
                <div key={t.id} className="detail-card" style={{marginBottom:'10px'}}>
                  <div style={{display:'flex', justifyContent:'space-between', marginBottom:'8px'}}><h3 style={{margin:0}}>{t.product_name}</h3><span style={{color:'var(--hay)', fontFamily:'IBM Plex Mono', fontSize:'12px'}}>{formatDate(t.treatment_date)}</span></div>
                  <div className="detail-row"><span className="detail-key">Type</span><span className="detail-val">{t.treatment_type || '—'}</span></div>
                  <div className="detail-row"><span className="detail-key">Lot #</span><span className="detail-val">{t.lot_number || '—'}</span></div>
                  <div className="detail-row"><span className="detail-key">Dosage</span><span className="detail-val">{t.dosage || '—'}</span></div>
                  <div className="detail-row"><span className="detail-key">Reason</span><span className="detail-val">{t.reason || '—'}</span></div>
                  <div className="detail-row"><span className="detail-key">Administered By</span><span className="detail-val">{t.administered_by || '—'}</span></div>
                  <div className="detail-row"><span className="detail-key">Withdrawal</span><span className="detail-val">{formatDate(t.withdrawal_date)}</span></div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
          {tab === 'details' && (editing
            ? <><button className="btn btn-ghost" onClick={() => setEditing(false)}>Cancel</button><button className="btn btn-primary" onClick={handleSave}>Save Changes</button></>
            : <button className="btn btn-secondary" onClick={() => setEditing(true)}>Edit Animal</button>
          )}
        </div>
      </div>

      {/* ── DELETE CONFIRMATION MODAL ── */}
      {deletingCalvingId && (
        <div className="modal-overlay" style={{zIndex:300}}>
          <div className="modal" style={{maxWidth:'400px'}}>
            <div className="modal-header">
              <h2 className="modal-title">Delete Calving Record?</h2>
              <button className="modal-close" onClick={() => setDeletingCalvingId(null)}>✕</button>
            </div>
            <div className="modal-body">
              <p style={{color:'var(--ash)', fontSize:'14px', lineHeight:'1.6'}}>
                This will permanently delete this calving record. This action <strong style={{color:'#e05555'}}>cannot be undone</strong>.
              </p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={() => setDeletingCalvingId(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={executeDeleteCalving}>Delete Record</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== CALVING GAP PAGE (NEW) =====
