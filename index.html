// ──────────────────────────────────────────────────────────────────────────
// LANDLORDS PAGE
// ──────────────────────────────────────────────────────────────────────────
function LandlordsPage({ toast }) {
  const [landlords, setLandlords] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({});

  React.useEffect(() => { loadLandlords(); }, []);

  async function loadLandlords() {
    const { data, error } = await supabase.from('landlords').select('*').order('name');
    if (error) {
      toast('Error loading landlords', 'error');
    } else {
      setLandlords(data || []);
    }
    setLoading(false);
  }

  async function saveLandlord() {
    if (!form.name) {
      toast('Name is required', 'error');
      return;
    }
    const { error } = form.id
      ? await supabase.from('landlords').update(form).eq('id', form.id)
      : await supabase.from('landlords').insert([form]);
    if (error) {
      toast('Error saving landlord', 'error');
    } else {
      toast(`Landlord ${form.id ? 'updated' : 'added'}`, 'success');
      setModal(null);
      loadLandlords();
    }
  }

  async function deleteLandlord(id) {
    if (!confirm('Delete this landlord?')) return;
    const { error } = await supabase.from('landlords').delete().eq('id', id);
    if (error) {
      toast('Error deleting landlord', 'error');
    } else {
      toast('Landlord deleted', 'success');
      loadLandlords();
    }
  }

  if (loading) return <div className="empty-state"><h3>Loading...</h3></div>;

  return (
    <>
      <div style={{ marginBottom: '24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: '13px', color: 'var(--ash)' }}>
          {landlords.length} landlord{landlords.length !== 1 ? 's' : ''}
        </div>
        <button className="btn btn-primary" onClick={() => { setForm({}); setModal('edit'); }}>
          + Add Landlord
        </button>
      </div>

      {landlords.length === 0 ? (
        <div className="empty-state">
          <h3>No Landlords Yet</h3>
          <p>Add landlords to track pasture ownership. Rent rates are set per-pasture.</p>
        </div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>NAME</th>
                <th>CONTACT</th>
                <th>NOTES</th>
                <th style={{ width: '100px' }}>ACTIONS</th>
              </tr>
            </thead>
            <tbody>
              {landlords.map(l => (
                <tr key={l.id}>
                  <td style={{ fontWeight: 600 }}>{l.name}</td>
                  <td style={{ fontSize: '13px', color: 'var(--ash)' }}>{l.contact_info || '—'}</td>
                  <td style={{ fontSize: '13px', color: 'var(--ash)', maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {l.notes || '—'}
                  </td>
                  <td>
                    <button className="btn btn-ghost" style={{ padding: '4px 10px', fontSize: '12px', marginRight: '6px' }}
                      onClick={() => { setForm(l); setModal('edit'); }}>Edit</button>
                    <button className="btn btn-danger" style={{ padding: '4px 10px', fontSize: '12px' }}
                      onClick={() => deleteLandlord(l.id)}>Del</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {modal === 'edit' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2 className="modal-title">{form.id ? 'Edit' : 'Add'} Landlord</h2>
              <button className="modal-close" onClick={() => setModal(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div className="form-group full">
                  <label className="form-label">Name *</label>
                  <input className="form-input" value={form.name || ''} onChange={e => setForm({...form, name: e.target.value})} placeholder="Brett Huber" />
                </div>
                <div className="form-group full">
                  <label className="form-label">Contact Info</label>
                  <input className="form-input" value={form.contact_info || ''} onChange={e => setForm({...form, contact_info: e.target.value})} placeholder="Phone or email" />
                </div>
                <div className="form-group full">
                  <label className="form-label">Notes</label>
                  <textarea className="form-textarea" rows="3" value={form.notes || ''} onChange={e => setForm({...form, notes: e.target.value})} />
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveLandlord}>Save</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// PASTURES PAGE
// ──────────────────────────────────────────────────────────────────────────
function PasturesPage({ toast }) {
  const [pastures, setPastures] = React.useState([]);
  const [landlords, setLandlords] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({});
  const [searchTerm, setSearchTerm] = React.useState('');
  const [landlordFilter, setLandlordFilter] = React.useState('all');

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    const [{ data: p }, { data: l }] = await Promise.all([
      supabase.from('pastures').select('*, landlord:landlords(name)').order('name'),
      supabase.from('landlords').select('*').order('name')
    ]);
    setPastures(p || []);
    setLandlords(l || []);
    setLoading(false);
  }

  async function savePasture() {
    if (!form.name || !form.acres) {
      toast('Name and acres are required', 'error');
      return;
    }
    const payload = {
      name: form.name,
      acres: parseFloat(form.acres),
      pct_grazable: form.pct_grazable ? parseFloat(form.pct_grazable) : 1.0,
      base_type: form.base_type || 'permanent_pasture',
      landlord_id: form.landlord_id || null,
      rent_type: form.rent_type || 'per_aum',
      rent_rate: form.rent_rate ? parseFloat(form.rent_rate) : 0,
      cool_season_pct: form.cool_season_pct ? parseInt(form.cool_season_pct) : null,
      warm_season_pct: form.warm_season_pct ? parseInt(form.warm_season_pct) : null,
      general_notes: form.general_notes || null,
    };
    const { error } = form.id
      ? await supabase.from('pastures').update(payload).eq('id', form.id)
      : await supabase.from('pastures').insert([payload]);
    if (error) {
      toast('Error saving pasture', 'error');
    } else {
      toast(`Pasture ${form.id ? 'updated' : 'added'}`, 'success');
      setModal(null);
      loadData();
    }
  }

  async function deletePasture(id) {
    if (!confirm('Delete this pasture?')) return;
    const { error } = await supabase.from('pastures').update({ is_active: false }).eq('id', id);
    if (error) {
      toast('Error deleting pasture', 'error');
    } else {
      toast('Pasture archived', 'success');
      loadData();
    }
  }

  const filtered = pastures.filter(p => {
    const matchSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm.toLowerCase());
    const matchLandlord = landlordFilter === 'all' || p.landlord_id === landlordFilter;
    return p.is_active && matchSearch && matchLandlord;
  });

  if (loading) return <div className="empty-state"><h3>Loading...</h3></div>;

  return (
    <>
      <div className="filter-bar">
        <div className="search-box">
          <span className="search-icon">🔍</span>
          <input type="text" placeholder="Search pastures..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
        </div>
        <select className="filter-select" value={landlordFilter} onChange={e => setLandlordFilter(e.target.value)}>
          <option value="all">All Landlords</option>
          {landlords.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
        </select>
        <button className="btn btn-primary" onClick={() => { setForm({}); setModal('edit'); }}>
          + Add Pasture
        </button>
      </div>

      <div style={{ marginBottom: '16px', fontFamily: 'IBM Plex Mono, monospace', fontSize: '13px', color: 'var(--ash)' }}>
        {filtered.length} pasture{filtered.length !== 1 ? 's' : ''} • {filtered.reduce((sum, p) => sum + parseFloat(p.acres || 0), 0).toFixed(1)} total acres
      </div>

      {filtered.length === 0 ? (
        <div className="empty-state">
          <h3>No Pastures Found</h3>
          <p>{searchTerm || landlordFilter !== 'all' ? 'Try adjusting your filters' : 'Add pastures to start tracking grazing'}</p>
        </div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>NAME</th>
                <th>ACRES</th>
                <th>TYPE</th>
                <th>LANDLORD</th>
                <th>RENT</th>
                <th>GRAZABLE</th>
                <th>NOTES</th>
                <th style={{ width: '100px' }}>ACTIONS</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.id}>
                  <td style={{ fontWeight: 600 }}>{p.name}</td>
                  <td className="td-mono">{p.acres} ac</td>
                  <td style={{ fontSize: '12px', textTransform: 'capitalize' }}>{(p.base_type || 'pasture').replace(/_/g, ' ')}</td>
                  <td style={{ fontSize: '13px', color: 'var(--sage)' }}>{p.landlord?.name || '—'}</td>
                  <td className="td-mono" style={{ fontSize: '12px' }}>
                    {p.rent_type === 'none' ? 'Owned' : 
                     p.rent_type === 'per_aum' ? `$${p.rent_rate}/AUM` :
                     p.rent_type === 'per_acre' ? `$${p.rent_rate}/ac` :
                     p.rent_type === 'per_head_day' ? `$${p.rent_rate}/hd/day` : '—'}
                  </td>
                  <td className="td-mono">{(parseFloat(p.pct_grazable || 1) * 100).toFixed(0)}%</td>
                  <td style={{ fontSize: '13px', color: 'var(--ash)', maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {p.general_notes || '—'}
                  </td>
                  <td>
                    <button className="btn btn-ghost" style={{ padding: '4px 10px', fontSize: '12px', marginRight: '6px' }}
                      onClick={() => { setForm(p); setModal('edit'); }}>Edit</button>
                    <button className="btn btn-danger" style={{ padding: '4px 10px', fontSize: '12px' }}
                      onClick={() => deletePasture(p.id)}>Del</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {modal === 'edit' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2 className="modal-title">{form.id ? 'Edit' : 'Add'} Pasture</h2>
              <button className="modal-close" onClick={() => setModal(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div className="form-group full">
                  <label className="form-label">Pasture Name *</label>
                  <input className="form-input" value={form.name || ''} onChange={e => setForm({...form, name: e.target.value})} placeholder="Huber Calvin SW 80" />
                </div>
                <div className="form-group">
                  <label className="form-label">Acres *</label>
                  <input className="form-input" type="number" step="0.1" value={form.acres || ''} 
                    onChange={e => setForm({...form, acres: e.target.value})} placeholder="80.0" />
                </div>
                <div className="form-group">
                  <label className="form-label">% Grazable</label>
                  <input className="form-input" type="number" step="0.01" min="0" max="1" value={form.pct_grazable || ''} 
                    onChange={e => setForm({...form, pct_grazable: e.target.value})} placeholder="1.0" />
                </div>
                <div className="form-group">
                  <label className="form-label">Type</label>
                  <select className="form-select" value={form.base_type || ''} onChange={e => setForm({...form, base_type: e.target.value})}>
                    <option value="permanent_pasture">Permanent Pasture</option>
                    <option value="cropland">Cropland</option>
                    <option value="hayfield">Hayfield</option>
                    <option value="crp">CRP</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Landlord</label>
                  <select className="form-select" value={form.landlord_id || ''} onChange={e => setForm({...form, landlord_id: e.target.value || null})}>
                    <option value="">None</option>
                    {landlords.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Rent Type</label>
                  <select className="form-select" value={form.rent_type || 'per_aum'} onChange={e => setForm({...form, rent_type: e.target.value})}>
                    <option value="per_aum">Per AUM</option>
                    <option value="per_acre">Per Acre (Annual)</option>
                    <option value="per_head_day">Per Head/Day</option>
                    <option value="none">Owned (No Rent)</option>
                  </select>
                  {form.rent_type === 'per_acre' && (
                    <div style={{ fontSize: '11px', color: 'var(--ash)', marginTop: '4px' }}>
                      Per-acre is a flat annual rate (Jan 1 - Dec 31)
                    </div>
                  )}
                </div>
                <div className="form-group">
                  <label className="form-label">Rent Rate</label>
                  <input className="form-input" type="number" step="0.01" value={form.rent_rate || ''} 
                    onChange={e => setForm({...form, rent_rate: e.target.value})} placeholder="18.50" 
                    disabled={form.rent_type === 'none'} />
                </div>
                <div className="form-group">
                  <label className="form-label">Cool Season %</label>
                  <input className="form-input" type="number" min="0" max="100" value={form.cool_season_pct || ''} 
                    onChange={e => setForm({...form, cool_season_pct: e.target.value})} placeholder="70" />
                </div>
                <div className="form-group">
                  <label className="form-label">Warm Season %</label>
                  <input className="form-input" type="number" min="0" max="100" value={form.warm_season_pct || ''} 
                    onChange={e => setForm({...form, warm_season_pct: e.target.value})} placeholder="30" />
                </div>
                <div className="form-group full">
                  <label className="form-label">Notes</label>
                  <textarea className="form-textarea" rows="3" value={form.general_notes || ''} 
                    onChange={e => setForm({...form, general_notes: e.target.value})} 
                    placeholder="Water sources, fence condition, best season of use..." />
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={savePasture}>Save</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// RECORD MOVE PAGE (The Core Functionality)
// ──────────────────────────────────────────────────────────────────────────
function RecordMovePage({ toast }) {
  const [herds, setHerds] = React.useState([]);
  const [pastures, setPastures] = React.useState([]);
  const [form, setForm] = React.useState({ actual_entry_date: new Date().toISOString().split('T')[0] });
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    const [{ data: h }, { data: p }] = await Promise.all([
      supabase.from('herds').select('id, name, head_count, default_au').eq('is_active', true).order('name'),
      supabase.from('pastures').select('id, name, acres, pct_grazable').eq('is_active', true).order('name')
    ]);
    setHerds(h || []);
    setPastures(p || []);
    setLoading(false);
  }

  async function recordMove() {
    if (!form.herd_id || !form.pasture_id || !form.actual_entry_date) {
      toast('Please select herd, pasture, and date', 'error');
      return;
    }

    // Close out previous move for this herd
    const { data: prevMove } = await supabase
      .from('grazing_events')
      .select('id')
      .eq('herd_id', form.herd_id)
      .is('actual_exit_date', null)
      .single();

    if (prevMove) {
      await supabase
        .from('grazing_events')
        .update({ actual_exit_date: form.actual_entry_date })
        .eq('id', prevMove.id);
    }

    // Get herd details for AU calculation
    const selectedHerd = herds.find(h => h.id === form.herd_id);
    const selectedPasture = pastures.find(p => p.id === form.pasture_id);

    const payload = {
      herd_id: form.herd_id,
      pasture_id: form.pasture_id,
      pasture_type: form.pasture_type || 'permanent_pasture',
      actual_entry_date: form.actual_entry_date,
      actual_head_count: selectedHerd?.head_count || null,
      actual_au_per_head: selectedHerd?.default_au || 1.0,
      entry_forage_condition: form.entry_forage_condition || null,
      notes: form.notes || null,
    };

    const { error } = await supabase.from('grazing_events').insert([payload]);

    if (error) {
      toast('Error recording move', 'error');
      console.error(error);
    } else {
      toast(`Moved ${selectedHerd?.name} to ${selectedPasture?.name}`, 'success');
      setForm({ actual_entry_date: new Date().toISOString().split('T')[0] });
    }
  }

  if (loading) return <div className="empty-state"><h3>Loading...</h3></div>;

  const selectedHerd = herds.find(h => h.id === form.herd_id);

  return (
    <div style={{ maxWidth: '600px' }}>
      <div style={{ background: 'var(--charcoal)', border: '1px solid rgba(139,69,19,0.3)', borderRadius: '8px', padding: '28px' }}>
        <h3 style={{ fontFamily: 'Playfair Display, serif', fontSize: '22px', color: 'var(--cream)', marginBottom: '24px' }}>
          Record Herd Move
        </h3>

        <div className="form-grid">
          <div className="form-group full">
            <label className="form-label">Herd *</label>
            <select className="form-select" value={form.herd_id || ''} onChange={e => setForm({...form, herd_id: e.target.value})}>
              <option value="">Select herd...</option>
              {herds.map(h => <option key={h.id} value={h.id}>{h.name} ({h.head_count} head)</option>)}
            </select>
          </div>

          <div className="form-group full">
            <label className="form-label">New Pasture *</label>
            <select className="form-select" value={form.pasture_id || ''} onChange={e => setForm({...form, pasture_id: e.target.value})}>
              <option value="">Select pasture...</option>
              {pastures.map(p => <option key={p.id} value={p.id}>{p.name} ({p.acres} ac)</option>)}
            </select>
          </div>

          <div className="form-group">
            <label className="form-label">Move Date *</label>
            <input className="form-input" type="date" value={form.actual_entry_date || ''} 
              onChange={e => setForm({...form, actual_entry_date: e.target.value})} />
          </div>

          <div className="form-group">
            <label className="form-label">Pasture Type</label>
            <select className="form-select" value={form.pasture_type || ''} onChange={e => setForm({...form, pasture_type: e.target.value})}>
              <option value="permanent_pasture">Permanent Pasture</option>
              <option value="cornstalk">Cornstalk</option>
              <option value="cover_crop">Cover Crop</option>
            </select>
          </div>

          <div className="form-group full">
            <label className="form-label">Forage Condition</label>
            <textarea className="form-textarea" rows="2" value={form.entry_forage_condition || ''} 
              onChange={e => setForm({...form, entry_forage_condition: e.target.value})} 
              placeholder="Height, condition, quality notes..." />
          </div>

          <div className="form-group full">
            <label className="form-label">Notes</label>
            <textarea className="form-textarea" rows="2" value={form.notes || ''} 
              onChange={e => setForm({...form, notes: e.target.value})} 
              placeholder="Any additional notes about this move..." />
          </div>
        </div>

        {selectedHerd && (
          <div style={{ marginTop: '20px', padding: '12px', background: 'rgba(193,68,14,0.1)', border: '1px solid rgba(193,68,14,0.3)', borderRadius: '4px', fontSize: '13px', color: 'var(--ash)' }}>
            <strong style={{ color: 'var(--cream)' }}>Herd Info:</strong> {selectedHerd.head_count} head × {selectedHerd.default_au} AU = {(selectedHerd.head_count * selectedHerd.default_au).toFixed(1)} total AU
          </div>
        )}

        <div style={{ marginTop: '24px', display: 'flex', gap: '12px' }}>
          <button className="btn btn-secondary" onClick={() => setForm({ actual_entry_date: new Date().toISOString().split('T')[0] })}>
            Clear
          </button>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={recordMove}>
            Record Move
          </button>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// MOVE HISTORY PAGE
// ──────────────────────────────────────────────────────────────────────────
function MoveHistoryPage({ toast }) {
  const [moves, setMoves] = React.useState([]);
  const [herds, setHerds] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [herdFilter, setHerdFilter] = React.useState('all');

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    const [{ data: m }, { data: h }] = await Promise.all([
      supabase.from('grazing_events')
        .select('*, herd:herds(name), pasture:pastures(name, acres, pct_grazable, rent_type, rent_rate, landlord:landlords(name))')
        .order('actual_entry_date', { ascending: false }),
      supabase.from('herds').select('id, name').eq('is_active', true).order('name')
    ]);

    // Calculate AUMs for each move
    const movesWithCalcs = (m || []).map(move => {
      const days = move.actual_exit_date 
        ? Math.ceil((new Date(move.actual_exit_date) - new Date(move.actual_entry_date)) / (1000 * 60 * 60 * 24))
        : null;
      
      const totalAU = (move.actual_head_count || 0) * (move.actual_au_per_head || 1);
      const totalAD = days ? totalAU * days : null;
      const totalAUMs = totalAD ? totalAD / 30 : null;
      const acres = parseFloat(move.pasture?.acres || 0);
      const grazable = parseFloat(move.pasture?.pct_grazable || 1);
      const ada = (days && acres > 0) ? totalAD / (acres * grazable) : null;
      
      // Calculate rent based on rent_type
      let rentCost = null;
      let rentDisplay = null;
      const rentType = move.pasture?.rent_type;
      const rentRate = parseFloat(move.pasture?.rent_rate || 0);
      
      if (rentType === 'per_aum' && totalAUMs) {
        rentCost = totalAUMs * rentRate;
        rentDisplay = `$${rentCost.toFixed(2)}`;
      } else if (rentType === 'per_acre') {
        // Per-acre is annual, not per-event - show the annual rate but don't sum it per event
        rentCost = null; // Don't include in per-event totals
        rentDisplay = `Annual: $${(acres * rentRate).toFixed(2)}`;
      } else if (rentType === 'per_head_day' && days && move.actual_head_count) {
        rentCost = move.actual_head_count * days * rentRate;
        rentDisplay = `$${rentCost.toFixed(2)}`;
      } else if (rentType === 'none') {
        rentDisplay = 'Owned';
      } else {
        rentDisplay = '—';
      }
      
      return { ...move, days, totalAU, totalAD, totalAUMs, ada, rentCost, rentDisplay };
    });

    setMoves(movesWithCalcs);
    setHerds(h || []);
    setLoading(false);
  }

  const filtered = herdFilter === 'all' ? moves : moves.filter(m => m.herd_id === herdFilter);

  if (loading) return <div className="empty-state"><h3>Loading...</h3></div>;

  return (
    <>
      <div className="filter-bar">
        <select className="filter-select" value={herdFilter} onChange={e => setHerdFilter(e.target.value)}>
          <option value="all">All Herds</option>
          {herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
        </select>
        <div style={{ flex: 1, fontFamily: 'IBM Plex Mono, monospace', fontSize: '13px', color: 'var(--ash)' }}>
          {filtered.length} move{filtered.length !== 1 ? 's' : ''} • {filtered.filter(m => m.totalAUMs).reduce((sum, m) => sum + m.totalAUMs, 0).toFixed(1)} total AUMs • ${filtered.filter(m => m.rentCost).reduce((sum, m) => sum + m.rentCost, 0).toFixed(2)} variable rent (excludes annual per-acre)
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="empty-state">
          <h3>No Moves Recorded</h3>
          <p>Record your first move to start tracking grazing history</p>
        </div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>HERD</th>
                <th>PASTURE</th>
                <th>ENTRY</th>
                <th>EXIT</th>
                <th>DAYS</th>
                <th>HEAD</th>
                <th>AU</th>
                <th>ADA</th>
                <th>AUMs</th>
                <th>RENT</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(m => (
                <tr key={m.id}>
                  <td style={{ fontWeight: 600 }}>{m.herd?.name}</td>
                  <td style={{ color: 'var(--sage)' }}>{m.pasture?.name}</td>
                  <td className="td-mono" style={{ fontSize: '12px' }}>{new Date(m.actual_entry_date).toLocaleDateString()}</td>
                  <td className="td-mono" style={{ fontSize: '12px' }}>
                    {m.actual_exit_date ? new Date(m.actual_exit_date).toLocaleDateString() : <em style={{ color: 'var(--hay)' }}>Active</em>}
                  </td>
                  <td className="td-mono">{m.days || '—'}</td>
                  <td className="td-mono">{m.actual_head_count || '—'}</td>
                  <td className="td-mono">{m.totalAU ? m.totalAU.toFixed(1) : '—'}</td>
                  <td className="td-mono">{m.ada ? m.ada.toFixed(1) : '—'}</td>
                  <td className="td-mono" style={{ fontWeight: 600, color: 'var(--hay)' }}>
                    {m.totalAUMs ? m.totalAUMs.toFixed(1) : '—'}
                  </td>
                  <td style={{ fontSize: '12px', color: m.rentCost ? 'var(--rust)' : 'var(--ash)' }}>
                    {m.rentDisplay}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </>
  );
}

function PastureImportPage({ toast }) {
  const [file, setFile] = React.useState(null);
  const [preview, setPreview] = React.useState([]);
  const [landlords, setLandlords] = React.useState([]);
  const [errors, setErrors] = React.useState([]);
  const [importing, setImporting] = React.useState(false);
  const [step, setStep] = React.useState(1); // 1=upload, 2=preview, 3=complete

  React.useEffect(() => { loadLandlords(); }, []);

  async function loadLandlords() {
    const { data } = await supabase.from('landlords').select('id, name').order('name');
    setLandlords(data || []);
  }

  function handleFileUpload(e) {
    const uploadedFile = e.target.files[0];
    if (!uploadedFile) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const text = event.target.result;
      parseCSV(text);
    };
    reader.readAsText(uploadedFile);
    setFile(uploadedFile);
  }

  function parseCSV(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    if (lines.length < 2) {
      toast('CSV file is empty or invalid', 'error');
      return;
    }

    const headers = lines[0].split(',').map(h => h.trim());
    const expectedHeaders = ['name', 'acres', 'pct_grazable', 'base_type', 'landlord_name', 'rent_type', 'rent_rate', 'cool_season_pct', 'warm_season_pct', 'general_notes'];
    
    const rows = lines.slice(1).map((line, idx) => {
      const values = line.split(',').map(v => v.trim());
      const row = {};
      headers.forEach((header, i) => {
        row[header] = values[i] || '';
      });
      row._lineNumber = idx + 2; // +2 because line 1 is headers, and we're 0-indexed
      return row;
    });

    // Validate and match landlords
    const validatedRows = rows.map(row => {
      const issues = [];
      
      if (!row.name) issues.push('Missing name');
      if (!row.acres || isNaN(parseFloat(row.acres))) issues.push('Invalid acres');
      
      // Validate rent_type if provided
      const validRentTypes = ['per_aum', 'per_acre', 'per_head_day', 'none'];
      if (row.rent_type && !validRentTypes.includes(row.rent_type)) {
        issues.push(`Invalid rent_type: ${row.rent_type}`);
      }
      
      // Match landlord by name
      let landlordId = null;
      if (row.landlord_name) {
        const landlord = landlords.find(l => 
          l.name.toLowerCase() === row.landlord_name.toLowerCase()
        );
        if (landlord) {
          landlordId = landlord.id;
        } else {
          issues.push(`Landlord "${row.landlord_name}" not found`);
        }
      }

      return {
        ...row,
        landlord_id: landlordId,
        _issues: issues,
        _valid: issues.length === 0
      };
    });

    setPreview(validatedRows);
    setErrors(validatedRows.filter(r => !r._valid));
    setStep(2);
  }

  async function executeImport() {
    const validRows = preview.filter(r => r._valid);
    if (validRows.length === 0) {
      toast('No valid rows to import', 'error');
      return;
    }

    setImporting(true);

    const pastures = validRows.map(row => ({
      name: row.name,
      acres: parseFloat(row.acres),
      pct_grazable: row.pct_grazable ? 
        (row.pct_grazable.includes('%') ? 
          parseFloat(row.pct_grazable.replace('%', '')) / 100 : 
          parseFloat(row.pct_grazable)) : 1.0,
      base_type: row.base_type && row.base_type.trim() ? row.base_type.trim().toLowerCase() : 'permanent_pasture',
      landlord_id: row.landlord_id || null,
      rent_type: row.rent_type && row.rent_type.trim() ? row.rent_type.trim() : 'none',
      rent_rate: row.rent_rate && row.rent_rate.trim() ? parseFloat(row.rent_rate) : 0,
      cool_season_pct: row.cool_season_pct ? parseInt(row.cool_season_pct) : null,
      warm_season_pct: row.warm_season_pct ? parseInt(row.warm_season_pct) : null,
      general_notes: row.general_notes || null,
      is_active: true
    }));

    const { data, error } = await supabase.from('pastures').insert(pastures);

    setImporting(false);

    if (error) {
      toast(`Import failed: ${error.message}`, 'error');
      console.error(error);
    } else {
      toast(`Successfully imported ${validRows.length} pastures`, 'success');
      setStep(3);
    }
  }

  function reset() {
    setFile(null);
    setPreview([]);
    setErrors([]);
    setStep(1);
  }

  if (step === 3) {
    return (
      <div style={{ maxWidth: '600px', margin: '0 auto' }}>
        <div style={{ background: 'var(--charcoal)', border: '1px solid rgba(139,69,19,0.3)', borderRadius: '8px', padding: '40px', textAlign: 'center' }}>
          <div style={{ fontSize: '48px', marginBottom: '16px' }}>✓</div>
          <h3 style={{ fontFamily: 'Playfair Display, serif', fontSize: '24px', color: 'var(--cream)', marginBottom: '12px' }}>
            Import Complete
          </h3>
          <p style={{ color: 'var(--ash)', marginBottom: '24px' }}>
            {preview.filter(r => r._valid).length} pastures successfully imported
          </p>
          <div style={{ display: 'flex', gap: '12px', justifyContent: 'center' }}>
            <button className="btn btn-secondary" onClick={reset}>Import More</button>
            <button className="btn btn-primary" onClick={() => window.location.href = '?page=pastures'}>
              View Pastures
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: '900px' }}>
      {step === 1 && (
        <div style={{ background: 'var(--charcoal)', border: '1px solid rgba(139,69,19,0.3)', borderRadius: '8px', padding: '32px' }}>
          <h3 style={{ fontFamily: 'Playfair Display, serif', fontSize: '22px', color: 'var(--cream)', marginBottom: '16px' }}>
            Import Pastures from CSV
          </h3>

          <div style={{ background: 'rgba(193,68,14,0.1)', border: '1px solid rgba(193,68,14,0.3)', borderRadius: '6px', padding: '16px', marginBottom: '24px' }}>
            <div style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: '11px', letterSpacing: '1px', color: 'var(--hay)', marginBottom: '8px' }}>
              CSV FORMAT REQUIRED:
            </div>
            <pre style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: '12px', color: 'var(--cream)', overflow: 'auto', margin: 0 }}>
{`name,acres,pct_grazable,base_type,landlord_name,rent_type,rent_rate,cool_season_pct,warm_season_pct,general_notes
Huber Calvin SW 80,80.0,1.0,permanent_pasture,Brett Huber,per_aum,18.50,70,30,Good water
Berens North,160.0,0.95,permanent_pasture,Brett Huber,per_acre,25.00,60,40,
Dakota Lakes East,240.5,1.0,cropland,Dakota Lakes,none,0,,,Owned land`}
            </pre>
          </div>

          <div style={{ marginBottom: '16px' }}>
            <div style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: '11px', letterSpacing: '2px', color: 'var(--ash)', marginBottom: '8px' }}>
              FIELD NOTES:
            </div>
            <ul style={{ fontSize: '13px', color: 'var(--ash)', lineHeight: '1.6', paddingLeft: '20px' }}>

              <li><strong style={{ color: 'var(--cream)' }}>rent_type</strong>: per_aum, per_acre, per_head_day, or none (defaults to per_aum)</li>
              <li><strong style={{ color: 'var(--cream)' }}>rent_rate</strong>: dollar amount (defaults to 0)</li>

      {step === 2 && (
        <>
          <div style={{ background: 'var(--charcoal)', border: '1px solid rgba(139,69,19,0.3)', borderRadius: '8px', padding: '24px', marginBottom: '20px' }}>

            </h3>
            
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '20px' }}>
              <div style={{ background: 'rgba(92,184,92,0.1)', border: '1px solid rgba(92,184,92,0.3)', borderRadius: '4px', padding: '12px' }}>
                <div style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: '11px', color: 'var(--ash)', marginBottom: '4px' }}>
                  VALID ROWS
                </div>

function CalvingGapPage({ toast }) {
  const today = new Date();
  const oneYearAgo = new Date(today); oneYearAgo.setFullYear(today.getFullYear() - 1);
  const fmt = d => d.toISOString().split('T')[0];

  const [herds, setHerds] = useState([]);
  const [herdFilter, setHerdFilter] = useState('');
  const [mode, setMode] = useState('no_record_in_range');
  const [rangeStart, setRangeStart] = useState(fmt(oneYearAgo));
  const [rangeEnd, setRangeEnd] = useState(fmt(today));
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [sortCol, setSortCol] = useState('days_since');
  const [sortDir, setSortDir] = useState('desc');

  useEffect(() => {
    supabase.from('herds').select('*').order('name').then(({ data }) => setHerds(data || []));
  }, []);

  const runFilter = async () => {
    if (!rangeStart || !rangeEnd) { toast('Please pick a date range', 'error'); return; }
    setLoading(true);

    // 1. Fetch active cows/heifers
    let q = supabase.from('animals')
      .select('id, vid, sex, herd_id, breeding_status, herds(name)')
      .in('sex', ['cow', 'heifer'])
      .eq('status', 'active')
      .order('vid');
    if (herdFilter) q = q.eq('herd_id', herdFilter);
    const { data: cows, error } = await q;
    if (error) { toast('Error loading animals: ' + error.message, 'error'); setLoading(false); return; }
    if (!cows || cows.length === 0) { setResults([]); setLoading(false); return; }

    // 2. Fetch all calving records for those cows
    const cowIds = cows.map(c => c.id);
    const { data: calvings } = await supabase
      .from('calving_records')
      .select('dam_id, calving_date')
      .in('dam_id', cowIds)
      .order('calving_date', { ascending: false });

    // 3. Build map: dam_id -> all calving dates (most recent first)
    const calvingMap = {};
    (calvings || []).forEach(r => {
      if (!calvingMap[r.dam_id]) calvingMap[r.dam_id] = [];
      calvingMap[r.dam_id].push(r.calving_date);
    });

    // 4. Apply mode filter
    let filtered;
    if (mode === 'no_record_in_range') {
      // Cows with NO calving record dated within [rangeStart, rangeEnd]
      const inRange = new Set(
        (calvings || []).filter(r => r.calving_date >= rangeStart && r.calving_date <= rangeEnd).map(r => r.dam_id)
      );
      filtered = cows.filter(c => !inRange.has(c.id));
    } else {
      // 'last_before_start': most recent calving is before rangeStart, OR never calved
      filtered = cows.filter(c => {
        const mostRecent = calvingMap[c.id]?.[0];
        if (!mostRecent) return true; // never calved
        return mostRecent < rangeStart;
      });
    }

    // 5. Annotate
    const todayMs = Date.now();
    const annotated = filtered.map(c => {
      const mostRecent = calvingMap[c.id]?.[0] || null;
      const daysSince = mostRecent ? Math.floor((todayMs - new Date(mostRecent).getTime()) / 86400000) : null;
      return { ...c, lastCalvingDate: mostRecent, totalCalvings: calvingMap[c.id]?.length || 0, daysSince };
    });

    setResults(annotated);
    setLoading(false);
    toast(`Found ${annotated.length} cow${annotated.length !== 1 ? 's' : ''}`, 'success');
  };

  const sortedResults = useMemo(() => {
    if (!results) return [];
    return [...results].sort((a, b) => {
      let av, bv;
      if (sortCol === 'vid') { av = a.vid || ''; bv = b.vid || ''; }
      else if (sortCol === 'herd') { av = a.herds?.name || ''; bv = b.herds?.name || ''; }
      else if (sortCol === 'last_calving') { av = a.lastCalvingDate || ''; bv = b.lastCalvingDate || ''; }
      else if (sortCol === 'days_since') { av = a.daysSince ?? 99999; bv = b.daysSince ?? 99999; }
      else if (sortCol === 'total') { av = a.totalCalvings; bv = b.totalCalvings; }
      else if (sortCol === 'breeding') { av = a.breeding_status || ''; bv = b.breeding_status || ''; }
      else { av = ''; bv = ''; }
      if (typeof av === 'number') return sortDir === 'asc' ? av - bv : bv - av;
      return sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });
  }, [results, sortCol, sortDir]);

  const handleSort = (col) => { if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(col); setSortDir(col === 'days_since' ? 'desc' : 'asc'); } };
  const SortTh = ({ col, label }) => (
    <th onClick={() => handleSort(col)} style={{cursor:'pointer', userSelect:'none'}}>
      {label} {sortCol === col && (sortDir === 'asc' ? '↑' : '↓')}
    </th>
  );

  const gapClass = (days) => {
    if (days === null) return 'gap-never';
    if (days > 730) return 'gap-critical';
    if (days > 400) return 'gap-warn';
    return 'gap-ok';
  };
  const gapLabel = (days) => {
    if (days === null) return 'Never';
    if (days > 730) return `${days}d ⚠`;
    return `${days}d`;
  };

  const stats = useMemo(() => {
    if (!results) return null;
    return {
      never: results.filter(c => !c.lastCalvingDate).length,
      over2yr: results.filter(c => c.daysSince !== null && c.daysSince > 730).length,
      oneToTwo: results.filter(c => c.daysSince !== null && c.daysSince >= 365 && c.daysSince <= 730).length,
    };
  }, [results]);

  const exportCSV = () => {
    if (!sortedResults.length) return;
    const rows = [
      ['VID','Sex','Herd','Breeding Status','Last Calving Date','Days Since Last Calving','Total Calvings'].join(','),
      ...sortedResults.map(c => [
        c.vid||'', sexLabel(c.sex), c.herds?.name||'',
        c.breeding_status?.replace('_',' ')||'',
        c.lastCalvingDate||'Never',
        c.daysSince !== null ? c.daysSince : '',
        c.totalCalvings,
      ].map(v => `"${v}"`).join(','))
    ].join('\n');
    const blob = new Blob([rows], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `calving_gap_${rangeStart}_to_${rangeEnd}.csv`; a.click();
    URL.revokeObjectURL(url);
    toast(`Exported ${sortedResults.length} records`, 'success');
  };

  return (
    <div>
      {/* Config Panel */}
      <div className="detail-card" style={{marginBottom:'24px', maxWidth:'760px'}}>
        <h3 style={{marginBottom:'6px'}}>Find Cows That Haven't Calved</h3>
        <p style={{color:'var(--ash)', fontSize:'13px', marginBottom:'20px', fontFamily:'Source Sans 3, sans-serif', fontWeight:'normal', letterSpacing:'0'}}>
          Searches active cows and heifers. Two modes are available — pick the one that fits your question.
        </p>

        {/* Mode selector */}
        <div style={{marginBottom:'20px'}}>
          <div className="form-label" style={{marginBottom:'10px', display:'block'}}>FILTER MODE</div>
          <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
            <label style={{display:'flex', alignItems:'flex-start', gap:'12px', cursor:'pointer', padding:'12px 14px', borderRadius:'5px', border: mode==='no_record_in_range' ? '1px solid var(--rust)' : '1px solid rgba(139,69,19,0.25)', background: mode==='no_record_in_range' ? 'rgba(193,68,14,0.08)' : 'transparent', transition:'all 0.15s'}}>
              <input type="radio" name="gapMode" value="no_record_in_range" checked={mode==='no_record_in_range'} onChange={() => setMode('no_record_in_range')} style={{marginTop:'2px', accentColor:'var(--rust)', flexShrink:0}} />
              <div>
                <div style={{color:'var(--cream)', fontSize:'14px', fontWeight:'600', marginBottom:'2px'}}>No record within date range</div>
                <div style={{color:'var(--ash)', fontSize:'12px', lineHeight:'1.5'}}>Shows cows with zero calving records dated between the Start and End dates. Good for checking a specific calving season (e.g. Jan 1 – Jun 30).</div>
              </div>
            </label>
            <label style={{display:'flex', alignItems:'flex-start', gap:'12px', cursor:'pointer', padding:'12px 14px', borderRadius:'5px', border: mode==='last_before_start' ? '1px solid var(--rust)' : '1px solid rgba(139,69,19,0.25)', background: mode==='last_before_start' ? 'rgba(193,68,14,0.08)' : 'transparent', transition:'all 0.15s'}}>
              <input type="radio" name="gapMode" value="last_before_start" checked={mode==='last_before_start'} onChange={() => setMode('last_before_start')} style={{marginTop:'2px', accentColor:'var(--rust)', flexShrink:0}} />
              <div>
                <div style={{color:'var(--cream)', fontSize:'14px', fontWeight:'600', marginBottom:'2px'}}>Last calving was before start date (or never calved)</div>
                <div style={{color:'var(--ash)', fontSize:'12px', lineHeight:'1.5'}}>Shows cows whose most recent calving is older than the Start date. Good for finding open cows overall — set Start Date to 1–2 years ago.</div>
              </div>
            </label>
          </div>
        </div>

        {/* Date range + herd */}
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'12px', marginBottom:'16px'}}>
          <div className="form-group">
            <label className="form-label">Start Date</label>
            <input type="date" className="form-input" value={rangeStart} onChange={e => setRangeStart(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">End Date</label>
            <input type="date" className="form-input" value={rangeEnd} onChange={e => setRangeEnd(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">Herd (optional)</label>
            <select className="form-select" value={herdFilter} onChange={e => setHerdFilter(e.target.value)}>
              <option value="">All Herds</option>
              {herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
            </select>
          </div>
        </div>

        <button className="btn btn-primary" onClick={runFilter} disabled={loading} style={{width:'100%', padding:'11px', fontSize:'14px'}}>
          {loading ? 'Searching…' : '🔍  Find Cows'}
        </button>
      </div>

      {/* Results */}
      {results !== null && (
        <div>
          {/* Summary */}
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px', flexWrap:'wrap', gap:'10px'}}>
            <div>
              <span style={{fontFamily:'Playfair Display, serif', fontSize:'22px', color:'var(--cream)', marginRight:'10px'}}>
                {results.length} cow{results.length !== 1 ? 's' : ''} found
              </span>
              <span style={{color:'var(--ash)', fontSize:'13px'}}>
                {mode === 'no_record_in_range'
                  ? `no calving between ${formatDate(rangeStart)} – ${formatDate(rangeEnd)}`
                  : `last calved before ${formatDate(rangeStart)}, or never calved`}
              </span>
            </div>
            {results.length > 0 && (
              <button className="btn btn-secondary" onClick={exportCSV}>⤓ Export CSV</button>
            )}
          </div>

          {/* Stat chips */}
          {stats && results.length > 0 && (
            <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'12px', marginBottom:'20px'}}>
              <div className="stat-card">
                <div className="stat-label">Never Calved</div>
                <div className="stat-value" style={{color:'#e05555', fontSize:'28px'}}>{stats.never}</div>
                <div className="stat-sub">no records at all</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Gap 1–2 Years</div>
                <div className="stat-value" style={{color:'var(--hay)', fontSize:'28px'}}>{stats.oneToTwo}</div>
                <div className="stat-sub">365–730 days since last</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Gap 2+ Years</div>
                <div className="stat-value" style={{color:'var(--rust)', fontSize:'28px'}}>{stats.over2yr}</div>
                <div className="stat-sub">over 730 days since last</div>
              </div>
            </div>
          )}

          {results.length === 0 ? (
            <div className="empty-state">
              <h3>No cows match this filter</h3>
              <p>All active cows and heifers have calving records that meet the selected criteria.</p>
            </div>
          ) : (
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <SortTh col="vid" label="VID" />
                    <th>Sex</th>
                    <SortTh col="herd" label="Herd" />
                    <SortTh col="breeding" label="Breeding Status" />
                    <SortTh col="last_calving" label="Last Calving" />
                    <SortTh col="days_since" label="Days Since" />
                    <SortTh col="total" label="Total Calvings" />
                  </tr>
                </thead>
                <tbody>
                  {sortedResults.map(c => (
                    <tr key={c.id} style={{cursor:'default'}}>
                      <td className="td-mono">{c.vid || '—'}</td>
                      <td><span className={`badge badge-${c.sex}`}>{sexLabel(c.sex)}</span></td>
                      <td>{c.herds?.name || '—'}</td>
                      <td style={{fontSize:'12px', color:'var(--sage)'}}>{c.breeding_status?.replace('_',' ') || '—'}</td>
                      <td style={{fontSize:'13px', color: c.lastCalvingDate ? 'var(--ash)' : '#e05555'}}>
                        {c.lastCalvingDate ? formatDate(c.lastCalvingDate) : '— never calved —'}
                      </td>
                      <td>
                        <span className={`gap-tag ${gapClass(c.daysSince)}`}>{gapLabel(c.daysSince)}</span>
                      </td>
                      <td style={{fontFamily:'IBM Plex Mono, monospace', color:'var(--hay)', textAlign:'center'}}>{c.totalCalvings}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="pagination">
                <span className="pagination-info">
                  {sortedResults.length} cows · Days color: &nbsp;
                  <span className="gap-tag gap-ok" style={{marginRight:'6px'}}>under 400d</span>
                  <span className="gap-tag gap-warn" style={{marginRight:'6px'}}>400–730d</span>
                  <span className="gap-tag gap-critical" style={{marginRight:'6px'}}>730d+ ⚠</span>
                  <span className="gap-tag gap-never">Never</span>
                </span>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ===== HERDS PAGE =====
function HerdsPage({ toast, navigateToAnimals }) {
  const [herds, setHerds] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [newHerd, setNewHerd] = useState({ name: '', notes: '' });

  const fetchHerds = async () => {
    setLoading(true);
    const { data, error } = await supabase.from('herds').select('*').order('name');
    if (error) toast('Error: ' + error.message, 'error');
    else setHerds(data || []);
    setLoading(false);
  };

  useEffect(() => { fetchHerds(); }, []);

  const [herdCounts, setHerdCounts] = useState({});
  useEffect(() => {
    const fetchCounts = async () => {
      const { data } = await supabase.from('animals').select('herd_id').eq('status', 'active');
      if (data) { const counts = {}; data.forEach(a => { if (a.herd_id) counts[a.herd_id] = (counts[a.herd_id] || 0) + 1; }); setHerdCounts(counts); }
    };
    fetchCounts();
  }, [herds]);

  const addHerd = async () => {
    if (!newHerd.name) { toast('Herd name is required', 'error'); return; }
    const { error } = await supabase.from('herds').insert({ name: newHerd.name, notes: newHerd.notes || null });
    if (error) toast('Error: ' + error.message, 'error');
    else { setShowAdd(false); setNewHerd({ name: '', notes: '' }); fetchHerds(); toast('Herd created!', 'success'); }
  };

  return (
    <div>
      <div style={{display:'flex', justifyContent:'flex-end', marginBottom:'20px'}}>
        <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ Add Herd</button>
      </div>
      {loading ? <div className="loading"><div className="spinner"></div> Loading...</div> : (
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:'16px'}}>
          {herds.map(h => (
            <div key={h.id} className="detail-card" onClick={() => navigateToAnimals(h.id)} style={{cursor:'pointer', transition:'all 0.15s'}} onMouseEnter={e => e.currentTarget.style.background='rgba(139,69,19,0.15)'} onMouseLeave={e => e.currentTarget.style.background='rgba(44,26,14,0.4)'}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'12px'}}>
                <h3 style={{fontFamily:'Playfair Display, serif', fontSize:'18px', color:'var(--cream)', fontWeight:'700', margin:0}}>{h.name}</h3>
                <span style={{fontFamily:'IBM Plex Mono', fontSize:'24px', color:'var(--hay)', fontWeight:'700'}}>{herdCounts[h.id] || 0}</span>
              </div>
              <div style={{color:'var(--ash)', fontSize:'12px', fontFamily:'IBM Plex Mono'}}>HEAD ACTIVE</div>
              {h.notes && <p style={{marginTop:'10px', color:'var(--ash)', fontSize:'13px'}}>{h.notes}</p>}
              <div style={{marginTop:'12px', fontSize:'11px', color:'var(--ash)', fontFamily:'IBM Plex Mono'}}>{h.is_active ? '● ACTIVE' : '○ INACTIVE'}</div>
            </div>
          ))}
        </div>
      )}
      {showAdd && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowAdd(false)}>
          <div className="modal" style={{maxWidth:'400px'}}>
            <div className="modal-header"><h2 className="modal-title">Add New Herd</h2><button className="modal-close" onClick={() => setShowAdd(false)}>✕</button></div>
            <div className="modal-body">
              <div className="form-group" style={{marginBottom:'16px'}}><label className="form-label">Herd Name *</label><input className="form-input" placeholder="e.g. Old Cows" value={newHerd.name} onChange={e => setNewHerd(f => ({...f, name: e.target.value}))} /></div>
              <div className="form-group"><label className="form-label">Notes</label><textarea className="form-textarea" placeholder="Any notes about this herd..." value={newHerd.notes} onChange={e => setNewHerd(f => ({...f, notes: e.target.value}))} /></div>
            </div>
            <div className="modal-footer"><button className="btn btn-ghost" onClick={() => setShowAdd(false)}>Cancel</button><button className="btn btn-primary" onClick={addHerd}>Create Herd</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== PARTNERSHIPS PAGE =====
function PartnershipsPage({ toast }) {
  const [partnerships, setPartnerships] = useState([]);
  const [members, setMembers] = useState({});
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [editingP, setEditingP] = useState(null);
  const [newP, setNewP] = useState({ name: '', description: '' });
  const [newMembers, setNewMembers] = useState([{ member_name: '', ownership_pct: '' }]);
  const [editMembers, setEditMembers] = useState([]);

  const fetchPartnerships = async () => {
    setLoading(true);
    const { data: ps } = await supabase.from('partnerships').select('*').order('name');
    const { data: ms } = await supabase.from('partnership_members').select('*').order('member_name');
    setPartnerships(ps || []);
    const mMap = {};
    (ms || []).forEach(m => { if (!mMap[m.partnership_id]) mMap[m.partnership_id] = []; mMap[m.partnership_id].push(m); });
    setMembers(mMap);
    setLoading(false);
  };

  useEffect(() => { fetchPartnerships(); }, []);

  const openEdit = (p) => { setEditingP({ ...p }); setEditMembers((members[p.id] || []).map(m => ({ ...m }))); };

  const saveEdit = async () => {
    if (!editingP.name) { toast('Partnership name is required', 'error'); return; }
    const totalPct = editMembers.reduce((sum, m) => sum + parseFloat(m.ownership_pct || 0), 0);
    if (Math.abs(totalPct - 100) > 0.01) { toast(`Percentages must total 100%. Currently: ${totalPct.toFixed(1)}%`, 'error'); return; }
    const { error: pErr } = await supabase.from('partnerships').update({ name: editingP.name, description: editingP.description || null, is_active: editingP.is_active, updated_at: new Date().toISOString() }).eq('id', editingP.id);
    if (pErr) { toast('Error updating: ' + pErr.message, 'error'); return; }
    await supabase.from('partnership_members').delete().eq('partnership_id', editingP.id);
    const memberRows = editMembers.filter(m => m.member_name).map(m => ({ partnership_id: editingP.id, member_name: m.member_name, ownership_pct: parseFloat(m.ownership_pct), effective_date: new Date().toISOString().split('T')[0] }));
    if (memberRows.length > 0) { const { error: mErr } = await supabase.from('partnership_members').insert(memberRows); if (mErr) { toast('Error saving members: ' + mErr.message, 'error'); return; } }
    setEditingP(null); fetchPartnerships(); toast('Partnership updated!', 'success');
  };

  const addPartnership = async () => {
    if (!newP.name) { toast('Partnership name is required', 'error'); return; }
    const totalPct = newMembers.reduce((sum, m) => sum + parseFloat(m.ownership_pct || 0), 0);
    if (Math.abs(totalPct - 100) > 0.01) { toast(`Ownership percentages must total 100%. Currently: ${totalPct}%`, 'error'); return; }
    const { data: p, error } = await supabase.from('partnerships').insert({ name: newP.name, description: newP.description || null }).select().single();
    if (error) { toast('Error: ' + error.message, 'error'); return; }
    const memberRows = newMembers.filter(m => m.member_name).map(m => ({ partnership_id: p.id, member_name: m.member_name, ownership_pct: parseFloat(m.ownership_pct), effective_date: new Date().toISOString().split('T')[0] }));
    if (memberRows.length > 0) { const { error: me } = await supabase.from('partnership_members').insert(memberRows); if (me) { toast('Error adding members: ' + me.message, 'error'); return; } }
    setShowAdd(false); setNewP({ name: '', description: '' }); setNewMembers([{ member_name: '', ownership_pct: '' }]);
    fetchPartnerships(); toast('Partnership created!', 'success');
  };

  const MemberRow = ({ m, i, list, setList }) => (
    <div style={{display:'flex', gap:'10px', marginBottom:'8px', alignItems:'center'}}>
      <input className="form-input" style={{flex:2}} placeholder="Partner name" value={m.member_name} onChange={e => setList(list.map((x,j) => j===i ? {...x, member_name: e.target.value} : x))} />
      <input className="form-input" style={{flex:1}} type="number" placeholder="%" value={m.ownership_pct} onChange={e => setList(list.map((x,j) => j===i ? {...x, ownership_pct: e.target.value} : x))} />
      {list.length > 1 && <button className="btn btn-ghost" style={{padding:'8px'}} onClick={() => setList(list.filter((_,j) => j!==i))}>✕</button>}
    </div>
  );

  const totalPct = (list) => list.reduce((s,m) => s + parseFloat(m.ownership_pct||0), 0);

  return (
    <div>
      <div style={{display:'flex', justifyContent:'flex-end', marginBottom:'20px'}}><button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ Add Partnership</button></div>
      {loading ? <div className="loading"><div className="spinner"></div> Loading...</div>
      : partnerships.length === 0 ? <div className="empty-state"><h3>No partnerships yet</h3><p>Add your first ownership partnership to get started.</p></div>
      : <div style={{display:'flex', flexDirection:'column', gap:'16px'}}>
        {partnerships.map(p => (
          <div key={p.id} className="detail-card">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'14px'}}>
              <div><h3 style={{fontFamily:'Playfair Display, serif', fontSize:'18px', color:'var(--cream)', fontWeight:'700', margin:'0 0 4px'}}>{p.name}</h3>{p.description && <p style={{color:'var(--ash)', fontSize:'13px'}}>{p.description}</p>}</div>
              <div style={{display:'flex', gap:'8px', alignItems:'center'}}>
                <span style={{fontSize:'11px', color: p.is_active ? 'var(--sage)' : 'var(--ash)', fontFamily:'IBM Plex Mono'}}>{p.is_active ? '● ACTIVE' : '○ INACTIVE'}</span>
                <button className="btn btn-secondary" style={{padding:'4px 12px', fontSize:'12px'}} onClick={() => openEdit(p)}>Edit</button>
              </div>
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:'6px'}}>
              {(members[p.id] || []).map(m => <div key={m.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 12px', background:'rgba(44,26,14,0.4)', borderRadius:'4px'}}><span style={{color:'var(--cream)', fontSize:'14px'}}>{m.member_name}</span><span style={{color:'var(--hay)', fontFamily:'IBM Plex Mono', fontSize:'14px', fontWeight:'600'}}>{m.ownership_pct}%</span></div>)}
              {(members[p.id] || []).length > 0 && <div style={{textAlign:'right', fontFamily:'IBM Plex Mono', fontSize:'11px', color:'var(--ash)', marginTop:'4px'}}>TOTAL: {(members[p.id] || []).reduce((s,m) => s + parseFloat(m.ownership_pct), 0).toFixed(1)}%</div>}
            </div>
          </div>
        ))}
      </div>}

      {showAdd && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowAdd(false)}>
          <div className="modal" style={{maxWidth:'500px'}}>
            <div className="modal-header"><h2 className="modal-title">New Partnership</h2><button className="modal-close" onClick={() => setShowAdd(false)}>✕</button></div>
            <div className="modal-body">
              <div className="form-group" style={{marginBottom:'14px'}}><label className="form-label">Partnership Name *</label><input className="form-input" placeholder="e.g. Luke & Dan 50/50" value={newP.name} onChange={e => setNewP(f => ({...f, name: e.target.value}))} /></div>
              <div className="form-group" style={{marginBottom:'20px'}}><label className="form-label">Description</label><input className="form-input" placeholder="Optional description" value={newP.description} onChange={e => setNewP(f => ({...f, description: e.target.value}))} /></div>
              <div className="form-label" style={{marginBottom:'10px', display:'block'}}>PARTNERS (must total 100%)</div>
              {newMembers.map((m,i) => <MemberRow key={i} m={m} i={i} list={newMembers} setList={setNewMembers} />)}
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'8px'}}>
                <button className="btn btn-ghost" onClick={() => setNewMembers(m => [...m, { member_name: '', ownership_pct: '' }])}>+ Add Partner</button>
                <span style={{fontFamily:'IBM Plex Mono', fontSize:'12px', color: Math.abs(totalPct(newMembers)-100)<0.01?'var(--sage)':'#e05555'}}>Total: {totalPct(newMembers).toFixed(1)}%</span>
              </div>
            </div>
            <div className="modal-footer"><button className="btn btn-ghost" onClick={() => setShowAdd(false)}>Cancel</button><button className="btn btn-primary" onClick={addPartnership}>Create Partnership</button></div>
          </div>
        </div>
      )}

      {editingP && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setEditingP(null)}>
          <div className="modal" style={{maxWidth:'500px'}}>
            <div className="modal-header"><h2 className="modal-title">Edit Partnership</h2><button className="modal-close" onClick={() => setEditingP(null)}>✕</button></div>
            <div className="modal-body">
              <div className="form-group" style={{marginBottom:'14px'}}><label className="form-label">Partnership Name *</label><input className="form-input" value={editingP.name} onChange={e => setEditingP(f => ({...f, name: e.target.value}))} /></div>
              <div className="form-group" style={{marginBottom:'14px'}}><label className="form-label">Description</label><input className="form-input" value={editingP.description || ''} onChange={e => setEditingP(f => ({...f, description: e.target.value}))} /></div>
              <div className="form-group" style={{marginBottom:'20px', flexDirection:'row', alignItems:'center', gap:'10px'}}>
                <input type="checkbox" id="edit-is-active" checked={editingP.is_active !== false} onChange={e => setEditingP(f => ({...f, is_active: e.target.checked}))} style={{width:'16px', height:'16px', accentColor:'var(--rust)'}} />
                <label htmlFor="edit-is-active" className="form-label" style={{margin:0, cursor:'pointer'}}>Partnership is active</label>
              </div>
              <div className="form-label" style={{marginBottom:'10px', display:'block'}}>PARTNERS (must total 100%)</div>
              {editMembers.map((m,i) => <MemberRow key={i} m={m} i={i} list={editMembers} setList={setEditMembers} />)}
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'8px'}}>
                <button className="btn btn-ghost" onClick={() => setEditMembers(m => [...m, { member_name: '', ownership_pct: '' }])}>+ Add Partner</button>
                <span style={{fontFamily:'IBM Plex Mono', fontSize:'12px', color: Math.abs(totalPct(editMembers)-100)<0.01?'var(--sage)':'#e05555'}}>Total: {totalPct(editMembers).toFixed(1)}%</span>
              </div>
            </div>
            <div className="modal-footer"><button className="btn btn-ghost" onClick={() => setEditingP(null)}>Cancel</button><button className="btn btn-primary" onClick={saveEdit}>Save Changes</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== CSV IMPORT PAGE =====

  { key: 'sex', label: 'Sex', required: true, hint: 'cow, heifer, bull, steer, calf_male, calf_female' },

  { key: 'owner', label: 'Owner', required: false, hint: 'Partnership or individual name' },
