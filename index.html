      const { headers, rows } = parseCSV(e.target.result);
      setCsvData({ headers, rows });
      // Auto-map columns that match exactly
      const autoMap = {};
      IMPORT_COLUMNS.forEach(col => {
        const match = headers.find(h => h.toLowerCase().replace(/\s+/g,'_') === col.key || h.toLowerCase() === col.label.toLowerCase());
        if (match) autoMap[col.key] = match;
      });
      setColumnMap(autoMap);
      setStep('map');
    };
    reader.readAsText(file);
  };

  // Build preview rows
  const buildPreview = () => {
    const rows = csvData.rows.map((row, i) => {
      const mapped = {};
      IMPORT_COLUMNS.forEach(col => {
        const csvCol = columnMap[col.key];
        mapped[col.key] = csvCol ? row[csvCol] : '';
      });

      const rowErrors = [];
      const sex = mapped.sex?.toLowerCase().trim() || defaultSex;
      if (!SEX_VALUES.includes(sex)) rowErrors.push(`Invalid sex "${mapped.sex}"`);
      if (mapped.breeding_status && !BREEDING_VALUES.includes(mapped.breeding_status?.toLowerCase())) rowErrors.push(`Invalid breeding status "${mapped.breeding_status}"`);
      if (mapped.date_of_birth && !parseCSVDate(mapped.date_of_birth)) rowErrors.push(`Invalid date "${mapped.date_of_birth}"`);

      // Find herd
      const herdName = mapped.herd_name || '';
      const herd = herds.find(h => h.name.toLowerCase() === herdName.toLowerCase());
      const defaultHerdObj = herds.find(h => h.id === defaultHerd);

      // Validate owner
      const { partnership, willCreate } = validateOwner(mapped.owner, partnerships);

      return {
        rowNum: i + 1,
        vid: mapped.vid || '',
        eid: mapped.eid || '',
        sex: sex,
        herd_name: herd?.name || defaultHerdObj?.name || '—',
        herd_id: herd?.id || defaultHerd || null,
        owner_name: partnership?.name || '',
        owner_partnership_id: partnership?.id || null,
        owner_will_create: willCreate,
        owner_display: partnership ? (willCreate ? `${partnership.name} (new)` : partnership.name) : '—',
        date_of_birth: parseCSVDate(mapped.date_of_birth),
        breed: mapped.breed || '',
        breeding_status: mapped.breeding_status?.toLowerCase() || '',
        purchased: mapped.purchased?.toLowerCase() === 'true',
        purchase_date: parseCSVDate(mapped.purchase_date),
        purchase_location: mapped.purchase_location || '',
        purchase_price_per_head: mapped.purchase_price_per_head ? parseFloat(mapped.purchase_price_per_head) : null,
        notes: mapped.notes || '',
        errors: rowErrors,
      };
    });

    setPreview(rows);
    setErrors(rows.filter(r => r.errors.length > 0));
    setStep('preview');
  };

  // Execute import
  const runImport = async () => {
    const validRows = preview.filter(r => r.errors.length === 0);
    setImporting(true);

    // Step 1: Create any new partnerships needed
    const partnershipsToCreate = [...new Set(
      validRows
        .filter(r => r.owner_will_create && r.owner_name)
        .map(r => r.owner_name)
    )];
    
    const newPartnershipMap = {}; // name -> id
    
    if (partnershipsToCreate.length > 0) {
      for (const name of partnershipsToCreate) {
        const { data, error } = await supabase
          .from('partnerships')
          .insert({ name })
          .select('id, name')
          .single();
        
        if (!error && data) {
          newPartnershipMap[name] = data.id;
        }
      }
    }

    // Step 2: Insert animals
    const insertRows = validRows.map(r => ({
      vid: r.vid || null,
      eid: r.eid || null,
      sex: r.sex,
      herd_id: r.herd_id || null,
      date_of_birth: r.date_of_birth || null,
      breed: r.breed || null,
      breeding_status: r.breeding_status || null,
      purchased: r.purchased,
      purchase_date: r.purchase_date || null,
      purchase_location: r.purchase_location || null,
      purchase_price_per_head: r.purchase_price_per_head || null,
      notes: r.notes || null,
      status: 'active',
    }));

    // Import in batches of 100
    let imported = 0;
    let failed = 0;
    let ownershipInserted = 0;
    let partnershipsCreated = Object.keys(newPartnershipMap).length;
    
    for (let i = 0; i < insertRows.length; i += 100) {
      const batch = insertRows.slice(i, i + 100);
      const batchPreviewRows = validRows.slice(i, i + 100);
      
      // Insert animals and get their IDs back
      const { data: insertedAnimals, error } = await supabase
        .from('animals')
        .insert(batch)
        .select('id');
      
      if (error) { 
        failed += batch.length; 
        console.error(error); 
      } else {
        imported += insertedAnimals.length;
        
        // Step 3: Insert ownership records
        const ownershipRecords = [];
        insertedAnimals.forEach((animal, idx) => {
          const previewRow = batchPreviewRows[idx];
          if (previewRow.owner_name) {
            // Get partnership ID (either existing or newly created)
            const partnershipId = previewRow.owner_partnership_id || newPartnershipMap[previewRow.owner_name];
            
            if (partnershipId) {
              ownershipRecords.push({
                animal_id: animal.id,
                partnership_id: partnershipId,
                percentage: 100,
                effective_date: previewRow.date_of_birth || previewRow.purchase_date || new Date().toISOString().split('T')[0],
              });
            }
          }
        });
        
        // Insert ownership records if any
        if (ownershipRecords.length > 0) {
          const { error: ownershipError } = await supabase
            .from('animal_ownership_history')
            .insert(ownershipRecords);
          
          if (!ownershipError) {
            ownershipInserted += ownershipRecords.length;
          } else {
            console.error('Ownership insert error:', ownershipError);
          }
        }
      }
    }

    setImporting(false);
    setImportResult({ 
      imported, 
      failed, 
      skipped: preview.length - validRows.length,
      ownershipInserted,
      partnershipsCreated
    });
    setStep('done');
    
    let msg = `Import complete: ${imported} animals added`;
    if (partnershipsCreated > 0) msg += `, ${partnershipsCreated} new partnerships created`;
    if (ownershipInserted > 0) msg += `, ${ownershipInserted} ownership records`;
    toast(msg + '!', 'success');
  };

  const reset = () => {
    setStep('upload'); setCsvData(null); setColumnMap({});
    setPreview([]); setErrors([]); setImportResult(null);
  };

  return (
    <div>
      {/* STEP INDICATOR */}
      <div style={{display:'flex', gap:'0', marginBottom:'28px', background:'var(--charcoal)', borderRadius:'6px', border:'1px solid rgba(139,69,19,0.3)', overflow:'hidden'}}>
        {['upload','map','preview','done'].map((s, i) => (
          <div key={s} style={{
            flex:1, padding:'12px', textAlign:'center',
            fontFamily:'IBM Plex Mono, monospace', fontSize:'11px', letterSpacing:'2px', textTransform:'uppercase',
            background: step === s ? 'rgba(193,68,14,0.2)' : 'transparent',
            color: step === s ? 'var(--hay)' : 'var(--ash)',
            borderRight: i < 3 ? '1px solid rgba(139,69,19,0.3)' : 'none',
          }}>
            {i+1}. {s}
          </div>
        ))}
      </div>

      {/* STEP 1: UPLOAD */}
      {step === 'upload' && (
        <div>
          <div className="detail-card" style={{marginBottom:'20px'}}>
            <h3>How to Import from Google Sheets</h3>
            <div style={{color:'var(--ash)', fontSize:'14px', lineHeight:'1.8', marginTop:'8px'}}>
              <p>1. Open your Google Sheet with animal data</p>
              <p>2. Go to <strong style={{color:'var(--cream)'}}>File → Download → Comma Separated Values (.csv)</strong></p>
              <p>3. Upload the downloaded CSV file below</p>
              <p style={{marginTop:'8px', color:'var(--sage)'}}>💡 Tip: Make sure your column headers match the template for automatic mapping.</p>
            </div>
          </div>

          <div className="detail-card" style={{marginBottom:'20px'}}>
            <h3>Default Settings</h3>
            <p style={{color:'var(--ash)', fontSize:'13px', marginBottom:'14px'}}>Applied to rows where the CSV doesn't specify a value.</p>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'14px'}}>
              <div className="form-group">
                <label className="form-label">Default Herd</label>
                <select className="form-select" value={defaultHerd} onChange={e => setDefaultHerd(e.target.value)}>
                  <option value="">-- None --</option>
                  {herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Default Sex</label>
                <select className="form-select" value={defaultSex} onChange={e => setDefaultSex(e.target.value)}>
                  {SEX_VALUES.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
          </div>

          <div style={{display:'flex', gap:'14px'}}>
            <div
              style={{
                flex:1, border:'2px dashed rgba(139,69,19,0.4)', borderRadius:'6px',
                padding:'48px 20px', textAlign:'center', cursor:'pointer',
                background:'var(--charcoal)', transition:'all 0.15s',
              }}
              onClick={() => fileRef.current?.click()}
              onDragOver={e => e.preventDefault()}
              onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
            >
              <div style={{fontSize:'32px', marginBottom:'12px', color:'var(--ash)'}}>
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                  <polyline points="7,10 12,15 17,10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
              </div>
              <p style={{color:'var(--cream)', fontSize:'15px', fontWeight:'600', marginBottom:'6px'}}>Drop CSV file here or click to browse</p>
              <p style={{color:'var(--ash)', fontSize:'13px'}}>Exported from Google Sheets</p>
              <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />
            </div>

            <div style={{display:'flex', flexDirection:'column', gap:'10px', justifyContent:'center'}}>
              <button className="btn btn-secondary" onClick={downloadTemplate} style={{whiteSpace:'nowrap'}}>
                ⬇ Download Template
              </button>
              <div style={{color:'var(--ash)', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace', textAlign:'center'}}>
                AVAILABLE<br/>COLUMNS
              </div>
              {IMPORT_COLUMNS.map(c => (
                <div key={c.key} style={{fontSize:'11px', color: c.required ? 'var(--rust)' : 'var(--ash)', fontFamily:'IBM Plex Mono, monospace'}}>
                  {c.required ? '* ' : '  '}{c.key}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* STEP 2: MAP COLUMNS */}
      {step === 'map' && csvData && (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
            <div>
              <h2 style={{fontFamily:'Playfair Display, serif', fontSize:'20px', color:'var(--cream)'}}>Map Your Columns</h2>
              <p style={{color:'var(--ash)', fontSize:'13px', marginTop:'4px'}}>{csvData.rows.length} rows detected · {csvData.headers.length} columns found</p>
            </div>
            <button className="btn btn-ghost" onClick={reset}>← Start Over</button>
          </div>

          <div className="table-wrap" style={{marginBottom:'20px'}}>
            <table>
              <thead>
                <tr>
                  <th>Ranch Savvy Field</th>
                  <th>Your CSV Column</th>
                  <th>Sample Value</th>
                </tr>
              </thead>
              <tbody>
                {IMPORT_COLUMNS.map(col => (
                  <tr key={col.key}>
                    <td>
                      <span style={{color:'var(--cream)', fontWeight:'600', fontSize:'13px'}}>{col.label}</span>
                      {col.required && <span style={{color:'var(--rust)', marginLeft:'4px'}}>*</span>}
                      <br/>
                      <span style={{color:'var(--ash)', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace'}}>{col.hint}</span>
                    </td>
                    <td>
                      <select
                        className="form-select"
                        value={columnMap[col.key] || ''}
                        onChange={e => setColumnMap(m => ({...m, [col.key]: e.target.value}))}
                        style={{minWidth:'160px'}}
                      >
                        <option value="">-- Skip --</option>
                        {csvData.headers.map(h => <option key={h} value={h}>{h}</option>)}
                      </select>
                    </td>
                    <td style={{color:'var(--sage)', fontSize:'13px', fontFamily:'IBM Plex Mono, monospace'}}>
                      {columnMap[col.key] ? (csvData.rows[0]?.[columnMap[col.key]] || '—') : '—'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{display:'flex', justifyContent:'flex-end', gap:'10px'}}>
            <button className="btn btn-ghost" onClick={reset}>← Back</button>
            <button className="btn btn-primary" onClick={buildPreview}>Preview Import →</button>
          </div>
        </div>
      )}

      {/* STEP 3: PREVIEW */}
      {step === 'preview' && (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
            <div>
              <h2 style={{fontFamily:'Playfair Display, serif', fontSize:'20px', color:'var(--cream)'}}>Preview Import</h2>
              <p style={{color:'var(--ash)', fontSize:'13px', marginTop:'4px'}}>
                <span style={{color:'var(--sage)'}}>{preview.filter(r=>r.errors.length===0).length} ready to import</span>
                {errors.length > 0 && <span style={{color:'#e05555', marginLeft:'12px'}}>⚠ {errors.length} rows have errors (will be skipped)</span>}
              </p>
            </div>
            <button className="btn btn-ghost" onClick={() => setStep('map')}>← Back</button>
          </div>

          {errors.length > 0 && (
            <div style={{background:'rgba(224,85,85,0.1)', border:'1px solid rgba(224,85,85,0.3)', borderRadius:'6px', padding:'14px 18px', marginBottom:'16px'}}>
              <p style={{color:'#e05555', fontWeight:'600', marginBottom:'8px'}}>⚠ Rows with errors will be skipped:</p>
              {errors.map(r => (
                <p key={r.rowNum} style={{color:'var(--ash)', fontSize:'13px'}}>Row {r.rowNum} (VID: {r.vid || 'blank'}): {r.errors.join(', ')}</p>
              ))}
            </div>
          )}

          <div className="table-wrap" style={{marginBottom:'20px'}}>
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>VID</th>
                  <th>EID</th>
                  <th>Sex</th>
                  <th>Herd</th>
                  <th>Owner</th>
                  <th>DOB</th>
                  <th>Breed Status</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {preview.map(r => (
                  <tr key={r.rowNum} style={{opacity: r.errors.length > 0 ? 0.4 : 1}}>
                    <td style={{color:'var(--ash)', fontSize:'12px'}}>{r.rowNum}</td>
                    <td className="td-mono">{r.vid || '—'}</td>
                    <td style={{fontFamily:'IBM Plex Mono, monospace', fontSize:'11px', color:'var(--ash)'}}>{r.eid || '—'}</td>
                    <td><span className={`badge badge-${r.sex?.includes('calf') ? 'calf' : r.sex}`}>{r.sex}</span></td>
                    <td>{r.herd_name}</td>
                    <td style={{fontSize:'12px', color:'var(--sage)'}}>{r.owner_display}</td>
                    <td style={{color:'var(--ash)', fontSize:'12px'}}>{r.date_of_birth || '—'}</td>
                    <td style={{fontSize:'12px', color:'var(--sage)'}}>{r.breeding_status || '—'}</td>
                    <td>
                      {r.errors.length > 0
                        ? <span style={{color:'#e05555', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace'}}>⚠ SKIP</span>
                        : <span style={{color:'var(--sage)', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace'}}>✓ READY</span>
                      }
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{display:'flex', justifyContent:'flex-end', gap:'10px'}}>
            <button className="btn btn-ghost" onClick={() => setStep('map')}>← Remap</button>
            <button
              className="btn btn-primary"
              onClick={runImport}
              disabled={importing || preview.filter(r=>r.errors.length===0).length === 0}
            >
              {importing ? 'Importing...' : `Import ${preview.filter(r=>r.errors.length===0).length} Animals`}
            </button>
          </div>
        </div>
      )}

      {/* STEP 4: DONE */}
      {step === 'done' && importResult && (
        <div style={{textAlign:'center', padding:'60px 20px'}}>
          <div style={{marginBottom:'20px', color:'var(--sage)'}}>
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22,4 12,14.01 9,11.01"/>
            </svg>
          </div>
          <h2 style={{fontFamily:'Playfair Display, serif', fontSize:'32px', color:'var(--cream)', marginBottom:'16px'}}>Import Complete!</h2>
          <div style={{display:'flex', justifyContent:'center', gap:'24px', marginBottom:'32px', flexWrap:'wrap'}}>
            <div className="stat-card" style={{minWidth:'140px'}}>
              <div className="stat-label">Imported</div>
              <div className="stat-value" style={{color:'var(--sage)'}}>{importResult.imported}</div>
            </div>
            {importResult.partnershipsCreated > 0 && (
              <div className="stat-card" style={{minWidth:'140px'}}>
                <div className="stat-label">New Partnerships</div>
                <div className="stat-value" style={{color:'var(--rust)'}}>{importResult.partnershipsCreated}</div>
              </div>
            )}
            {importResult.ownershipInserted > 0 && (
              <div className="stat-card" style={{minWidth:'140px'}}>
                <div className="stat-label">Ownership Records</div>
                <div className="stat-value" style={{color:'var(--hay)'}}>{importResult.ownershipInserted}</div>
              </div>
            )}
            <div className="stat-card" style={{minWidth:'140px'}}>
              <div className="stat-label">Skipped</div>
              <div className="stat-value" style={{color:'var(--ash)'}}>{importResult.skipped}</div>
            </div>
            {importResult.failed > 0 && (
              <div className="stat-card" style={{minWidth:'140px'}}>
                <div className="stat-label">Failed</div>
                <div className="stat-value" style={{color:'#e05555'}}>{importResult.failed}</div>
              </div>
            )}
          </div>
          <div style={{display:'flex', gap:'12px', justifyContent:'center'}}>
            <button className="btn btn-secondary" onClick={reset}>Import Another File</button>
            <button className="btn btn-primary" onClick={() => window.location.reload()}>View Animals →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== CHAT / FIELD ENTRY PAGE =====
function ChatPage({ toast }) {
  const [messages, setMessages] = useState([
    { role: 'assistant', text: 'Welcome to Ranch Savvy Field Entry. Type or dictate what happened today — sales, treatments, moves, calvings, and more. I\'ll confirm before saving anything.', time: new Date() },
  ]);
  const [input, setInput] = useState('');
  const [pending, setPending] = useState(null);
  const [processing, setProcessing] = useState(false);
  const messagesEnd = useRef(null);

  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  const addMsg = (role, text) => setMessages(m => [...m, { role, text, time: new Date() }]);

  // ---- EXECUTE CONFIRMED ACTIONS ----
  const executeSale = async (p) => {
    // Find animals by VID
    const { data: foundAnimals, error: findErr } = await supabase
      .from('animals')
      .select('id, vid, status')
      .in('vid', p.tags)
      .eq('status', 'active');

    if (findErr) throw new Error('Could not look up animals: ' + findErr.message);

    const foundTags = foundAnimals.map(a => a.vid);
    const notFound = p.tags.filter(t => !foundTags.includes(t));

    if (foundAnimals.length === 0) throw new Error(`No active animals found with tags: ${p.tags.join(', ')}`);

    // Create sale record
    const today = new Date().toISOString().split('T')[0];
    const { data: saleRecord, error: saleErr } = await supabase
      .from('sale_records')
      .insert({ sale_date: today, sale_location: p.location, sale_type: 'auction', notes: p.text })
      .select().single();

    if (saleErr) throw new Error('Could not create sale record: ' + saleErr.message);

    // Create sale_animals records
    const saleAnimals = foundAnimals.map(a => ({ sale_record_id: saleRecord.id, animal_id: a.id }));
    await supabase.from('sale_animals').insert(saleAnimals);

    // Update each animal status to sold
    const { error: updateErr } = await supabase
      .from('animals')
      .update({ status: 'sold', status_date: today, is_active: false, updated_at: new Date().toISOString() })
      .in('id', foundAnimals.map(a => a.id));

    if (updateErr) throw new Error('Could not update animal status: ' + updateErr.message);

    let resultMsg = `✓ Sale recorded at ${p.location}.\n${foundAnimals.length} animal(s) marked as SOLD: tags ${foundTags.join(', ')}.`;
    if (notFound.length > 0) resultMsg += `\n\n⚠️ These tags were not found in active inventory: ${notFound.join(', ')} — please check and add manually if needed.`;
    return resultMsg;
  };

  const executeDeath = async (p) => {
    const today = new Date().toISOString().split('T')[0];
    const { data: foundAnimals, error: findErr } = await supabase
      .from('animals')
      .select('id, vid')
      .in('vid', p.tags)
      .eq('status', 'active');

    if (findErr) throw new Error('Could not look up animals: ' + findErr.message);
    if (foundAnimals.length === 0) throw new Error(`No active animals found with tags: ${p.tags.join(', ')}`);

    // Insert death records
    const deathRecords = foundAnimals.map(a => ({
      animal_id: a.id,
      death_date: today,
      cause_of_death: p.cause || 'Unknown',
      notes: p.text,
    }));
    await supabase.from('death_records').insert(deathRecords);

    // Update animal status
    await supabase.from('animals')
      .update({ status: 'dead', status_date: today, is_active: false, updated_at: new Date().toISOString() })
      .in('id', foundAnimals.map(a => a.id));

    return `✓ Death recorded for ${foundAnimals.length} animal(s): tags ${foundAnimals.map(a=>a.vid).join(', ')}.`;
  };

  // ---- PARSE INPUT ----
  const parseAndRespond = async (text) => {
    const logEntry = {
      input_type: 'text',
      raw_input: text,
      ai_interpretation: null,
      action_type: null,
      action_executed: null,
      status: 'completed',
    };

    const lower = text.toLowerCase().trim();

    // CONFIRMATION of pending action
    if ((lower === 'yes' || lower === 'confirm' || lower === 'correct') && pending) {
      setProcessing(true);
      try {
        let resultMsg = '';
        if (pending.type === 'sale') resultMsg = await executeSale(pending);
        else if (pending.type === 'death') resultMsg = await executeDeath(pending);
        else resultMsg = '✓ Entry noted. Manual follow-up may be needed for this event type.';

        addMsg('system', resultMsg);
        logEntry.ai_interpretation = `Confirmed: ${pending.type}`;
        logEntry.action_executed = JSON.stringify(pending);
        logEntry.action_type = 'data_entry';
        logEntry.status = 'completed';
        setPending(null);
        toast('Saved to database!', 'success');
      } catch (err) {
        addMsg('system', `❌ Error: ${err.message}`);
        logEntry.status = 'failed';
        toast('Error saving entry', 'error');
      }
      setProcessing(false);
      await supabase.from('conversation_log').insert(logEntry);
      return;
    }

    // CANCEL
    if ((lower === 'no' || lower === 'cancel') && pending) {
      setPending(null);
      addMsg('assistant', 'Cancelled. Nothing was saved. What else can I help you record?');
      logEntry.action_type = 'cancelled';
      logEntry.status = 'cancelled';
      await supabase.from('conversation_log').insert(logEntry);
      return;
    }

    // SALE detection
    if (lower.includes('sold') || lower.includes('sale')) {
      // Extract tags - look for numbers/alphanumeric that look like tag numbers
      const locationMatch = text.match(/at\s+([A-Za-z][A-Za-z\s]+?)(?:,|\.|tags?|$)/i);
      const location = locationMatch?.[1]?.trim() || 'Unknown Location';
      // Find tags after "tags" keyword or extract standalone numbers
      const afterTags = text.match(/tags?\s+([0-9A-Za-z,\s]+)/i)?.[1] || '';
      const tags = afterTags
        ? afterTags.match(/[A-Z0-9]{1,6}/gi)?.map(t => t.toUpperCase()) || []
        : text.match(/\b\d{1,5}[A-Z]?\b/g)?.map(t => t.toUpperCase()) || [];

      setPending({ type: 'sale', tags, location, text });
      addMsg('assistant', `Sale detected at ${location}.\n\nTags identified: ${tags.length > 0 ? tags.join(', ') : 'none found'}\n\nIs this correct? Reply YES to save or tell me what to correct.`);
      logEntry.ai_interpretation = `Sale pending: ${tags.length} head at ${location}`;
      logEntry.action_type = 'data_entry';
      logEntry.status = 'completed';
    }

    // DEATH detection
    else if (lower.includes('died') || lower.includes('dead') || lower.includes('found dead') || lower.includes('death')) {
      const tags = text.match(/\b\d{1,5}[A-Z]?\b/g)?.map(t => t.toUpperCase()) || [];
      const cause = text.match(/(?:from|cause|due to)\s+([a-z\s]+?)(?:\.|,|$)/i)?.[1]?.trim() || null;
      setPending({ type: 'death', tags, cause, text });
      addMsg('assistant', `Death recorded for tag(s): ${tags.length > 0 ? tags.join(', ') : 'none found'}.\nCause: ${cause || 'not specified'}\n\nIs this correct? Reply YES to save or correct me.`);
      logEntry.ai_interpretation = `Death pending: tags ${tags.join(', ')}`;
      logEntry.action_type = 'data_entry';
      logEntry.status = 'completed';
    }

    // CALVING detection
    else if (lower.includes('calv') || lower.includes('gave birth') || lower.includes('born')) {
      const tags = text.match(/\b\d{1,5}[A-Z]?\b/g)?.map(t => t.toUpperCase()) || [];
      addMsg('assistant', `Calving event detected${tags.length ? ` for cow ${tags[0]}` : ''}.\n\nPlease confirm:\n• Cow tag number\n• Calf sex (bull or heifer)\n• Udder score (A through F)\n• Any calving difficulty?\n\nReply with details and I'll save the record.`);
      setPending({ type: 'calving', tags, text });
      logEntry.ai_interpretation = 'Calving event pending';
      logEntry.action_type = 'data_entry';
      logEntry.status = 'completed';
    }

    // VACCINATION / TREATMENT detection
    else if (lower.includes('vaccin') || lower.includes('treated') || lower.includes('medicated') || lower.includes('castrat')) {
      const products = [];
      const productMatches = [...text.matchAll(/(?:with\s+)([\w\s]+?)(?:\s*\(lot|\s*,|\s+and\s+[A-Z]|\.)/gi)];
      productMatches.forEach(m => products.push(m[1].trim()));
      const lotNumbers = [...text.matchAll(/lot\s+(?:number\s+)?([0-9]+)/gi)].map(m => m[1]);
      setPending({ type: 'health', text, products, lotNumbers });
      addMsg('assistant', `Health event detected.\n\nProducts: ${products.length > 0 ? products.join(', ') : 'not specified'}\nLot numbers: ${lotNumbers.length > 0 ? lotNumbers.join(', ') : 'not specified'}\n\nThis will be logged. Reply YES to confirm or correct me.`);
      logEntry.ai_interpretation = `Health/vaccination event pending: ${products.join(', ')}`;
      logEntry.action_type = 'bulk_update';
      logEntry.status = 'completed';
    }

    // MOVE detection
    else if (lower.includes('moved') || lower.includes('move to') || lower.includes('pasture')) {
      addMsg('assistant', `Pasture move detected.\n\nPlease confirm:\n• Which herd?\n• From which pasture?\n• To which pasture?\n• Today's date or a specific date?\n\nI'll log the move once confirmed.`);
      setPending({ type: 'move', text });
      logEntry.ai_interpretation = 'Pasture move pending';
      logEntry.action_type = 'data_entry';
      logEntry.status = 'completed';
    }

    // UNKNOWN
    else {
      addMsg('assistant', `I'm not sure what to record. Here are some examples:\n\n• "Sold 5 cows at Herreid Livestock, tags 101, 202, 303, 404, 505"\n• "Cow 607 calved today, heifer calf, udder score B"\n• "Tag 234 found dead today"\n• "Vaccinated all calves in Old Cows herd with Vision 7 (lot 12345)"\n• "Moved Old Cows to South Pasture today"\n\nWhat happened today?`);
      logEntry.action_type = 'query';
      logEntry.status = 'completed';
    }

    await supabase.from('conversation_log').insert(logEntry);
  };

  const handleSend = async () => {
    const text = input.trim();
    if (!text || processing) return;
    addMsg('user', text);
    setInput('');
    await parseAndRespond(text);
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  };

  return (
    <div className="chat-container">
      <div className="chat-messages">
        {messages.map((m, i) => (
          <div key={i}>
            <div className={`chat-bubble ${m.role}`} style={{whiteSpace:'pre-line'}}>{m.text}</div>
            <div className="chat-time" style={{textAlign: m.role === 'user' ? 'right' : 'left', paddingLeft: m.role !== 'user' ? '4px' : 0, paddingRight: m.role === 'user' ? '4px' : 0}}>
              {m.time?.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' })}
            </div>
          </div>
        ))}
        {processing && (
          <div className="chat-bubble assistant" style={{display:'flex', alignItems:'center', gap:'10px'}}>
            <div className="spinner"></div> Saving to database...
          </div>
        )}
        <div ref={messagesEnd} />
      </div>
      <div className="chat-input-area">
        <textarea
          className="chat-input"
          placeholder="Type a field entry... (e.g. 'Sold 5 cows at Herreid, tags 101, 202, 303')"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          rows={1}
          disabled={processing}
        />
        <button className="chat-send-btn" onClick={handleSend} disabled={processing} title="Send">➤</button>
      </div>
    </div>
  );
}

// ===== REPORTS PAGE =====
function ReportsPage({ toast }) {
  const [reportType, setReportType] = useState('summary'); // summary | detail
  const [reportScope, setReportScope] = useState('herd'); // herd | owner
  const [selectedHerd, setSelectedHerd] = useState('');
  const [selectedOwner, setSelectedOwner] = useState('');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
  const [exportFormat, setExportFormat] = useState('csv'); // csv | pdf
  const [herds, setHerds] = useState([]);
  const [partnerships, setPartnerships] = useState([]);
  const [generating, setGenerating] = useState(false);

  useEffect(() => {
    fetchHerds();
    fetchPartnerships();
    // Default start date to 1 year ago
    const oneYearAgo = new Date();
    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
    setStartDate(oneYearAgo.toISOString().split('T')[0]);
  }, []);

  const fetchHerds = async () => {
    const { data } = await supabase.from('herds').select('*').order('name');
    setHerds(data || []);
  };

  const fetchPartnerships = async () => {
    const { data } = await supabase.from('partnerships').select('*').order('name');
    setPartnerships(data || []);
  };

  const generateReport = async () => {
    if (reportScope === 'herd' && !selectedHerd) {
      toast('Please select a herd', 'error');
      return;
    }
    if (reportScope === 'owner' && !selectedOwner) {
      toast('Please select an owner', 'error');
      return;
    }
    if (!startDate || !endDate) {
      toast('Please select date range', 'error');
      return;
    }

    setGenerating(true);

    try {
      if (reportType === 'summary') {
        await generateSummaryReport();
      } else {
        await generateDetailReport();
      }
    } catch (error) {
      toast('Error generating report: ' + error.message, 'error');
    }

    setGenerating(false);
  };

  const generateSummaryReport = async () => {
    const scopeId = reportScope === 'herd' ? selectedHerd : selectedOwner;
    const scopeName = reportScope === 'herd' 
      ? herds.find(h => h.id === scopeId)?.name 
      : partnerships.find(p => p.id === scopeId)?.name;

    // Get beginning inventory (animals that existed before start date)
    let beginningQuery = supabase
      .from('animals')
      .select('*')
      .lte('created_at', startDate)
      .limit(10000);
    
    if (reportScope === 'herd') {
      beginningQuery = beginningQuery.eq('herd_id', scopeId);
    }
    
    const { data: beginningAnimals } = await beginningQuery;
    
    // Filter by owner if needed
    let beginningInventory = beginningAnimals || [];
    if (reportScope === 'owner') {
      const { data: ownership } = await supabase
        .from('animal_ownership_history')
        .select('animal_id')
        .eq('partnership_id', scopeId)
        .lte('effective_date', startDate)
        .limit(10000);
      
      const ownedIds = new Set(ownership?.map(o => o.animal_id));
      beginningInventory = beginningInventory.filter(a => ownedIds.has(a.id));
    }

    // Get additions (purchases, births) during date range
    let additionsQuery = supabase
      .from('animals')
      .select('*')
      .gte('created_at', startDate)
      .lte('created_at', endDate)
      .eq('status', 'active')
      .limit(10000);
    
    if (reportScope === 'herd') {
      additionsQuery = additionsQuery.eq('herd_id', scopeId);
    }
    
    const { data: additions } = await additionsQuery;
    
    let addedAnimals = additions || [];
    if (reportScope === 'owner') {
      const { data: ownership } = await supabase
        .from('animal_ownership_history')
        .select('animal_id')
        .eq('partnership_id', scopeId)
        .gte('effective_date', startDate)
        .lte('effective_date', endDate)
        .limit(10000);
      
      const ownedIds = new Set(ownership?.map(o => o.animal_id));
      addedAnimals = addedAnimals.filter(a => ownedIds.has(a.id));
    }

    // Get sales during date range
    const { data: sales } = await supabase
      .from('sale_animals')
      .select('*, sale_records(*), animals(*)')
      .gte('sale_records.sale_date', startDate)
      .lte('sale_records.sale_date', endDate)
      .limit(10000);
    
    let soldAnimals = sales || [];
    if (reportScope === 'herd') {
      soldAnimals = soldAnimals.filter(s => s.animals?.herd_id === scopeId);
    }
    
    if (reportScope === 'owner') {
      const { data: ownership } = await supabase
        .from('animal_ownership_history')
        .select('animal_id, partnership_id')
        .eq('partnership_id', scopeId)
        .limit(10000);
      
      const ownedIds = new Set(ownership?.map(o => o.animal_id));
      soldAnimals = soldAnimals.filter(s => ownedIds.has(s.animal_id));
    }

    // Get deaths during date range
    const { data: deaths } = await supabase
      .from('death_records')
      .select('*, animals(*)')
      .gte('death_date', startDate)
      .lte('death_date', endDate)
      .limit(10000);
    
    let deadAnimals = deaths || [];
    if (reportScope === 'herd') {
      deadAnimals = deadAnimals.filter(d => d.animals?.herd_id === scopeId);
    }
    
    if (reportScope === 'owner') {
      const { data: ownership } = await supabase
        .from('animal_ownership_history')
        .select('animal_id')
        .eq('partnership_id', scopeId)
        .limit(10000);
      
      const ownedIds = new Set(ownership?.map(o => o.animal_id));
      deadAnimals = deadAnimals.filter(d => ownedIds.has(d.animal_id));
    }

    // Calculate ending inventory
    const endingInventory = beginningInventory.length + addedAnimals.length - soldAnimals.length - deadAnimals.length;

    // Build CSV
    const csvContent = [
      `Ranch Savvy - Inventory Summary Report`,
      `${reportScope === 'herd' ? 'Herd' : 'Owner'}: ${scopeName}`,
      `Period: ${startDate} to ${endDate}`,
      ``,
      `Category,Head Count`,
      `Beginning Inventory,${beginningInventory.length}`,
      `Additions (Purchases/Births),${addedAnimals.length}`,
      `Sales,-${soldAnimals.length}`,
      `Deaths,-${deadAnimals.length}`,
      `Ending Inventory,${endingInventory}`,
      ``,
      `Net Change,${endingInventory - beginningInventory.length}`,
    ].join('\n');

    // Download
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ranch_savvy_summary_${scopeName}_${startDate}_${endDate}.csv`;
    a.click();
    URL.revokeObjectURL(url);

    toast('Summary report generated!', 'success');
  };

  const generateDetailReport = async () => {
    const scopeId = reportScope === 'herd' ? selectedHerd : selectedOwner;
    const scopeName = reportScope === 'herd' 
      ? herds.find(h => h.id === scopeId)?.name 
      : partnerships.find(p => p.id === scopeId)?.name;

    // Get all animals in scope
    let animalsQuery = supabase
      .from('animals')
      .select('*')
      .order('vid')
      .limit(10000);
    
    if (reportScope === 'herd') {
      animalsQuery = animalsQuery.eq('herd_id', scopeId);
    }
    
    const { data: animals } = await animalsQuery;
    
    let scopeAnimals = animals || [];
    if (reportScope === 'owner') {
      const { data: ownership } = await supabase
        .from('animal_ownership_history')
        .select('animal_id')
        .eq('partnership_id', scopeId)
        .limit(10000);
      
      const ownedIds = new Set(ownership?.map(o => o.animal_id));
      scopeAnimals = scopeAnimals.filter(a => ownedIds.has(a.id));
    }

    const animalIds = scopeAnimals.map(a => a.id);

    // Fetch all events for these animals in date range
    const [calvingData, breedingData, treatmentData, salesData, deathsData] = await Promise.all([
      supabase.from('calving_records').select('*').in('dam_id', animalIds).gte('calving_date', startDate).lte('calving_date', endDate).limit(10000),
      supabase.from('breeding_events').select('*').in('herd_id', [scopeId]).gte('start_date', startDate).lte('end_date', endDate).limit(10000),
      supabase.from('treatments').select('*').in('animal_id', animalIds).gte('treatment_date', startDate).lte('treatment_date', endDate).limit(10000),
      supabase.from('sale_animals').select('*, sale_records(*)').in('animal_id', animalIds).gte('sale_records.sale_date', startDate).lte('sale_records.sale_date', endDate).limit(10000),
      supabase.from('death_records').select('*').in('animal_id', animalIds).gte('death_date', startDate).lte('death_date', endDate).limit(10000),
    ]);

    // Build detailed CSV
    const rows = [
      `Ranch Savvy - Detailed Event Report`,
      `${reportScope === 'herd' ? 'Herd' : 'Owner'}: ${scopeName}`,
      `Period: ${startDate} to ${endDate}`,
      ``,
      `Date,Event Type,Animal VID,Details`,
    ];

    // Add calving events
    calvingData.data?.forEach(c => {
      const animal = scopeAnimals.find(a => a.id === c.dam_id);
      rows.push(`${c.calving_date},Calving,${animal?.vid || ''},${c.calf_sex} calf - ${c.calf_status}`);
    });

    // Add breeding events
    breedingData.data?.forEach(b => {
      rows.push(`${b.start_date},Breeding,Multiple,${b.breeding_type} breeding event`);
    });

    // Add treatments
    treatmentData.data?.forEach(t => {
      const animal = scopeAnimals.find(a => a.id === t.animal_id);
      rows.push(`${t.treatment_date},Treatment,${animal?.vid || ''},${t.treatment_type || 'General treatment'}`);
    });

    // Add sales
    salesData.data?.forEach(s => {
      const animal = scopeAnimals.find(a => a.id === s.animal_id);
      rows.push(`${s.sale_records.sale_date},Sale,${animal?.vid || ''},$${s.sale_price || 0}`);
    });

    // Add deaths
    deathsData.data?.forEach(d => {
      const animal = scopeAnimals.find(a => a.id === d.animal_id);
      rows.push(`${d.death_date},Death,${animal?.vid || ''},${d.cause || 'Unknown cause'}`);
    });

    const csvContent = rows.join('\n');

    // Download
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ranch_savvy_detail_${scopeName}_${startDate}_${endDate}.csv`;
    a.click();
    URL.revokeObjectURL(url);

    toast('Detail report generated!', 'success');
  };

  return (
    <div>
      <div style={{marginBottom:'24px'}}>
        <p style={{color:'var(--ash)', fontSize:'13px'}}>
          Generate inventory reports by herd or owner for any date range. Choose between summary (in/out counts) or detailed event logs.
        </p>
      </div>

      <div className="detail-card" style={{maxWidth:'600px'}}>
        <h3>Report Configuration</h3>
        
        <div className="form-group">
          <label>Report Type</label>
          <select value={reportType} onChange={e => setReportType(e.target.value)}>
            <option value="summary">Summary (Beginning/Ending Inventory)</option>
            <option value="detail">Detail (All Events)</option>
          </select>
        </div>

        <div className="form-group">
          <label>Report Scope</label>
          <select value={reportScope} onChange={e => setReportScope(e.target.value)}>
            <option value="herd">By Herd</option>
            <option value="owner">By Owner</option>
          </select>
        </div>

        {reportScope === 'herd' && (
          <div className="form-group">
            <label>Select Herd</label>
            <select value={selectedHerd} onChange={e => setSelectedHerd(e.target.value)}>
              <option value="">Choose a herd...</option>
              {herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
            </select>
          </div>
        )}

        {reportScope === 'owner' && (
          <div className="form-group">
            <label>Select Owner</label>
            <select value={selectedOwner} onChange={e => setSelectedOwner(e.target.value)}>
              <option value="">Choose an owner...</option>
              {partnerships.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
        )}

        <div className="form-grid">
          <div className="form-group">
            <label>Start Date</label>
            <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} />
          </div>
          <div className="form-group">
            <label>End Date</label>
            <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
          </div>
        </div>

        <div style={{marginTop:'20px', padding:'16px', background:'rgba(139,69,19,0.1)', borderRadius:'6px'}}>
          <h4 style={{color:'var(--hay)', fontSize:'13px', marginBottom:'8px'}}>
            {reportType === 'summary' ? '📊 Summary Report' : '📋 Detail Report'}
          </h4>
          <p style={{color:'var(--ash)', fontSize:'12px', lineHeight:'1.6'}}>
            {reportType === 'summary' 
              ? 'Shows beginning inventory, additions (purchases/births), removals (sales/deaths), and ending inventory for the selected period.'
              : 'Lists all events (calvings, breedings, treatments, sales, deaths) with dates and details for animals in the selected scope.'}
          </p>
        </div>

        <button 
          className="btn btn-primary" 
          onClick={generateReport} 
          disabled={generating}
          style={{marginTop:'20px', width:'100%'}}
        >
          {generating ? 'Generating Report...' : '⤓ Generate & Download Report'}
        </button>
      </div>
    </div>
  );
}

// ===== LOGS PAGE =====
function LogsPage({ toast }) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);

  const fetchLogs = async () => {
    setLoading(true);
    const { data, error } = await supabase.from('conversation_log').select('*').order('created_at', { ascending: false }).limit(200);
    if (error) toast('Error: ' + error.message, 'error');
    else setLogs(data || []);
    setLoading(false);
  };

  useEffect(() => { fetchLogs(); }, []);

  const handleRollback = async (log) => {
    if (!window.confirm('Mark this entry as rolled back? This will update the log status but you may need to manually reverse database changes.')) return;
    const { error } = await supabase.from('conversation_log').update({
      status: 'rolled_back',
      rolled_back_at: new Date().toISOString(),
    }).eq('id', log.id);
    if (error) toast('Error: ' + error.message, 'error');
    else { toast('Entry marked as rolled back', 'success'); fetchLogs(); setSelected(null); }
  };

  const statusColor = (s) => ({ completed: 'var(--sage)', failed: '#e05555', rolled_back: 'var(--ash)', cancelled: 'var(--hay)' }[s] || 'var(--ash)');

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
        <p style={{color:'var(--ash)', fontSize:'13px'}}>Complete audit trail of all conversational entries. Click any row to view details or roll back.</p>
        <button className="btn btn-ghost" onClick={fetchLogs}>↻ Refresh</button>
      </div>

      <div className="table-wrap">
        {loading ? <div className="loading"><div className="spinner"></div> Loading logs...</div> : logs.length === 0 ? (
          <div className="empty-state"><h3>No log entries yet</h3><p>Field entries will appear here.</p></div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Date / Time</th>
                <th>Type</th>
                <th>Input</th>
                <th>Interpretation</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {logs.map(l => (
                <tr key={l.id} onClick={() => setSelected(l)}>
                  <td className="td-mono" style={{fontSize:'11px', whiteSpace:'nowrap'}}>{new Date(l.created_at).toLocaleString()}</td>
                  <td><span className="badge badge-steer" style={{fontSize:'11px'}}>{l.action_type || '—'}</span></td>
                  <td style={{maxWidth:'250px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--ash)', fontSize:'13px'}}>{l.raw_input}</td>
                  <td style={{maxWidth:'200px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:'13px'}}>{l.ai_interpretation || '—'}</td>
                  <td><span style={{color: statusColor(l.status), fontFamily:'IBM Plex Mono', fontSize:'11px'}}>● {l.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {selected && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setSelected(null)}>
          <div className="modal" style={{maxWidth:'600px'}}>
            <div className="modal-header">
              <h2 className="modal-title">Log Entry Detail</h2>
              <button className="modal-close" onClick={() => setSelected(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="detail-card">
                <h3>Entry Info</h3>
                <div className="detail-row"><span className="detail-key">Date/Time</span><span className="detail-val">{new Date(selected.created_at).toLocaleString()}</span></div>
                <div className="detail-row"><span className="detail-key">Input Type</span><span className="detail-val">{selected.input_type}</span></div>
                <div className="detail-row"><span className="detail-key">Action Type</span><span className="detail-val">{selected.action_type || '—'}</span></div>
                <div className="detail-row"><span className="detail-key">Status</span><span className="detail-val" style={{color: statusColor(selected.status)}}>{selected.status}</span></div>
              </div>
              <div className="detail-card" style={{marginTop:'12px'}}>
                <h3>Raw Input</h3>
                <p style={{color:'var(--cream)', fontSize:'14px', lineHeight:'1.5'}}>{selected.raw_input}</p>
              </div>
              {selected.ai_interpretation && (
                <div className="detail-card" style={{marginTop:'12px'}}>
                  <h3>AI Interpretation</h3>
                  <p style={{color:'var(--cream)', fontSize:'14px'}}>{selected.ai_interpretation}</p>
                </div>
              )}
              {selected.action_executed && (
                <div className="detail-card" style={{marginTop:'12px'}}>
                  <h3>Action Executed</h3>
                  <pre style={{color:'var(--hay)', fontSize:'12px', fontFamily:'IBM Plex Mono', whiteSpace:'pre-wrap', wordBreak:'break-all'}}>{selected.action_executed}</pre>
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={() => setSelected(null)}>Close</button>
              {selected.status === 'completed' && (
                <button className="btn btn-danger" onClick={() => handleRollback(selected)}>↩ Roll Back Entry</button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== LOGIN SCREEN =====
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async () => {
    if (!email || !password) { setError('Please enter your email and password.'); return; }
    setLoading(true);
    setError('');
    const { error: authError } = await supabase.auth.signInWithPassword({ email, password });
    if (authError) {
      setError('Invalid email or password. Please try again.');
      setLoading(false);
    } else {
      onLogin();
    }
  };

  const handleKey = (e) => { if (e.key === 'Enter') handleLogin(); };

  return (
    <div style={{
      minHeight: '100vh',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      background: 'var(--soil)',
      backgroundImage: 'radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(193,68,14,0.08) 0%, transparent 50%)',
    }}>
      <div style={{
        background: 'var(--charcoal)',
        border: '1px solid rgba(139,69,19,0.4)',
        borderRadius: '8px',
        padding: '48px 40px',
        width: '100%',
        maxWidth: '400px',
        boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
      }}>
        {/* Logo */}
        <div style={{textAlign:'center', marginBottom:'36px'}}>
          <h1 style={{fontFamily:'Syncopate, sans-serif', fontSize:'28px', fontWeight:'700', color:'var(--hay)', letterSpacing:'4px', textTransform:'uppercase', lineHeight:'1.2'}}>Ranch Savvy</h1>
          <p style={{fontFamily:'IBM Plex Mono, monospace', fontSize:'11px', letterSpacing:'3px', color:'var(--ash)', marginTop:'8px', textTransform:'uppercase'}}>Cattle Management Platform</p>
        </div>

        {/* Form */}
        <div style={{display:'flex', flexDirection:'column', gap:'16px'}}>
          <div className="form-group">
            <label className="form-label">Email</label>
            <input
              className="form-input"
              type="email"
              placeholder="your@email.com"
              value={email}
              onChange={e => setEmail(e.target.value)}
              onKeyDown={handleKey}
              autoFocus
            />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input
              className="form-input"
              type="password"
              placeholder="••••••••"
              value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={handleKey}
            />
          </div>

          {error && (
            <div style={{
              background: 'rgba(224,85,85,0.1)',
              border: '1px solid rgba(224,85,85,0.4)',
              borderRadius: '4px',
              padding: '10px 14px',
              color: '#e05555',
              fontSize: '13px',
            }}>{error}</div>
          )}

          <button
            className="btn btn-primary"
            onClick={handleLogin}
            disabled={loading}
            style={{padding:'12px', fontSize:'15px', marginTop:'8px'}}
          >
            {loading ? 'Signing in...' : 'Sign In'}
          </button>
        </div>

        <div style={{marginTop:'24px', textAlign:'center', fontFamily:'IBM Plex Mono, monospace', fontSize:'11px', color:'var(--ash)', letterSpacing:'1px'}}>
          RANCHSAVVY.COM · SECURE LOGIN
        </div>
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [page, setPage] = useState('animals');
  const [toast, setToast] = useState(null);
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  useEffect(() => {
    // Check for existing session
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthLoading(false);
    });

    // Listen for auth changes
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
    });

    return () => subscription.unsubscribe();
  }, []);

  const handleLogout = async () => {
    await supabase.auth.signOut();
    setSession(null);
  };

  const showToast = (message, type = 'success') => {
    setToast({ message, type });
  };

  const pageTitles = {
    animals: 'Animal Inventory',
    herds: 'Herd Management',
    partnerships: 'Ownership Partnerships',
    reports: 'Reports',
    import: 'Bulk Import',
    chat: 'Field Entry',
    logs: 'Entry Log',
  };

  // Show loading spinner while checking auth
  if (authLoading) {
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--soil)'}}>
        <div style={{display:'flex', alignItems:'center', gap:'12px', color:'var(--ash)'}}>
          <div className="spinner"></div>
          <span style={{fontFamily:'IBM Plex Mono, monospace', fontSize:'12px', letterSpacing:'2px'}}>LOADING...</span>
        </div>
      </div>
    );
  }

  // Show login if not authenticated
  if (!session) {
    return <LoginPage onLogin={() => {}} />;
  }

  return (
    <div>
      <div className={`sidebar ${sidebarCollapsed ? 'collapsed' : ''}`}>
        <div className="logo">
          <h1>{sidebarCollapsed ? 'RS' : 'Ranch\nSavvy'}</h1>
          {!sidebarCollapsed && <span>Cattle Management</span>}
        </div>
        <button 
          onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
          style={{
            position:'absolute', top:'16px', right:sidebarCollapsed ? '8px' : '16px',
            background:'none', border:'1px solid rgba(139,69,19,0.4)', borderRadius:'3px',
            color:'var(--ash)', fontSize:'14px', padding:'4px 8px', cursor:'pointer',
          }}
        >
          {sidebarCollapsed ? '→' : '←'}
        </button>
        <div className="nav-section">
          {!sidebarCollapsed && <div className="nav-label">Inventory</div>}
          {NAV.slice(0,4).map(n => (
            <div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)} title={sidebarCollapsed ? n.label : ''}>
              <span className="nav-icon">{NAV_ICONS[n.id]}</span>
              {!sidebarCollapsed && <span>{n.label}</span>}
            </div>
          ))}
        </div>
        <div className="nav-section">
          {!sidebarCollapsed && <div className="nav-label">Data Entry</div>}
          {NAV.slice(4).map(n => (
            <div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)} title={sidebarCollapsed ? n.label : ''}>
              <span className="nav-icon">{NAV_ICONS[n.id]}</span>
              {!sidebarCollapsed && <span>{n.label}</span>}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          {!sidebarCollapsed && (
            <>
              <div style={{marginBottom:'8px', color:'var(--hay)', fontSize:'11px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                {session.user.email}
              </div>
              <button
                onClick={handleLogout}
                style={{background:'none', border:'1px solid rgba(139,69,19,0.4)', borderRadius:'3px', color:'var(--ash)', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace', padding:'4px 8px', cursor:'pointer', letterSpacing:'1px', width:'100%'}}
              >
                SIGN OUT
              </button>
              <div style={{marginTop:'8px', fontSize:'11px', color:'rgba(184,169,154,0.5)'}}>Ranch Savvy v1.0</div>
            </>
          )}
        </div>
      </div>

      <div className="main" style={{marginLeft: sidebarCollapsed ? '60px' : '220px'}}>
        <div className="topbar">
          <h1 className="page-title">{pageTitles[page]}</h1>
          <div className="topbar-actions">
            {page === 'animals' && <button className="btn btn-primary" onClick={() => window.__addAnimal && window.__addAnimal()}>+ Add Animal</button>}
          </div>
        </div>
        <div className="content">
          {page === 'animals' && <AnimalsPage toast={showToast} />}
          {page === 'herds' && <HerdsPage toast={showToast} />}
          {page === 'partnerships' && <PartnershipsPage toast={showToast} />}
          {page === 'reports' && <ReportsPage toast={showToast} />}
          {page === 'import' && <ImportPage toast={showToast} />}
          {page === 'chat' && <ChatPage toast={showToast} />}
          {page === 'logs' && <LogsPage toast={showToast} />}
        </div>
      </div>

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
