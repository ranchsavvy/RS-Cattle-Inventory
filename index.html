  { key: 'breed', label: 'Breed', required: false, hint: 'e.g. Angus, Sim-Angus' },
  { key: 'tag_color', label: 'Tag Color', required: false, hint: 'yellow, red, blue, green, orange, white, black, pink, purple' },
  { key: 'breeding_status', label: 'Breeding Status', required: false, hint: 'open, bred_spring, bred_fall, dry, nursing, unknown' },
  { key: 'purchased', label: 'Purchased', required: false, hint: 'true or false' },
  { key: 'purchase_date', label: 'Purchase Date', required: false, hint: 'MM/DD/YYYY or YYYY-MM-DD' },
  { key: 'purchase_location', label: 'Purchase Location', required: false, hint: 'e.g. Herreid Livestock' },
  { key: 'purchase_price_per_head', label: 'Purchase Price', required: false, hint: 'Dollar amount per head (e.g. 1250)' },
  { key: 'notes', label: 'Notes', required: false, hint: 'Any additional notes' },
];
const SEX_VALUES = ['cow','heifer','bull','steer','calf_male','calf_female'];
const BREEDING_VALUES = ['open','bred_spring','bred_fall','dry','nursing','unknown'];

function parseCSVDate(val) {
  if (!val) return null;
  const cleaned = val.trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(cleaned)) return cleaned;
  const parts = cleaned.split('/');
  if (parts.length === 3) { const [m, d, y] = parts; const fullYear = y.length <= 2 ? `20${y}` : y; return `${fullYear}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  return null;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return { headers: [], rows: [] };
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const rows = lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  }).filter(r => Object.values(r).some(v => v));
  return { headers, rows };
}

function validateOwner(ownerName, partnerships) {
  if (!ownerName || !ownerName.trim()) return { partnership: null, willCreate: false };
  const trimmedName = ownerName.trim();
  const existing = partnerships.find(p => p.name.toLowerCase() === trimmedName.toLowerCase());
  if (existing) return { partnership: existing, willCreate: false };
  return { partnership: { name: trimmedName }, willCreate: true };
}

function ImportPage({ toast }) {
  const [step, setStep] = useState('upload');
  const [csvData, setCsvData] = useState(null);
  const [columnMap, setColumnMap] = useState({});
  const [preview, setPreview] = useState([]);
  const [errors, setErrors] = useState([]);
  const [herds, setHerds] = useState([]);
  const [partnerships, setPartnerships] = useState([]);
  const [defaultHerd, setDefaultHerd] = useState('');
  const [defaultSex, setDefaultSex] = useState('cow');
  const [importing, setImporting] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const fileRef = useRef();

  useEffect(() => {
    supabase.from('herds').select('*').order('name').then(({ data }) => setHerds(data || []));
    supabase.from('partnerships').select('*').order('name').then(({ data }) => setPartnerships(data || []));
  }, []);

  const downloadTemplate = () => {
    const headers = IMPORT_COLUMNS.map(c => c.key).join(',');
    const example = 'H607,982000123456789,cow,Old Cows,Smith Ranch,01/15/2018,Angus,bred_spring,false,,,, ';
    const blob = new Blob([headers + '\n' + example], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'ranchsavvy_import_template.csv'; a.click();
  };

  const handleFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const { headers, rows } = parseCSV(e.target.result);
      setCsvData({ headers, rows });
      const autoMap = {};
      IMPORT_COLUMNS.forEach(col => { const match = headers.find(h => h.toLowerCase().replace(/\s+/g,'_') === col.key || h.toLowerCase() === col.label.toLowerCase()); if (match) autoMap[col.key] = match; });
      setColumnMap(autoMap);
      setStep('map');
    };
    reader.readAsText(file);
  };

  const buildPreview = () => {
    const rows = csvData.rows.map((row, i) => {
      const mapped = {};
      IMPORT_COLUMNS.forEach(col => { const csvCol = columnMap[col.key]; mapped[col.key] = csvCol ? row[csvCol] : ''; });
      const rowErrors = [];
      const vid = mapped.vid ? String(mapped.vid).trim() : '';
      const eid = mapped.eid ? String(mapped.eid).trim() : '';
      const sex = mapped.sex?.toLowerCase().trim() || defaultSex;
      if (!SEX_VALUES.includes(sex)) rowErrors.push(`Invalid sex "${mapped.sex}"`);
      if (mapped.breeding_status && !BREEDING_VALUES.includes(mapped.breeding_status?.toLowerCase())) rowErrors.push(`Invalid breeding status "${mapped.breeding_status}"`);
      if (mapped.date_of_birth && !parseCSVDate(mapped.date_of_birth)) rowErrors.push(`Invalid date "${mapped.date_of_birth}"`);
      const herdName = mapped.herd_name || '';
      const herd = herds.find(h => h.name.toLowerCase() === herdName.toLowerCase());
      const defaultHerdObj = herds.find(h => h.id === defaultHerd);
      const { partnership, willCreate } = validateOwner(mapped.owner, partnerships);
      return {
        rowNum: i + 1, vid, eid, sex,
        herd_name: herd?.name || defaultHerdObj?.name || '—',
        herd_id: herd?.id || defaultHerd || null,
        owner_name: partnership?.name || '',
        owner_partnership_id: partnership?.id || null,
        owner_will_create: willCreate,
        owner_display: partnership ? (willCreate ? `${partnership.name} (new)` : partnership.name) : '—',
        date_of_birth: parseCSVDate(mapped.date_of_birth),
        breed: mapped.breed || '', tag_color: mapped.tag_color?.toLowerCase() || '',
        breeding_status: mapped.breeding_status?.toLowerCase() || '',
        purchased: mapped.purchased?.toLowerCase() === 'true',
        purchase_date: parseCSVDate(mapped.purchase_date),
        purchase_location: mapped.purchase_location || '',
        purchase_price_per_head: mapped.purchase_price_per_head ? parseFloat(mapped.purchase_price_per_head) : null,
        notes: mapped.notes || '', errors: rowErrors,
      };
    });
    setPreview(rows);
    setErrors(rows.filter(r => r.errors.length > 0));
    setStep('preview');
  };

  const runImport = async () => {
    const validRows = preview.filter(r => r.errors.length === 0);
    setImporting(true);
    try {
      const partnershipsToCreate = [...new Set(validRows.filter(r => r.owner_will_create && r.owner_name).map(r => r.owner_name))];
      const newPartnershipMap = {};
      for (const name of partnershipsToCreate) {
        const { data, error } = await supabase.from('partnerships').insert({ name }).select('id, name').single();
        if (error) throw new Error(`Failed to create partnership "${name}": ${error.message}`);
        if (data) newPartnershipMap[name] = data.id;
      }
      const insertRows = validRows.map(r => ({ vid: r.vid || null, eid: r.eid || null, sex: r.sex, herd_id: r.herd_id || null, date_of_birth: r.date_of_birth || null, breed: r.breed || null, tag_color: r.tag_color || null, breeding_status: r.breeding_status || null, purchased: r.purchased, purchase_date: r.purchase_date || null, purchase_location: r.purchase_location || null, purchase_price_per_head: r.purchase_price_per_head || null, notes: r.notes || null, status: 'active' }));
      let imported = 0, failed = 0, ownershipInserted = 0, partnershipsCreated = Object.keys(newPartnershipMap).length;
      for (let i = 0; i < insertRows.length; i += 25) {
        const batch = insertRows.slice(i, i + 25);
        const batchPreviewRows = validRows.slice(i, i + 25);
        const { data: insertedAnimals, error } = await supabase.from('animals').insert(batch).select('id');
        if (error) { failed += batch.length; }
        else {
          imported += insertedAnimals.length;
          const ownershipRecords = [];
          insertedAnimals.forEach((animal, idx) => {
            const previewRow = batchPreviewRows[idx];
            if (previewRow.owner_name) {
              const partnershipId = previewRow.owner_partnership_id || newPartnershipMap[previewRow.owner_name];
              if (partnershipId) ownershipRecords.push({ animal_id: animal.id, partnership_id: partnershipId, percentage: 100, effective_date: previewRow.date_of_birth || previewRow.purchase_date || new Date().toISOString().split('T')[0] });
            }
          });
          if (ownershipRecords.length > 0) {
            const { error: ownershipError } = await supabase.from('animal_ownership_history').insert(ownershipRecords);
            if (!ownershipError) ownershipInserted += ownershipRecords.length;
          }
        }
      }
      setImporting(false);
      setImportResult({ imported, failed, skipped: preview.length - validRows.length, ownershipInserted, partnershipsCreated });
      setStep('done');
      let msg = `Import complete: ${imported} animals added`;
      if (failed > 0) msg += `, ${failed} failed`;
      if (partnershipsCreated > 0) msg += `, ${partnershipsCreated} new partnerships created`;
      if (ownershipInserted > 0) msg += `, ${ownershipInserted} ownership records`;
      toast(msg + '!', imported > 0 ? 'success' : 'error');
    } catch (error) { setImporting(false); toast(`Import failed: ${error.message}`, 'error'); }
  };

  const reset = () => { setStep('upload'); setCsvData(null); setColumnMap({}); setPreview([]); setErrors([]); setImportResult(null); };

  return (
    <div>
      <div style={{display:'flex', gap:'0', marginBottom:'28px', background:'var(--charcoal)', borderRadius:'6px', border:'1px solid rgba(139,69,19,0.3)', overflow:'hidden'}}>
        {['upload','map','preview','done'].map((s, i) => (
          <div key={s} style={{flex:1, padding:'12px', textAlign:'center', fontFamily:'IBM Plex Mono, monospace', fontSize:'11px', letterSpacing:'2px', textTransform:'uppercase', background: step===s?'rgba(193,68,14,0.2)':'transparent', color: step===s?'var(--hay)':'var(--ash)', borderRight: i<3?'1px solid rgba(139,69,19,0.3)':'none'}}>
            {i+1}. {s}
          </div>
        ))}
      </div>

      {step === 'upload' && (
        <div>
          <div className="detail-card" style={{marginBottom:'20px'}}>
            <h3>How to Import from Google Sheets</h3>
            <div style={{color:'var(--ash)', fontSize:'14px', lineHeight:'1.8', marginTop:'8px'}}>
              <p>1. Open your Google Sheet with animal data</p>
              <p>2. Go to <strong style={{color:'var(--cream)'}}>File → Download → Comma Separated Values (.csv)</strong></p>
              <p>3. Upload the downloaded CSV file below</p>
            </div>
          </div>
          <div className="detail-card" style={{marginBottom:'20px'}}>
            <h3>Default Settings</h3>
            <p style={{color:'var(--ash)', fontSize:'13px', marginBottom:'14px'}}>Applied to rows where the CSV doesn't specify a value.</p>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'14px'}}>
              <div className="form-group"><label className="form-label">Default Herd</label><select className="form-select" value={defaultHerd} onChange={e => setDefaultHerd(e.target.value)}><option value="">-- None --</option>{herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}</select></div>
              <div className="form-group"><label className="form-label">Default Sex</label><select className="form-select" value={defaultSex} onChange={e => setDefaultSex(e.target.value)}>{SEX_VALUES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
            </div>
          </div>
          <div style={{display:'flex', gap:'14px'}}>
            <div style={{flex:1, border:'2px dashed rgba(139,69,19,0.4)', borderRadius:'6px', padding:'48px 20px', textAlign:'center', cursor:'pointer', background:'var(--charcoal)'}} onClick={() => fileRef.current?.click()} onDragOver={e => e.preventDefault()} onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}>
              <div style={{marginBottom:'12px', color:'var(--ash)'}}><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
              <p style={{color:'var(--cream)', fontSize:'15px', fontWeight:'600', marginBottom:'6px'}}>Drop CSV file here or click to browse</p>
              <p style={{color:'var(--ash)', fontSize:'13px'}}>Exported from Google Sheets</p>
              <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:'10px', justifyContent:'center'}}>
              <button className="btn btn-secondary" onClick={downloadTemplate} style={{whiteSpace:'nowrap'}}>⬇ Download Template</button>
              <div style={{color:'var(--ash)', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace', textAlign:'center'}}>AVAILABLE<br/>COLUMNS</div>
              {IMPORT_COLUMNS.map(c => <div key={c.key} style={{fontSize:'11px', color: c.required ? 'var(--rust)' : 'var(--ash)', fontFamily:'IBM Plex Mono, monospace'}}>{c.required ? '* ' : '  '}{c.key}</div>)}
            </div>
          </div>
        </div>
      )}

      {step === 'map' && csvData && (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
            <div><h2 style={{fontFamily:'Playfair Display, serif', fontSize:'20px', color:'var(--cream)'}}>Map Your Columns</h2><p style={{color:'var(--ash)', fontSize:'13px', marginTop:'4px'}}>{csvData.rows.length} rows detected · {csvData.headers.length} columns found</p></div>
            <button className="btn btn-ghost" onClick={reset}>← Start Over</button>
          </div>
          <div className="table-wrap" style={{marginBottom:'20px'}}>
            <table>
              <thead><tr><th>Ranch Savvy Field</th><th>Your CSV Column</th><th>Sample Value</th></tr></thead>
              <tbody>
                {IMPORT_COLUMNS.map(col => (
                  <tr key={col.key}>
                    <td><span style={{color:'var(--cream)', fontWeight:'600', fontSize:'13px'}}>{col.label}</span>{col.required && <span style={{color:'var(--rust)', marginLeft:'4px'}}>*</span>}<br/><span style={{color:'var(--ash)', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace'}}>{col.hint}</span></td>
                    <td><select className="form-select" value={columnMap[col.key] || ''} onChange={e => setColumnMap(m => ({...m, [col.key]: e.target.value}))} style={{minWidth:'160px'}}><option value="">-- Skip --</option>{csvData.headers.map(h => <option key={h} value={h}>{h}</option>)}</select></td>
                    <td style={{color:'var(--sage)', fontSize:'13px', fontFamily:'IBM Plex Mono, monospace'}}>{columnMap[col.key] ? (csvData.rows[0]?.[columnMap[col.key]] || '—') : '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:'flex', justifyContent:'flex-end', gap:'10px'}}><button className="btn btn-ghost" onClick={reset}>← Back</button><button className="btn btn-primary" onClick={buildPreview}>Preview Import →</button></div>
        </div>
      )}

      {step === 'preview' && (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
            <div><h2 style={{fontFamily:'Playfair Display, serif', fontSize:'20px', color:'var(--cream)'}}>Preview Import</h2><p style={{color:'var(--ash)', fontSize:'13px', marginTop:'4px'}}><span style={{color:'var(--sage)'}}>{preview.filter(r=>r.errors.length===0).length} ready to import</span>{errors.length > 0 && <span style={{color:'#e05555', marginLeft:'12px'}}>⚠ {errors.length} rows have errors (will be skipped)</span>}</p></div>
            <button className="btn btn-ghost" onClick={() => setStep('map')}>← Back</button>
          </div>
          {errors.length > 0 && <div style={{background:'rgba(224,85,85,0.1)', border:'1px solid rgba(224,85,85,0.3)', borderRadius:'6px', padding:'14px 18px', marginBottom:'16px'}}><p style={{color:'#e05555', fontWeight:'600', marginBottom:'8px'}}>⚠ Rows with errors will be skipped:</p>{errors.map(r => <p key={r.rowNum} style={{color:'var(--ash)', fontSize:'13px'}}>Row {r.rowNum} (VID: {r.vid || 'blank'}): {r.errors.join(', ')}</p>)}</div>}
          <div className="table-wrap" style={{marginBottom:'20px'}}>
            <table>
              <thead><tr><th>#</th><th>VID</th><th>EID</th><th>Sex</th><th>Herd</th><th>Owner</th><th>DOB</th><th>Breed Status</th><th>Status</th></tr></thead>
              <tbody>
                {preview.map(r => (
                  <tr key={r.rowNum} style={{opacity: r.errors.length > 0 ? 0.4 : 1}}>
                    <td style={{color:'var(--ash)', fontSize:'12px'}}>{r.rowNum}</td>
                    <td className="td-mono">{r.vid || '—'}</td>
                    <td style={{fontFamily:'IBM Plex Mono, monospace', fontSize:'11px', color:'var(--ash)'}}>{r.eid || '—'}</td>
                    <td><span className={`badge badge-${r.sex?.includes('calf') ? 'calf' : r.sex}`}>{r.sex}</span></td>
                    <td>{r.herd_name}</td>
                    <td style={{fontSize:'12px', color:'var(--sage)'}}>{r.owner_display}</td>
                    <td style={{color:'var(--ash)', fontSize:'12px'}}>{r.date_of_birth || '—'}</td>
                    <td style={{fontSize:'12px', color:'var(--sage)'}}>{r.breeding_status || '—'}</td>
                    <td>{r.errors.length > 0 ? <span style={{color:'#e05555', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace'}}>⚠ SKIP</span> : <span style={{color:'var(--sage)', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace'}}>✓ READY</span>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:'flex', justifyContent:'flex-end', gap:'10px'}}>
            <button className="btn btn-ghost" onClick={() => setStep('map')}>← Remap</button>
            <button className="btn btn-primary" onClick={runImport} disabled={importing || preview.filter(r=>r.errors.length===0).length === 0}>{importing ? 'Importing...' : `Import ${preview.filter(r=>r.errors.length===0).length} Animals`}</button>
          </div>
        </div>
      )}

      {step === 'done' && importResult && (
        <div style={{textAlign:'center', padding:'60px 20px'}}>
          <div style={{marginBottom:'20px', color:'var(--sage)'}}><svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg></div>
          <h2 style={{fontFamily:'Playfair Display, serif', fontSize:'32px', color:'var(--cream)', marginBottom:'16px'}}>Import Complete!</h2>
          <div style={{display:'flex', justifyContent:'center', gap:'24px', marginBottom:'32px', flexWrap:'wrap'}}>
            <div className="stat-card" style={{minWidth:'140px'}}><div className="stat-label">Imported</div><div className="stat-value" style={{color:'var(--sage)'}}>{importResult.imported}</div></div>
            {importResult.partnershipsCreated > 0 && <div className="stat-card" style={{minWidth:'140px'}}><div className="stat-label">New Partnerships</div><div className="stat-value" style={{color:'var(--rust)'}}>{importResult.partnershipsCreated}</div></div>}
            {importResult.ownershipInserted > 0 && <div className="stat-card" style={{minWidth:'140px'}}><div className="stat-label">Ownership Records</div><div className="stat-value" style={{color:'var(--hay)'}}>{importResult.ownershipInserted}</div></div>}
            <div className="stat-card" style={{minWidth:'140px'}}><div className="stat-label">Skipped</div><div className="stat-value" style={{color:'var(--ash)'}}>{importResult.skipped}</div></div>
            {importResult.failed > 0 && <div className="stat-card" style={{minWidth:'140px'}}><div className="stat-label">Failed</div><div className="stat-value" style={{color:'#e05555'}}>{importResult.failed}</div></div>}
          </div>
          <div style={{display:'flex', gap:'12px', justifyContent:'center'}}><button className="btn btn-secondary" onClick={reset}>Import Another File</button><button className="btn btn-primary" onClick={() => window.location.reload()}>View Animals →</button></div>
        </div>
      )}
    </div>
  );
}

// ===== CHAT PAGE =====
function ChatPage({ toast }) {
  const [messages, setMessages] = useState([
    { role: 'assistant', text: "Welcome to Ranch Savvy Field Entry. Type or dictate what happened today — sales, treatments, moves, calvings, and more. I'll confirm before saving anything.", time: new Date() },
  ]);
  const [input, setInput] = useState('');
  const [pending, setPending] = useState(null);
  const [processing, setProcessing] = useState(false);
  const messagesEnd = useRef(null);

  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
  const addMsg = (role, text) => setMessages(m => [...m, { role, text, time: new Date() }]);

  const executeSale = async (p) => {
    const { data: foundAnimals, error: findErr } = await supabase.from('animals').select('id, vid, status').in('vid', p.tags).eq('status', 'active');
    if (findErr) throw new Error('Could not look up animals: ' + findErr.message);
    const foundTags = foundAnimals.map(a => a.vid);
    const notFound = p.tags.filter(t => !foundTags.includes(t));
    if (foundAnimals.length === 0) throw new Error(`No active animals found with tags: ${p.tags.join(', ')}`);
    const today = new Date().toISOString().split('T')[0];
    const { data: saleRecord, error: saleErr } = await supabase.from('sale_records').insert({ sale_date: today, sale_location: p.location, sale_type: 'auction', notes: p.text }).select().single();
    if (saleErr) throw new Error('Could not create sale record: ' + saleErr.message);
    await supabase.from('sale_animals').insert(foundAnimals.map(a => ({ sale_record_id: saleRecord.id, animal_id: a.id })));
    await supabase.from('animals').update({ status: 'sold', status_date: today, is_active: false, updated_at: new Date().toISOString() }).in('id', foundAnimals.map(a => a.id));
    let resultMsg = `✓ Sale recorded at ${p.location}.\n${foundAnimals.length} animal(s) marked as SOLD: tags ${foundTags.join(', ')}.`;
    if (notFound.length > 0) resultMsg += `\n\n⚠️ These tags were not found: ${notFound.join(', ')}`;
    return resultMsg;
  };

  const executeDeath = async (p) => {
    const today = new Date().toISOString().split('T')[0];
    const { data: foundAnimals, error: findErr } = await supabase.from('animals').select('id, vid').in('vid', p.tags).eq('status', 'active');
    if (findErr) throw new Error('Could not look up animals: ' + findErr.message);
    if (foundAnimals.length === 0) throw new Error(`No active animals found with tags: ${p.tags.join(', ')}`);
    await supabase.from('death_records').insert(foundAnimals.map(a => ({ animal_id: a.id, death_date: today, cause_of_death: p.cause || 'Unknown', notes: p.text })));
    await supabase.from('animals').update({ status: 'dead', status_date: today, is_active: false, updated_at: new Date().toISOString() }).in('id', foundAnimals.map(a => a.id));
    return `✓ Death recorded for ${foundAnimals.length} animal(s): tags ${foundAnimals.map(a=>a.vid).join(', ')}.`;
  };

  const executeCalving = async (p) => {
    const today = new Date().toISOString().split('T')[0];
    const { data: foundAnimals, error: findErr } = await supabase.from('animals').select('id, vid, status').in('vid', p.tags).eq('status', 'active');
    if (findErr) throw new Error('Could not look up animals: ' + findErr.message);
    if (foundAnimals.length === 0) throw new Error(`No active animals found with tags: ${p.tags.join(', ')}`);
    const dam = foundAnimals[0];
    await supabase.from('calving_records').insert({ dam_id: dam.id, calving_date: today, calf_sex: p.calfSex || 'unknown', calf_status: p.calfStatus || 'alive', udder_score: p.udderScore || null, calving_ease: 'unassisted', notes: p.text });
    return `✓ Calving record saved for cow ${dam.vid}.\nCalf: ${p.calfSex || 'unknown sex'}, ${p.calfStatus || 'alive'}${p.udderScore ? `, udder score ${p.udderScore}` : ''}.`;
  };

  const executeHealth = async (p) => {
    const today = new Date().toISOString().split('T')[0];
    const tags = p.text.match(/\b\d{1,5}[A-Z]?\b/g)?.map(t => t.toUpperCase()) || [];
    if (tags.length === 0) throw new Error('No animal tags found. Please specify which animals were treated.');
    const { data: foundAnimals, error: findErr } = await supabase.from('animals').select('id, vid').in('vid', tags).eq('status', 'active');
    if (findErr) throw new Error('Could not look up animals: ' + findErr.message);
    if (foundAnimals.length === 0) throw new Error(`No active animals found with tags: ${tags.join(', ')}`);
    await supabase.from('treatments').insert(foundAnimals.map(a => ({ animal_id: a.id, treatment_date: today, treatment_type: p.products.length > 0 ? 'vaccination' : 'general', product_name: p.products.join(', ') || null, lot_number: p.lotNumbers.join(', ') || null, reason: 'Field entry', notes: p.text })));
    return `✓ Treatment records saved for ${foundAnimals.length} animal(s): ${foundAnimals.map(a => a.vid).join(', ')}.`;
  };

  const executeNotes = async (p) => {
    const { data: foundAnimals, error: findErr } = await supabase.from('animals').select('id, vid, notes').in('vid', p.tags).eq('status', 'active');
    if (findErr) throw new Error('Could not look up animals: ' + findErr.message);
    if (foundAnimals.length === 0) throw new Error(`No active animals found with tags: ${p.tags.join(', ')}`);
    for (const animal of foundAnimals) {
      const newNotes = animal.notes ? `${animal.notes}\n\n[${new Date().toLocaleDateString()}] ${p.notes}` : `[${new Date().toLocaleDateString()}] ${p.notes}`;
      await supabase.from('animals').update({ notes: newNotes, updated_at: new Date().toISOString() }).eq('id', animal.id);
    }
    return `✓ Notes added to ${foundAnimals.length} animal(s): ${foundAnimals.map(a => a.vid).join(', ')}.`;
  };

  const parseAndRespond = async (text) => {
    const logEntry = { input_type: 'text', raw_input: text, ai_interpretation: null, action_type: null, action_executed: null, status: 'completed' };
    const lower = text.toLowerCase().trim();

    if ((lower === 'yes' || lower === 'confirm' || lower === 'correct') && pending) {
      setProcessing(true);
      try {
        let resultMsg = '';
        if (pending.type === 'sale') resultMsg = await executeSale(pending);
        else if (pending.type === 'death') resultMsg = await executeDeath(pending);
        else if (pending.type === 'calving') resultMsg = await executeCalving(pending);
        else if (pending.type === 'health') resultMsg = await executeHealth(pending);
        else if (pending.type === 'notes') resultMsg = await executeNotes(pending);
        else resultMsg = '✓ Entry noted. Manual follow-up may be needed for this event type.';
        addMsg('system', resultMsg);
        logEntry.ai_interpretation = `Confirmed: ${pending.type}`; logEntry.action_type = 'data_entry'; logEntry.status = 'completed';
        setPending(null); toast('Saved to database!', 'success');
      } catch (err) { addMsg('system', `❌ Error: ${err.message}`); logEntry.status = 'failed'; toast('Error saving entry', 'error'); }
      setProcessing(false);
      await supabase.from('conversation_log').insert(logEntry);
      return;
    }

    if ((lower === 'no' || lower === 'cancel') && pending) {
      setPending(null);
      addMsg('assistant', 'Cancelled. Nothing was saved. What else can I help you record?');
      logEntry.action_type = 'cancelled'; logEntry.status = 'cancelled';
      await supabase.from('conversation_log').insert(logEntry);
      return;
    }

    if (lower.includes('sold') || lower.includes('sale')) {
      const locationMatch = text.match(/at\s+([A-Za-z][A-Za-z\s]+?)(?:,|\.|tags?|$)/i);
      const location = locationMatch?.[1]?.trim() || 'Unknown Location';
      const afterTags = text.match(/tags?\s+([0-9A-Za-z,\s]+)/i)?.[1] || '';
      const tags = afterTags ? afterTags.match(/[A-Z0-9]{1,6}/gi)?.map(t => t.toUpperCase()) || [] : text.match(/\b\d{1,5}[A-Z]?\b/g)?.map(t => t.toUpperCase()) || [];
      setPending({ type: 'sale', tags, location, text });
      addMsg('assistant', `Sale detected at ${location}.\n\nTags identified: ${tags.length > 0 ? tags.join(', ') : 'none found'}\n\nIs this correct? Reply YES to save or tell me what to correct.`);
      logEntry.ai_interpretation = `Sale pending: ${tags.length} head at ${location}`; logEntry.action_type = 'data_entry';
    } else if (lower.includes('calv') || lower.includes('gave birth') || lower.includes('born') || lower.includes('had a calf') || lower.includes('had a bull') || lower.includes('had a heifer') || lower.match(/had a (dead|alive|live)? ?(bull|heifer|male|female)? ?calf/i)) {
      const tags = text.match(/\b\d{1,5}[A-Z]?\b/g)?.map(t => t.toUpperCase()) || [];
      let calfSex = null;
      if (lower.match(/\b(bull|male)\b/i) && !lower.includes('bull calf')) calfSex = 'bull';
      else if (lower.match(/\b(heifer|female)\b/i)) calfSex = 'heifer';
      else if (lower.includes('bull calf')) calfSex = 'bull';
      else if (lower.includes('heifer calf')) calfSex = 'heifer';
      let calfStatus = 'alive';
      if (lower.match(/dead|died|stillborn|still born/i)) calfStatus = 'dead';
      const udderMatch = text.match(/udder\s*(?:score)?\s*([A-F])/i);
      const udderScore = udderMatch ? udderMatch[1].toUpperCase() : null;
      setPending({ type: 'calving', tags, calfSex, calfStatus, udderScore, text });
      let confirmMsg = `Calving event detected${tags.length ? ` for cow ${tags[0]}` : ''}.\n\nDetected:\n`;
      if (calfSex) confirmMsg += `• Calf sex: ${calfSex}\n`;
      if (calfStatus) confirmMsg += `• Calf status: ${calfStatus}\n`;
      if (udderScore) confirmMsg += `• Udder score: ${udderScore}\n`;
      confirmMsg += `\nReply YES to save, or provide corrections.`;
      addMsg('assistant', confirmMsg);
      logEntry.ai_interpretation = `Calving event pending: cow ${tags[0] || 'unknown'}, ${calfSex || 'unknown sex'} calf, ${calfStatus}`; logEntry.action_type = 'data_entry';
    } else if ((lower.includes('cow died') || lower.includes('bull died') || lower.includes('heifer died') || lower.includes('steer died') || lower.includes('found dead')) || (lower.includes('died') && !lower.includes('calf')) || (lower.includes('death') && !lower.includes('calf'))) {
      const tags = text.match(/\b\d{1,5}[A-Z]?\b/g)?.map(t => t.toUpperCase()) || [];
      const cause = text.match(/(?:from|cause|due to)\s+([a-z\s]+?)(?:\.|,|$)/i)?.[1]?.trim() || null;
      setPending({ type: 'death', tags, cause, text });
      addMsg('assistant', `Death recorded for tag(s): ${tags.length > 0 ? tags.join(', ') : 'none found'}.\nCause: ${cause || 'not specified'}\n\nIs this correct? Reply YES to save or correct me.`);
      logEntry.ai_interpretation = `Death pending: tags ${tags.join(', ')}`; logEntry.action_type = 'data_entry';
    } else if (lower.includes('vaccin') || lower.includes('treated') || lower.includes('medicated') || lower.includes('castrat')) {
      const products = [];
      const productMatches = [...text.matchAll(/(?:with\s+)([\w\s]+?)(?:\s*\(lot|\s*,|\s+and\s+[A-Z]|\.)/gi)];
      productMatches.forEach(m => products.push(m[1].trim()));
      const lotNumbers = [...text.matchAll(/lot\s+(?:number\s+)?([0-9]+)/gi)].map(m => m[1]);
      setPending({ type: 'health', text, products, lotNumbers });
      addMsg('assistant', `Health event detected.\n\nProducts: ${products.length > 0 ? products.join(', ') : 'not specified'}\nLot numbers: ${lotNumbers.length > 0 ? lotNumbers.join(', ') : 'not specified'}\n\nThis will be logged. Reply YES to confirm or correct me.`);
      logEntry.ai_interpretation = `Health/vaccination event pending: ${products.join(', ')}`; logEntry.action_type = 'bulk_update';
    } else if (lower.includes('note for') || lower.includes('add note') || lower.includes('notes:') || lower.match(/tag \d+.*note/i) || lower.match(/cow \d+.*note/i)) {
      const tags = text.match(/\b\d{1,5}[A-Z]?\b/g)?.map(t => t.toUpperCase()) || [];
      let noteText = text;
      const noteMatch = text.match(/note[s]?:?\s*(.+)/i);
      if (noteMatch) noteText = noteMatch[1].trim();
      setPending({ type: 'notes', tags, notes: noteText, text });
      addMsg('assistant', `Note detected for tag(s): ${tags.length > 0 ? tags.join(', ') : 'none found'}.\n\nNote: "${noteText}"\n\nReply YES to save.`);
      logEntry.ai_interpretation = `Note pending for ${tags.length} animal(s)`; logEntry.action_type = 'data_entry';
    } else if (lower.includes('moved') || lower.includes('move to') || lower.includes('pasture')) {
      addMsg('assistant', `Pasture move detected.\n\nPlease confirm:\n• Which herd?\n• From which pasture?\n• To which pasture?\n• Today's date or a specific date?\n\nI'll log the move once confirmed.`);
      setPending({ type: 'move', text });
      logEntry.ai_interpretation = 'Pasture move pending'; logEntry.action_type = 'data_entry';
    } else {
      addMsg('assistant', `I'm not sure what to record. Here are some examples:\n\n• "Sold 5 cows at Herreid Livestock, tags 101, 202, 303, 404, 505"\n• "Cow 607 calved today, heifer calf, udder score B"\n• "Tag 234 found dead today"\n• "Vaccinated all calves in Old Cows herd with Vision 7 (lot 12345)"\n• "Moved Old Cows to South Pasture today"\n\nWhat happened today?`);
      logEntry.action_type = 'query';
    }
    await supabase.from('conversation_log').insert(logEntry);
  };

  const handleSend = async () => {
    const text = input.trim();
    if (!text || processing) return;
    addMsg('user', text);
    setInput('');
    await parseAndRespond(text);
  };

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

  return (
    <div className="chat-container">
      <div className="chat-messages">
        {messages.map((m, i) => (
          <div key={i}>
            <div className={`chat-bubble ${m.role}`} style={{whiteSpace:'pre-line'}}>{m.text}</div>
            <div className="chat-time" style={{textAlign: m.role === 'user' ? 'right' : 'left', paddingLeft: m.role !== 'user' ? '4px' : 0, paddingRight: m.role === 'user' ? '4px' : 0}}>
              {m.time?.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' })}
            </div>
          </div>
        ))}
        {processing && <div className="chat-bubble assistant" style={{display:'flex', alignItems:'center', gap:'10px'}}><div className="spinner"></div> Saving to database...</div>}
        <div ref={messagesEnd} />
      </div>
      <div className="chat-input-area">
        <textarea className="chat-input" placeholder="Type a field entry... (e.g. 'Sold 5 cows at Herreid, tags 101, 202, 303')" value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey} rows={1} disabled={processing} />
        <button className="chat-send-btn" onClick={handleSend} disabled={processing} title="Send">➤</button>
      </div>
    </div>
  );
}

// ===== REPORTS PAGE =====
function ReportsPage({ toast }) {
  const [reportType, setReportType] = useState('summary');
  const [reportScope, setReportScope] = useState('herd');
  const [selectedHerd, setSelectedHerd] = useState('');
  const [selectedOwner, setSelectedOwner] = useState('');
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
  const [exportFormat, setExportFormat] = useState('csv');
  const [herds, setHerds] = useState([]);
  const [partnerships, setPartnerships] = useState([]);
  const [generating, setGenerating] = useState(false);

  useEffect(() => {
    supabase.from('herds').select('*').order('name').then(({ data }) => setHerds(data || []));
    supabase.from('partnerships').select('*').order('name').then(({ data }) => setPartnerships(data || []));
    const oneYearAgo = new Date(); oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
    setStartDate(oneYearAgo.toISOString().split('T')[0]);
  }, []);

  const generateCalvingReport = async () => {
    const scopeId = reportScope === 'herd' ? selectedHerd : selectedOwner;
    if (!scopeId) { toast('Please select a herd or owner', 'error'); return; }
    const scopeName = reportScope === 'herd' ? herds.find(h => h.id === scopeId)?.name : partnerships.find(p => p.id === scopeId)?.name;
    let animalsQuery = supabase.from('animals').select('id, vid, sex').order('vid');
    if (reportScope === 'herd') animalsQuery = animalsQuery.eq('herd_id', scopeId);
    const { data: animals } = await animalsQuery;
    let scopeAnimals = animals || [];
    if (reportScope === 'owner') {
      const { data: ownership } = await supabase.from('animal_ownership_history').select('animal_id').eq('partnership_id', scopeId);
      const ownedIds = new Set(ownership?.map(o => o.animal_id));
      scopeAnimals = scopeAnimals.filter(a => ownedIds.has(a.id));
    }
    const { data: calvingData } = await supabase.from('calving_records').select('*').in('dam_id', scopeAnimals.map(a => a.id)).gte('calving_date', startDate).lte('calving_date', endDate).order('calving_date', { ascending: false });
    const rows = [`Ranch Savvy - Calving Records Report`, `${reportScope === 'herd' ? 'Herd' : 'Owner'}: ${scopeName}`, `Period: ${startDate} to ${endDate}`, ``, `Calving Date,Dam VID,Calf Sex,Calf Status,Udder Score,Calving Ease,Notes`];
    calvingData?.forEach(c => { const dam = scopeAnimals.find(a => a.id === c.dam_id); rows.push([c.calving_date, dam?.vid || '', c.calf_sex, c.calf_status, c.udder_score || '', c.calving_ease?.replace(/_/g, ' ') || '', `"${(c.notes || '').replace(/"/g, '""')}"`].join(',')); });
    rows.push(''); rows.push(`Total Calvings: ${calvingData?.length || 0}`); rows.push(`Live Calves: ${calvingData?.filter(c => c.calf_status === 'alive').length || 0}`); rows.push(`Dead Calves: ${calvingData?.filter(c => c.calf_status === 'dead').length || 0}`);
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `ranch_savvy_calving_${scopeName}_${startDate}_${endDate}.csv`; a.click(); URL.revokeObjectURL(url);
    toast('Calving report generated!', 'success');
  };

  const generateSummaryReport = async () => {
    const scopeId = reportScope === 'herd' ? selectedHerd : selectedOwner;
    if (!scopeId) { toast('Please select a herd or owner', 'error'); return; }
    const scopeName = reportScope === 'herd' ? herds.find(h => h.id === scopeId)?.name : partnerships.find(p => p.id === scopeId)?.name;
    let q = supabase.from('animals').select('id, status, created_at').lte('created_at', startDate);
    if (reportScope === 'herd') q = q.eq('herd_id', scopeId);
    const { data: beginningAnimals } = await q;
    const csvContent = [
      `Ranch Savvy - Inventory Summary Report`, `${reportScope === 'herd' ? 'Herd' : 'Owner'}: ${scopeName}`,
      `Period: ${startDate} to ${endDate}`, ``, `Category,Head Count`,
      `Beginning Inventory,${(beginningAnimals || []).length}`,
      `Generated: ${new Date().toLocaleDateString()}`
    ].join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `ranch_savvy_summary_${scopeName}_${startDate}_${endDate}.csv`; a.click(); URL.revokeObjectURL(url);
    toast('Summary report generated!', 'success');
  };

  const generateReport = async () => {
    if (!startDate || !endDate) { toast('Please select date range', 'error'); return; }
    setGenerating(true);
    try {
      if (reportType === 'calving') await generateCalvingReport();
      else await generateSummaryReport();
    } catch (error) { toast('Error generating report: ' + error.message, 'error'); }
    setGenerating(false);
  };

  return (
    <div>
      <div style={{marginBottom:'24px'}}><p style={{color:'var(--ash)', fontSize:'13px'}}>Generate inventory reports by herd or owner for any date range. Choose between summary (in/out counts) or detailed event logs.</p></div>
      <div className="detail-card" style={{maxWidth:'600px'}}>
        <h3>Report Configuration</h3>
        <div className="form-group"><label className="form-label">Report Type</label><select className="form-select" value={reportType} onChange={e => setReportType(e.target.value)}><option value="summary">Summary (Beginning/Ending Inventory)</option><option value="detail">Detail (All Events)</option><option value="calving">Calving Records</option></select></div>
        <div className="form-group"><label className="form-label">Report Scope</label><select className="form-select" value={reportScope} onChange={e => setReportScope(e.target.value)}><option value="herd">By Herd</option><option value="owner">By Owner</option></select></div>
        {reportScope === 'herd' && <div className="form-group"><label className="form-label">Select Herd</label><select className="form-select" value={selectedHerd} onChange={e => setSelectedHerd(e.target.value)}><option value="">Choose a herd...</option>{herds.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}</select></div>}
        {reportScope === 'owner' && <div className="form-group"><label className="form-label">Select Owner</label><select className="form-select" value={selectedOwner} onChange={e => setSelectedOwner(e.target.value)}><option value="">Choose an owner...</option>{partnerships.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>}
        <div className="form-grid">
          <div className="form-group"><label className="form-label">Start Date</label><input className="form-input" type="date" value={startDate} onChange={e => setStartDate(e.target.value)} /></div>
          <div className="form-group"><label className="form-label">End Date</label><input className="form-input" type="date" value={endDate} onChange={e => setEndDate(e.target.value)} /></div>
        </div>
        <div className="form-group"><label className="form-label">Export Format</label><select className="form-select" value={exportFormat} onChange={e => setExportFormat(e.target.value)}><option value="csv">CSV (Spreadsheet)</option><option value="pdf">PDF</option></select></div>
        <button className="btn btn-primary" onClick={generateReport} disabled={generating} style={{marginTop:'20px', width:'100%'}}>{generating ? 'Generating Report...' : `⤓ Generate & Download ${exportFormat.toUpperCase()}`}</button>
      </div>
    </div>
  );
}

// ===== LOGS PAGE =====
function LogsPage({ toast }) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);

  const fetchLogs = async () => {
    setLoading(true);
    const { data, error } = await supabase.from('conversation_log').select('*').order('created_at', { ascending: false }).limit(200);
    if (error) toast('Error: ' + error.message, 'error');
    else setLogs(data || []);
    setLoading(false);
  };

  useEffect(() => { fetchLogs(); }, []);

  const handleRollback = async (log) => {
    if (!window.confirm('Mark this entry as rolled back?')) return;
    const { error } = await supabase.from('conversation_log').update({ status: 'rolled_back', rolled_back_at: new Date().toISOString() }).eq('id', log.id);
    if (error) toast('Error: ' + error.message, 'error');
    else { toast('Entry marked as rolled back', 'success'); fetchLogs(); setSelected(null); }
  };

  const statusColor = (s) => ({ completed: 'var(--sage)', failed: '#e05555', rolled_back: 'var(--ash)', cancelled: 'var(--hay)' }[s] || 'var(--ash)');

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
        <p style={{color:'var(--ash)', fontSize:'13px'}}>Complete audit trail of all conversational entries. Click any row to view details or roll back.</p>
        <button className="btn btn-ghost" onClick={fetchLogs}>↻ Refresh</button>
      </div>
      <div className="table-wrap">
        {loading ? <div className="loading"><div className="spinner"></div> Loading logs...</div>
        : logs.length === 0 ? <div className="empty-state"><h3>No log entries yet</h3><p>Field entries will appear here.</p></div>
        : <table>
            <thead><tr><th>Date / Time</th><th>Type</th><th>Input</th><th>Interpretation</th><th>Status</th></tr></thead>
            <tbody>
              {logs.map(l => (
                <tr key={l.id} onClick={() => setSelected(l)}>
                  <td className="td-mono" style={{fontSize:'11px', whiteSpace:'nowrap'}}>{new Date(l.created_at).toLocaleString()}</td>
                  <td><span className="badge badge-steer" style={{fontSize:'11px'}}>{l.action_type || '—'}</span></td>
                  <td style={{maxWidth:'250px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--ash)', fontSize:'13px'}}>{l.raw_input}</td>
                  <td style={{maxWidth:'200px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:'13px'}}>{l.ai_interpretation || '—'}</td>
                  <td><span style={{color: statusColor(l.status), fontFamily:'IBM Plex Mono', fontSize:'11px'}}>● {l.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>}
      </div>
      {selected && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setSelected(null)}>
          <div className="modal" style={{maxWidth:'600px'}}>
            <div className="modal-header"><h2 className="modal-title">Log Entry Detail</h2><button className="modal-close" onClick={() => setSelected(null)}>✕</button></div>
            <div className="modal-body">
              <div className="detail-card"><h3>Entry Info</h3><div className="detail-row"><span className="detail-key">Date/Time</span><span className="detail-val">{new Date(selected.created_at).toLocaleString()}</span></div><div className="detail-row"><span className="detail-key">Action Type</span><span className="detail-val">{selected.action_type || '—'}</span></div><div className="detail-row"><span className="detail-key">Status</span><span className="detail-val" style={{color: statusColor(selected.status)}}>{selected.status}</span></div></div>
              <div className="detail-card" style={{marginTop:'12px'}}><h3>Raw Input</h3><p style={{color:'var(--cream)', fontSize:'14px', lineHeight:'1.5'}}>{selected.raw_input}</p></div>
              {selected.ai_interpretation && <div className="detail-card" style={{marginTop:'12px'}}><h3>AI Interpretation</h3><p style={{color:'var(--cream)', fontSize:'14px'}}>{selected.ai_interpretation}</p></div>}
            </div>
            <div className="modal-footer"><button className="btn btn-ghost" onClick={() => setSelected(null)}>Close</button>{selected.status === 'completed' && <button className="btn btn-danger" onClick={() => handleRollback(selected)}>↩ Roll Back Entry</button>}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== LOGIN PAGE =====
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async () => {
    if (!email || !password) { setError('Please enter your email and password.'); return; }
    setLoading(true); setError('');
    const { error: authError } = await supabase.auth.signInWithPassword({ email, password });
    if (authError) { setError('Invalid email or password. Please try again.'); setLoading(false); }
    else { onLogin(); }
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--soil)', backgroundImage:'radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.15) 0%, transparent 60%)'}}>
      <div style={{background:'var(--charcoal)', border:'1px solid rgba(139,69,19,0.4)', borderRadius:'8px', padding:'48px 40px', width:'100%', maxWidth:'400px', boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
        <div style={{textAlign:'center', marginBottom:'36px'}}>
          <h1 style={{fontFamily:'Syncopate, sans-serif', fontSize:'28px', fontWeight:'700', color:'var(--hay)', letterSpacing:'4px', textTransform:'uppercase', lineHeight:'1.2'}}>Ranch Savvy</h1>
          <p style={{fontFamily:'IBM Plex Mono, monospace', fontSize:'11px', letterSpacing:'3px', color:'var(--ash)', marginTop:'8px', textTransform:'uppercase'}}>Cattle Management Platform</p>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:'16px'}}>
          <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" placeholder="your@email.com" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key==='Enter'&&handleLogin()} autoFocus /></div>
          <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key==='Enter'&&handleLogin()} /></div>
          {error && <div style={{background:'rgba(224,85,85,0.1)', border:'1px solid rgba(224,85,85,0.4)', borderRadius:'4px', padding:'10px 14px', color:'#e05555', fontSize:'13px'}}>{error}</div>}
          <button className="btn btn-primary" onClick={handleLogin} disabled={loading} style={{padding:'12px', fontSize:'15px', marginTop:'8px'}}>{loading ? 'Signing in...' : 'Sign In'}</button>
        </div>
        <div style={{marginTop:'24px', textAlign:'center', fontFamily:'IBM Plex Mono, monospace', fontSize:'11px', color:'var(--ash)', letterSpacing:'1px'}}>RANCHSAVVY.COM · SECURE LOGIN</div>
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [page, setPage] = useState('animals');
  const [toast, setToast] = useState(null);
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [pendingHerdFilter, setPendingHerdFilter] = useState(null);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => { setSession(session); setAuthLoading(false); });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => { setSession(session); });
    return () => subscription.unsubscribe();
  }, []);

  const handleLogout = async () => { await supabase.auth.signOut(); setSession(null); };
  const showToast = (message, type = 'success') => { setToast({ message, type }); };
  const navigateToAnimalsWithHerd = (herdId) => { setPendingHerdFilter(herdId); setPage('animals'); };

  const pageTitles = {
    animals: 'Animal Inventory', herds: 'Herd Management', partnerships: 'Ownership Partnerships',
    reports: 'Reports', import: 'Bulk Import', chat: 'Field Entry', logs: 'Entry Log',
    calving_gap: 'Calving Gap',
    landlords: 'Landlords', pastures: 'Pastures', pasture_import: 'Import Pastures', record_move: 'Record Move', move_history: 'Move History',
  };

  if (authLoading) return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--soil)'}}>
      <div style={{display:'flex', alignItems:'center', gap:'12px', color:'var(--ash)'}}><div className="spinner"></div><span style={{fontFamily:'IBM Plex Mono, monospace', fontSize:'12px', letterSpacing:'2px'}}>LOADING...</span></div>
    </div>
  );

  if (!session) return <LoginPage onLogin={() => {}} />;

  return (
    <div>
      <div className={`sidebar ${sidebarCollapsed ? 'collapsed' : ''}`}>
        <div className="logo">
          <h1>{sidebarCollapsed ? 'RS' : 'Ranch\nSavvy'}</h1>
          {!sidebarCollapsed && <span>Cattle Management</span>}
        </div>
        <button onClick={() => setSidebarCollapsed(!sidebarCollapsed)} style={{position:'absolute', top:'16px', right: sidebarCollapsed ? '8px' : '16px', background:'none', border:'1px solid rgba(139,69,19,0.4)', borderRadius:'3px', color:'var(--ash)', fontSize:'14px', padding:'4px 8px', cursor:'pointer'}}>
          {sidebarCollapsed ? '→' : '←'}
        </button>

        <div className="nav-section">
          {!sidebarCollapsed && <div className="nav-label">Inventory</div>}
          {['animals','herds','partnerships','reports'].map(id => {
            const n = NAV.find(x => x.id === id);
            return <div key={id} className={`nav-item ${page === id ? 'active' : ''}`} onClick={() => setPage(id)} title={sidebarCollapsed ? n.label : ''}><span className="nav-icon">{NAV_ICONS[id]}</span>{!sidebarCollapsed && <span>{n.label}</span>}</div>;
          })}
        </div>

        <div className="nav-section">
          {!sidebarCollapsed && <div className="nav-label">Data Entry</div>}
          {['import','chat','logs'].map(id => {
            const n = NAV.find(x => x.id === id);
            return <div key={id} className={`nav-item ${page === id ? 'active' : ''}`} onClick={() => setPage(id)} title={sidebarCollapsed ? n.label : ''}><span className="nav-icon">{NAV_ICONS[id]}</span>{!sidebarCollapsed && <span>{n.label}</span>}</div>;
          })}
        </div>

        <div className="nav-section">
          {!sidebarCollapsed && <div className="nav-label">Grazing</div>}
          <div className={`nav-item ${page === 'record_move' ? 'active' : ''}`} onClick={() => setPage('record_move')} title={sidebarCollapsed ? 'Record Move' : ''}>
            <span className="nav-icon">{NAV_ICONS['record_move']}</span>
            {!sidebarCollapsed && <span>Record Move</span>}
          </div>
          <div className={`nav-item ${page === 'move_history' ? 'active' : ''}`} onClick={() => setPage('move_history')} title={sidebarCollapsed ? 'Move History' : ''}>
            <span className="nav-icon">{NAV_ICONS['move_history']}</span>
            {!sidebarCollapsed && <span>Move History</span>}
          </div>
          <div className={`nav-item ${page === 'pastures' ? 'active' : ''}`} onClick={() => setPage('pastures')} title={sidebarCollapsed ? 'Pastures' : ''}>
            <span className="nav-icon">{NAV_ICONS['pastures']}</span>
            {!sidebarCollapsed && <span>Pastures</span>}
          </div>
          <div className={`nav-item ${page === 'pasture_import' ? 'active' : ''}`} onClick={() => setPage('pasture_import')} title={sidebarCollapsed ? 'Import Pastures' : ''}>
            <span className="nav-icon">{NAV_ICONS['pasture_import']}</span>
            {!sidebarCollapsed && <span>Import Pastures</span>}
          </div>
          <div className={`nav-item ${page === 'landlords' ? 'active' : ''}`} onClick={() => setPage('landlords')} title={sidebarCollapsed ? 'Landlords' : ''}>
            <span className="nav-icon">{NAV_ICONS['landlords']}</span>
            {!sidebarCollapsed && <span>Landlords</span>}
          </div>
        </div>

        <div className="nav-section">
          {!sidebarCollapsed && <div className="nav-label">Analytics</div>}
          <div className={`nav-item ${page === 'calving_gap' ? 'active' : ''}`} onClick={() => setPage('calving_gap')} title={sidebarCollapsed ? 'Calving Gap' : ''}>
            <span className="nav-icon">{NAV_ICONS['calving_gap']}</span>
            {!sidebarCollapsed && <span>Calving Gap</span>}
          </div>
        </div>

        <div className="sidebar-footer">
          {!sidebarCollapsed && (
            <>
              <div style={{marginBottom:'8px', color:'var(--hay)', fontSize:'11px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{session.user.email}</div>
              <button onClick={handleLogout} style={{background:'none', border:'1px solid rgba(139,69,19,0.4)', borderRadius:'3px', color:'var(--ash)', fontSize:'11px', fontFamily:'IBM Plex Mono, monospace', padding:'4px 8px', cursor:'pointer', letterSpacing:'1px', width:'100%'}}>SIGN OUT</button>
              <div style={{marginTop:'8px', fontSize:'11px', color:'rgba(184,169,154,0.5)'}}>Ranch Savvy v1.1</div>
            </>
          )}
        </div>
      </div>

      <div className="main" style={{marginLeft: sidebarCollapsed ? '60px' : '220px'}}>
        <div className="topbar">
          <h1 className="page-title">{pageTitles[page]}</h1>
          <div className="topbar-actions">
            {page === 'animals' && <button className="btn btn-primary" onClick={() => window.__addAnimal && window.__addAnimal()}>+ Add Animal</button>}
          </div>
        </div>
        <div className="content">
          {page === 'animals' && <AnimalsPage toast={showToast} pendingHerdFilter={pendingHerdFilter} clearPendingFilter={() => setPendingHerdFilter(null)} />}
          {page === 'herds' && <HerdsPage toast={showToast} navigateToAnimals={navigateToAnimalsWithHerd} />}
          {page === 'partnerships' && <PartnershipsPage toast={showToast} />}
          {page === 'reports' && <ReportsPage toast={showToast} />}
          {page === 'import' && <ImportPage toast={showToast} />}
          {page === 'chat' && <ChatPage toast={showToast} />}
          {page === 'logs' && <LogsPage toast={showToast} />}
          {page === 'calving_gap' && <CalvingGapPage toast={showToast} />}
          {page === 'landlords' && <LandlordsPage toast={showToast} />}
          {page === 'pastures' && <PasturesPage toast={showToast} />}
          {page === 'pasture_import' && <PastureImportPage toast={showToast} />}
          {page === 'record_move' && <RecordMovePage toast={showToast} />}
          {page === 'move_history' && <MoveHistoryPage toast={showToast} />}
        </div>
      </div>

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
